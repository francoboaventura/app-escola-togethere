VIEWS.tarefas=()=>{
  const v=document.getElementById('view');
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--marinho)"></span><h2 class="display">Tarefas internas</h2></div>

      <div style="flex:3"><label class="lbl">Nova tarefa</label><input type="text" id="tkTxt" placeholder="O que precisa ser feito?" onkeydown="if(event.key==='Enter')addTarefa()"></div>
      <div><label class="lbl">Quadrante</label><select id="tkQ">${Object.entries(QUADS).map(([k,q])=>`<option value="${k}">${q.nome}</option>`).join('')}</select></div>

    <div class="emat" id="eMat"></div>`;

};
function addTarefa(){
  const txt=document.getElementById('tkTxt').value.trim();
  if(!txt)return toast('Escreva a tarefa');
  S.tarefas.push({id:uid(),txt,quad:+document.getElementById('tkQ').value,feito:false});
  document.getElementById('tkTxt').value='';save();renderTarefas();
}
function renderTarefas(){
  const mat=document.getElementById('eMat');
  mat.innerHTML=Object.entries(QUADS).map(([k,q])=>{
    const ts=S.tarefas.filter(t=>t.quad==k);
    return `<div class="quad q${k}"><h4><span class="dot" style="background:${q.cor}"></span>${q.nome}</h4><div class="qsub">${q.sub}</div>
      ${ts.length?ts.map(t=>`<div class="task ${t.feito?'feito':''}">
        <input type="checkbox" ${t.feito?'checked':''} onchange="toggleTarefa('${t.id}')" style="accent-color:${q.cor};width:18px;height:18px;flex:none;margin-top:1px;cursor:pointer">
        <span class="t-txt">${t.txt}</span>
        <button class="mv" onclick="moverTarefa('${t.id}')">mover</button>
        <button class="del" onclick="delTarefa('${t.id}')">×</button></div>`).join(''):'<div style="font-size:.82rem;color:var(--tinta-suave);padding:8px 0">Vazio</div>'}
    </div>`;
  }).join('');
}
function toggleTarefa(id){const t=S.tarefas.find(t=>t.id===id);t.feito=!t.feito;save();renderTarefas();}
function delTarefa(id){S.tarefas=S.tarefas.filter(t=>t.id!==id);marcarExcluido('tarefas',id);save();renderTarefas();}
function moverTarefa(id){
  const t=S.tarefas.find(t=>t.id===id);
  modal(`<h3>Mover tarefa <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:14px">“${t.txt}”</p>
    ${Object.entries(QUADS).map(([k,q])=>`<button class="btn ghost block" style="margin-bottom:8px;justify-content:flex-start" onclick="confirmaMover('${id}',${k})"><span class="dot" style="width:10px;height:10px;border-radius:50%;background:${q.cor};display:inline-block;margin-right:8px"></span><b>${q.nome}</b> — ${q.sub}</button>`).join('')}`);
}
function confirmaMover(id,q){const t=S.tarefas.find(t=>t.id===id);t.quad=q;save();fechar();renderTarefas();toast('Tarefa movida');}

let _buscaAluno='';
function filtrarAlunos(v){ _buscaAluno=v; renderTurmaList(); }
function addTurma(){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  if(ehProfessor())return toast('Sem permissão');
  const nome=document.getElementById('nT').value.trim();
  if(!nome)return toast('Dê um nome à turma');
  const dias=[...document.querySelectorAll('.nDia:checked')].map(c=>+c.value).sort((a,b)=>a-b);
  if(!dias.length)return toast('Selecione ao menos um dia de aula');
  const hor=(document.getElementById('nHor').value||'').trim();
  const cefr=(document.getElementById('nC')||{}).value||cefrFromNome(nome);
  const t={id:uid(),nome,nivel:document.getElementById('nN').value,cefr,horario:hor,dias,vezesSemana:dias.length};
  if(S.perfil==='professor'){const u=S.usuarios.find(u=>u.nome===S.usuario);t.professor=u&&u.ensina;}
  S.turmas.push(t);
  save();VIEWS.turmas();toast('Turma criada');
}
function renderTurmaList(){
  const list=document.getElementById('turmaList');
  const ts=turmasVisiveis();
  if(!ts.length){list.innerHTML='<div class="card empty"><div class="big">👥</div>Nenhuma turma. Crie a primeira!</div>';return;}
  const f=_normTxt(_buscaAluno||'').trim();
  if(f){   // modo busca: lista achatada de alunos que batem
    const res=[];
    ts.forEach(t=>alunosDa(t.id).forEach(a=>{ if(_normTxt(a.nome).includes(f)) res.push({a,t}); }));
    list.innerHTML = res.length
      ? `<div class="card"><h3>${res.length} aluno(s) encontrado(s)</h3>`+
        res.map(r=>`<div class="check"><span>${r.a.nome} <span class="pill">${r.t.nome}</span></span>
          ${(ehProfessor()||soLeitura())?'':`<button class="btn ghost sm" onclick="delAluno('${r.a.id}')">remover</button>`}</div>`).join('')+`</div>`
      : `<div class="card empty"><div class="big">🔎</div>Nenhum aluno encontrado para “${_buscaAluno}”.</div>`;
    return;
  }
  list.innerHTML=ts.map(t=>{
    const als=alunosDa(t.id);
    const pend=pendenciasDaTurmaParaMim(t.id);
    const selo=pend.length?`<span class="pill" style="background:#fdeaea;color:var(--vermelho)" title="Pendências nesta turma">⚠️ ${pend.length}</span>`:'';
    const prof=t.professor?` · Prof. ${t.professor}`:'';
    const hor=t.horario?` · ${t.horario}`:'';
    const freq=` · ${diasTurmaLabel(t)||((t.vezesSemana===1)?'1x/sem':'2x/sem')}${t.vezesSemana===1?' (falta dupla)':''}`;
    return `<div class="card" style="cursor:pointer" onclick="abrirTurma('${t.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><h3 style="margin:0">${t.nome} ${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''} ${selo}</h3>
          <p class="hint" style="margin:4px 0 0">${als.length} aluno(s)${prof}${hor}${freq}</p></div>
        <span style="font-size:1.7rem;color:var(--azul);line-height:1">›</span>
      </div></div>`;
  }).join('');
}
let painelTurma=null;
function abrirTurma(id){ painelTurma=id; presTurma=matTurma=temaTurma=testeTurma=id; renderPainelTurma(); }

function renderPainelTurma(){
  const id=painelTurma, t=S.turmas.find(x=>x.id===id);

  // ---- métricas do dashboard ----
  const pendentes=S.planos.filter(p=>p.turmaId===id && !p.realizado);
  const prox=pendentes.slice().sort((a,b)=>a.data.localeCompare(b.data))[0];

        <div class="stat"><div class="n">${alertasN}</div><div class="l">alerta(s) de falta</div></div>
        <div class="stat"><div class="n">${temasPend}</div><div class="l">tema(s) com pendência</div></div>
      </div>
      <p class="hint" style="margin:2px 0 0">Última chamada: ${ultTxt}${prox?` · Próximo plano: <b>${prox.titulo}</b> (${brDate(prox.data)})`:''}</p>
    </div>
    <div class="card"><h3>O que você quer fazer?</h3>${soLeitura()?'<p class="hint" style="margin:-2px 0 8px;color:var(--azul)">👁️ Acesso de leitura: você pode <b>consultar</b> a chamada, os planos e os testes, e <b>gerar relatórios</b> — mas alterações não são salvas.</p>':''}
      ${btn('var(--azul)','presenca','📋','Chamada do dia','presença, atraso, saída antecipada, material e tema de casa — tudo aqui')}
      ${btn('var(--azul)','planos','🗒️','Planos de aula','ver o plano pendente e marcar como feito; criar novos')}
      ${btn('var(--roxo)','testes','✏️','Testes','lançar as notas da turma')}
      ${soLeitura()?'':`<button class="btn block" style="background:var(--rosa);justify-content:flex-start;text-align:left;margin-bottom:10px;height:auto;padding:14px 16px" onclick="temaExtraTurma('${id}')">📩 Tema extra<span style="display:block;font-weight:400;font-size:.78rem;opacity:.85;margin-top:2px">atribuir um tema de casa à turma toda ou a alunos específicos</span></button>`}

    </div>

      ${podeCadastrar?'<p class="hint" style="margin:0 0 8px">E-mail do responsável (usado para enviar o relatório da aula).</p>':''}
      ${als.map(a=>`<div style="padding:8px 0;border-bottom:1px dashed var(--linha)"><div style="display:flex;align-items:center;gap:8px"><span style="flex:1">${a.nome}${idadeDe(a.nascimento)!=null?` <span class="pill">${idadeDe(a.nascimento)} anos</span>`:''}${a.arquivado?' <span class="pill" style="background:#eee;color:#888">arquivado</span>':''}</span>${podeCadastrar?`<button class="btn ghost sm" onclick="toggleArquivarAluno('${a.id}')">${a.arquivado?'reativar':'arquivar'}</button><button class="btn ghost sm" style="color:var(--vermelho)" onclick="delAluno('${a.id}')">remover</button>`:''}</div>
        ${a.saldo?`<p class="hint" style="margin:4px 0 0">saldo inicial: ${a.saldo.dadas} aula(s) · ${a.saldo.presencas} presença(s) · ${a.saldo.faltas} falta(s)</p>`:''}
        ${podeCadastrar?`<div class="row" style="margin-top:6px"><div style="flex:2"><input type="email" value="${escAttr(a.email||'')}" placeholder="email.responsavel@exemplo.com" style="font-size:.85rem" onchange="setAlunoEmail('${a.id}',this.value)"></div><div><input type="date" value="${escAttr(a.nascimento||'')}" title="Data de nascimento" style="font-size:.85rem" onchange="setAlunoNascimento('${a.id}',this.value)"></div></div>`:''}${faltasRetroLinha(a)}</div>`).join('')||'<p class="hint">Sem alunos ainda.</p>'}

    ${podeCadastrar?`<div style="display:flex;gap:8px;margin-top:6px"><button class="btn ghost sm" onclick="toggleArquivarTurma('${id}')">${t.arquivada?'Reativar turma':'Arquivar turma'}</button><button class="btn ghost sm" style="color:var(--vermelho)" onclick="delTurma('${id}')">Excluir turma</button></div>`:''}`;
  window.scrollTo(0,0);
}
function _refreshTurmas(){ if(painelTurma) renderPainelTurma(); else renderTurmaList(); }
function setAlunoEmail(id,val){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const a=S.alunos.find(x=>x.id===id);if(!a)return;a.email=(val||'').trim();save();}
function setAlunoNascimento(id,val){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas'); if(ehProfessor())return; const a=S.alunos.find(x=>x.id===id); if(!a)return; a.nascimento=(val||'').trim(); save(); _refreshTurmas(); }
function setFaltasRetro(id,val){
  if(S.perfil!=='direcao')return toast('Só a direção edita as faltas retroativas');
  const a=S.alunos.find(x=>x.id===id); if(!a)return;
  a.faltasRetro=Math.max(0,Math.round(+val||0)); save(); _refreshTurmas();
}
function faltasRetroLinha(a){
  const val=(a.faltasRetro!=null?a.faltasRetro:0);
  const ctrl=(S.perfil==='direcao')
    ? '<input type="number" min="0" value="'+val+'" style="width:70px;text-align:center;font-size:.9rem" onchange="setFaltasRetro(\''+a.id+'\',this.value)">'
    : '<b>'+val+'</b>';
  return '<div style="margin-top:6px;display:flex;align-items:center;gap:8px;background:#fff8e6;border:1px dashed #e0b400;border-radius:8px;padding:6px 8px"><span style="flex:1;font-size:.82rem">⏪ <b>Faltas retroativas</b> <span class="hint">(manual · substitui o histórico do Sponte · removível depois)</span></span>'+ctrl+'</div>';
}
function toggleArquivarAluno(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas'); if(ehProfessor())return toast('Sem permissão'); const a=S.alunos.find(x=>x.id===id); if(!a)return; a.arquivado=!a.arquivado; save(); _refreshTurmas(); montarNav(); toast(a.arquivado?'Aluno arquivado':'Aluno reativado'); }
function toggleArquivarTurma(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas'); if(ehProfessor())return toast('Sem permissão'); const t=S.turmas.find(x=>x.id===id); if(!t)return; t.arquivada=!t.arquivada; if(t.arquivada && painelTurma===id) painelTurma=null; save(); VIEWS.turmas(); montarNav(); toast(t.arquivada?'Turma arquivada':'Turma reativada'); }
function toggleVerArquivadas(){ _verArquivadas=!_verArquivadas; if(painelTurma) renderPainelTurma(); else VIEWS.turmas(); }
/* ---- Importação do Sponte (aditiva, com preview e trava anti-sobrescrita) ---- */
function _matchTurma(nome){ const n=_normTxt(nome).trim(); return S.turmas.find(t=>_normTxt(t.nome).trim()===n); }
function _alunoExiste(turmaId,nome){ const n=_normTxt(nome).trim(); return S.alunos.some(a=>a.turmaId===turmaId && _normTxt(a.nome).trim()===n); }
function _previewImport(){
  let tNovas=0,tExist=0,aNovos=0,aArq=0,aPulados=0;
  SPONTE_IMPORT.turmas.forEach(t=>{ _matchTurma(t.nome)?tExist++:tNovas++; });
  SPONTE_IMPORT.alunos.forEach(a=>{ const t=_matchTurma(a.turma); if(t && _alunoExiste(t.id,a.nome)){aPulados++;return;} aNovos++; if(a.arquivado)aArq++; });
  return {tNovas,tExist,aNovos,aArq,aPulados};
}
function abrirImportSponte(){
  if(ehProfessor())return toast('Sem permissão');
  const p=_previewImport();
  modal(`<h3>⬇️ Importar do Sponte <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:10px">Relatório Sponte de 19/06/2026. A importação é <b>aditiva</b>: cria o que falta e <b>nunca apaga</b> nada que já existe no app.</p>
    <div class="card" style="margin:0 0 12px"><b>O que será feito:</b>
      <p class="hint" style="margin:8px 0 0">• ${p.tNovas} turma(s) nova(s)${p.tExist?` · ${p.tExist} já existente(s) (atualizo horário/professor)`:''}</p>
      <p class="hint" style="margin:4px 0 0">• ${p.aNovos} aluno(s) novo(s)${p.aArq?` (sendo ${p.aArq} arquivado(s))`:''}</p>
      ${p.aPulados?`<p class="hint" style="margin:4px 0 0">• ${p.aPulados} aluno(s) já no app — serão pulados</p>`:''}
    </div>
    <p class="hint" style="margin-bottom:12px">Cada aluno entra com o <b>saldo inicial</b> (aulas dadas, presenças, faltas) com corte em 19/06/2026.</p>
    <button class="btn block" onclick="aplicarImportSponte()">Aplicar importação</button>`);
}
function aplicarImportSponte(){
  if(ehProfessor())return;
  let nt=0,na=0;
  SPONTE_IMPORT.turmas.forEach(it=>{
    let t=_matchTurma(it.nome);
    if(!t){ t={id:uid(),nome:it.nome,nivel:it.nivel,cefr:it.cefr,professor:it.professor,horario:it.horario,dias:it.dias.slice(),vezesSemana:it.vezesSemana,arquivada:!!it.arquivada}; S.turmas.push(t); nt++; }
    else { if(it.professor)t.professor=it.professor; if(it.horario)t.horario=it.horario; if(it.dias&&it.dias.length){t.dias=it.dias.slice();t.vezesSemana=it.vezesSemana;} }
  });
  SPONTE_IMPORT.alunos.forEach(ia=>{
    const t=_matchTurma(ia.turma); if(!t) return;
    if(_alunoExiste(t.id,ia.nome)) return;
    S.alunos.push({id:uid(),nome:ia.nome,turmaId:t.id,saldo:ia.saldo,arquivado:!!ia.arquivado,nascimento:''});
    na++;
  });
  save(); fechar(); VIEWS.turmas(); montarNav();
  toast(`Importado: ${nt} turma(s), ${na} aluno(s)`);
}
function addAluno(turmaId){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  if(ehProfessor())return toast('Sem permissão');
  const inp=document.getElementById('al_'+turmaId);
  const nome=inp.value.trim();if(!nome)return toast('Digite o nome');
  S.alunos.push({id:uid(),nome,turmaId});save();_refreshTurmas();montarNav();toast('Aluno adicionado');
}
function delAluno(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');if(ehProfessor())return toast('Sem permissão');if(confirm('Remover este aluno?')){S.alunos=S.alunos.filter(a=>a.id!==id);marcarExcluido('alunos',id);save();_refreshTurmas();montarNav();}}
function delTurma(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir turma e seus alunos?')){S.alunos.filter(a=>a.turmaId===id).forEach(a=>marcarExcluido('alunos',a.id));marcarExcluido('turmas',id);S.turmas=S.turmas.filter(t=>t.id!==id);S.alunos=S.alunos.filter(a=>a.turmaId!==id);painelTurma=null;save();VIEWS.turmas();montarNav();toast('Turma excluída');}}
function resetarSeguro(){
  modal(`<h3>⚠️ Restaurar dados originais <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:12px">Isto <b>apaga todos os dados atuais</b> (chamadas, temas, planos, testes, comentários…) e volta à base inicial de turmas. Um <b>backup será baixado automaticamente</b> antes de apagar.</p>
    <div class="field"><label class="lbl">Senha de um(a) diretor(a)</label><input type="password" id="resetSenha" placeholder="senha da direção"></div>
    <button class="btn block red" onclick="confirmarReset()">Baixar backup e restaurar</button>`);
  setTimeout(()=>{const i=document.getElementById('resetSenha');if(i)i.focus();},60);
}
async function confirmarReset(){
  const senha=(document.getElementById('resetSenha').value||'');
  if(!senha){ toast('Digite sua senha'); return; }
  const chk=await cloudLogin(S.usuario, senha);   // confirma a senha de quem está logado (direção)
  if(!chk || chk.ok!==true){ toast('Senha incorreta'); return; }
  exportarBackup();                        // baixa o estado atual antes de apagar
  S=seed(); S.usuario=null; S.perfil=null;
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){}
  fechar(); toast('Restaurando…');
  cloudPut(true).finally(()=>setTimeout(()=>location.reload(), 800));
}
function trocarMinhaSenha(){
  modal(`<h3>🔑 Trocar minha senha <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:12px">Defina uma nova senha pessoal (mínimo 4 caracteres).</p>
    <div class="field"><label class="lbl">Nova senha</label><input type="password" id="ms1" placeholder="nova senha"></div>
    <div class="field"><label class="lbl">Repita a nova senha</label><input type="password" id="ms2" placeholder="repita a senha"></div>
    <button class="btn block" onclick="confirmarTrocaSenha()">Salvar nova senha</button>`);
  setTimeout(()=>{const i=document.getElementById('ms1');if(i)i.focus();},60);
}
async function confirmarTrocaSenha(){
  const a=(document.getElementById('ms1').value||'');
  const b=(document.getElementById('ms2').value||'');
  if(a.length<4){ toast('A senha precisa ter ao menos 4 caracteres'); return; }
  if(a!==b){ toast('As senhas não conferem'); return; }
  const r=await cloudTrocarSenha(a);
  if(r && r.ok){ fechar(); toast('Senha alterada ✓'); }
  else if(r && r.erro==='sessao'){ toast('Sessão expirada. Saia e entre novamente.'); }
  else if(r && r.erro==='curta'){ toast('A senha precisa ter ao menos 4 caracteres'); }
  else { toast('Não foi possível alterar agora. Tente de novo.'); }
}

function salvarConfig(){
  S.config=S.config||{};
  S.config.escolaEmail=(document.getElementById('cfgEmail').value||'').trim();
  S.config.assinatura=document.getElementById('cfgAssin').value;
  save(); toast('Assinatura salva');
}
function exportarBackup(){
  const dados=JSON.stringify(Object.assign({},S,{usuario:null,perfil:null}));
  const blob=new Blob([dados],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-togethere-'+hoje()+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},200);
  toast('Backup baixado');
}
function importarBackup(input){
  const f=input.files&&input.files[0]; if(!f){return;}
  const r=new FileReader();
  r.onload=function(){
    let obj;
    try{ obj=JSON.parse(r.result); }catch(e){ toast('Arquivo inválido (não é um backup válido)'); return; }
    if(!obj || !obj.usuarios || !obj.alunos){ toast('Arquivo não parece um backup do app'); return; }
    if(!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Deseja continuar?')) return;
    S=migrar(obj); S.usuario=null; S.perfil=null;
    localStorage.setItem(KEY, JSON.stringify(S));
    toast('Restaurando…');
    cloudPut(true).then(function(){ location.reload(); });
  };
  r.readAsText(f); input.value='';
}
async function salvarSenha(i){
  const nova=(document.getElementById('sn_'+i).value||'').trim();
  if(nova.length<4)return toast('A senha precisa ter ao menos 4 caracteres');
  const alvo=S.usuarios[i].nome;
  const r=await cloudResetarSenha(alvo, nova);
  if(r && r.ok){ const inp=document.getElementById('sn_'+i); if(inp) inp.value=''; toast('Senha definida para '+alvo); }
  else if(r && r.erro==='permissao'){ toast('Apenas a direção pode redefinir senhas'); }
  else if(r && r.erro==='sessao'){ toast('Sessão expirada. Saia e entre novamente.'); }
  else if(r && r.erro==='dados'){ toast('Senha muito curta'); }
  else { toast('Não foi possível salvar agora. Tente de novo.'); }
}
function addUsuario(){
  const nome=document.getElementById('nuNome').value.trim();
  const senha=(document.getElementById('nuSenha').value||'').trim();
  if(!nome)return toast('Dê um nome de acesso');
  if(senha.length<4)return toast('Defina uma senha inicial (mín. 4 caracteres)');
  if(S.usuarios.some(u=>u.nome.toLowerCase()===nome.toLowerCase()))return toast('Já existe um usuário com esse nome');
  const perfil=document.getElementById('nuPerfil').value;
  const ensina=document.getElementById('nuEnsina').value.trim()||null;
  S.usuarios.push({nome,perfil,ensina});
  save();
  cloudResetarSenha(nome, senha).then(r=>{
    if(r && r.ok) toast('Usuário criado e senha definida');
    else toast('Usuário criado, mas defina a senha pela linha dele (botão Salvar)');
    VIEWS.acessos();
  });
}

/* =========================================================================
   b23 — Importar notas (TEST 1) da planilha de desempenho
   ========================================================================= */
function _nmKey(s){ return _normTxt(s).replace(/\s+/g,' ').trim(); }
function _tituloNome(s){ const low=new Set(['de','da','do','das','dos','e']); return String(s||'').toLowerCase().split(/\s+/).filter(Boolean).map((w,i)=>(i>0&&low.has(w))?w:(w.charAt(0).toUpperCase()+w.slice(1))).join(' '); }
function _profKey(s){ const k=_nmKey(s); return ({fe:'fernanda',mari:'mariana'})[k]||k; }
function _acharTurmaImp(s){
  let c=S.turmas.filter(t=>!t.arquivada && _profKey(t.professor||'')===_profKey(s.prof) && (t.cefr||'').toUpperCase()===(s.cefr||'').toUpperCase());
  if(c.length>1 && s.nivel) c=c.filter(t=>t.nivel===s.nivel);
  return c.length===1 ? c[0].id : '';
}
function _matchAlunoImp(nome, alunos){
  const xn=_nmKey(nome); if(!xn) return null;
  let m=alunos.find(a=>_nmKey(a.nome)===xn); if(m) return m;
  const pre=alunos.filter(a=>{const an=_nmKey(a.nome); return an===xn||an.startsWith(xn+' ');}); if(pre.length===1) return pre[0];
  const xf=xn.split(' ')[0]; const ff=alunos.filter(a=>_nmKey(a.nome).split(' ')[0]===xf); if(ff.length===1) return ff[0];
  const toks=xn.split(' '); const cont=alunos.filter(a=>{const at=new Set(_nmKey(a.nome).split(' ')); return toks.every(t=>at.has(t));}); if(cont.length===1) return cont[0];
  return null;
}
function abrirImportTestes(){
  if(ehProfessor())return toast('Sem permissão');
  const blocos=TESTES_IMPORT.sheets.map((s,i)=>{
    const tid=_acharTurmaImp(s);
    const tsel=`<select id="itT_${i}" onchange="_itRows(${i})"><option value="">— escolher turma —</option>${turmasVisiveis().slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(t=>`<option value="${t.id}" ${t.id===tid?'selected':''}>${t.nome}</option>`).join('')}</select>`;
    return `<details ${tid?'':'open'} style="border:1px solid var(--linha);border-radius:10px;padding:8px 12px;margin-bottom:8px">
      <summary style="cursor:pointer;font-weight:600">📄 ${s.aba} <span class="hint">(${s.alunos.length} notas)</span></summary>
      <div class="field" style="margin-top:8px"><label class="lbl">Turma no app</label>${tsel}</div>
      <div id="itRows_${i}"></div>
    </details>`;
  }).join('');
  modal(`<h3>📊 Importar notas — TEST 1 <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:8px">Confira a turma e os alunos. Quem está com ⚠ não casou — você pode escolher o aluno certo, criar um novo ou ignorar. Nada é apagado: só adiciona/atualiza o TEST 1.</p>
    <div class="field"><label class="lbl">Data do TEST 1</label><input type="date" id="itData" value="${hoje()}"></div>
    <div style="max-height:52vh;overflow:auto;margin-top:8px">${blocos}</div>
    <button class="btn block" onclick="aplicarImportTestes()" style="margin-top:12px">Aplicar importação</button>`);
  TESTES_IMPORT.sheets.forEach((_,i)=>_itRows(i));
}
function _itRows(i){
  const cont=document.getElementById('itRows_'+i); if(!cont) return;
  const s=TESTES_IMPORT.sheets[i];
  const tid=(document.getElementById('itT_'+i)||{}).value||'';
  if(!tid){ cont.innerHTML='<p class="hint" style="margin:6px 0">Selecione a turma para mapear os alunos.</p>'; return; }
  const alunos=alunosDa(tid);
  cont.innerHTML=s.alunos.map((al,j)=>{
    let m=null;
    if(!al.criar){ m = al.alvo ? (alunos.find(a=>_nmKey(a.nome)===_nmKey(al.alvo))||null) : _matchAlunoImp(al.n, alunos); }
    const def = al.criar ? '__new__' : (m? m.id : (alunos.length===0?'__new__':'__skip__'));
    const resolvido = al.criar || !!m || alunos.length===0;
    const warn = resolvido ? '' : ' style="background:#fff6e5;border-radius:8px;padding:4px 6px"';
    const nomeCriar=_tituloNome(al.n);
    const sel=`<select id="itA_${i}_${j}"><option value="__skip__" ${def==='__skip__'?'selected':''}>— ignorar —</option><option value="__new__" ${def==='__new__'?'selected':''}>➕ criar "${nomeCriar}"</option>${alunos.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(a=>`<option value="${a.id}" ${a.id===def?'selected':''}>${a.nome}</option>`).join('')}</select>`;
    return `<div class="row"${warn}><div style="flex:1;font-size:.9rem">${resolvido?'✓':'⚠'} ${al.n}${al.criar?' <span class="hint">(novo)</span>':''}</div><div style="flex:1">${sel}</div></div>`;
  }).join('');
}
function aplicarImportTestes(){
  if(ehProfessor())return toast('Sem permissão');
  const data=(document.getElementById('itData')||{}).value||hoje();
  let nNotas=0,nNovos=0,nTurmas=0,nSkip=0;
  TESTES_IMPORT.sheets.forEach((s,i)=>{
    const tsel=document.getElementById('itT_'+i); if(!tsel||!tsel.value) return;
    const tid=tsel.value;
    const t=testeDaTurma(tid, TESTES_IMPORT.numero||1, true); t.data=data;
    let usou=false;
    s.alunos.forEach((al,j)=>{
      const sel=document.getElementById('itA_'+i+'_'+j); if(!sel) return;
      let aid=sel.value;
      if(aid==='__skip__'){ nSkip++; return; }
      if(!aid){ return; }
      if(aid==='__new__'){
        const nm=_tituloNome(al.n);
        const ex=S.alunos.find(a=>a.turmaId===tid && !a.arquivado && _nmKey(a.nome)===_nmKey(nm));
        if(ex){ aid=ex.id; } else { const novo={id:uid(),nome:nm,turmaId:tid,arquivado:false,nascimento:''}; S.alunos.push(novo); aid=novo.id; nNovos++; }
      } else if(al.corrige && al.alvo){
        const a=S.alunos.find(x=>x.id===aid); if(a && _nmKey(a.nome)===_nmKey(al.alvo)) a.nome=al.corrige;
      }
      const notas={}; SKILLS.forEach(sk=>{ const v=al.g[sk]; if(typeof v==='number'&&!isNaN(v)) notas[sk]=Math.max(0,Math.min(100,Math.round(v))); });
      t.notas[aid]=notas; nNotas++; usou=true;
    });
    if(usou) nTurmas++;
  });
  save(); fechar();
  toast(`Importado: ${nNotas} aluno(s) em ${nTurmas} turma(s)${nNovos?` · ${nNovos} criado(s)`:''}${nSkip?` · ${nSkip} ignorado(s)`:''}`);
  if(rota==='turmas') VIEWS.turmas();
}

/* =========================================================================

const TRILHAS={
  kids:{label:'KIDS', niveis:['Pré A1','Pré A1+','A1','A1+']},
  junior:{label:'JUNIOR', niveis:['A1','A1+','A2','A2+']},
  teens:{label:'TEENS', niveis:['A1','A2','B1','B1+']},
  adults:{label:'ADULTS', niveis:['Pré A1','A1','A2','B1','B1+']},
  avancado:{label:'Sem faixa etária', niveis:['B2','C1','C1+','C2']}
};
function _selTurmasOpts(sel){ return turmasVisiveis().slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.nome}</option>`).join(''); }
VIEWS.gturmas=()=>{
  const v=document.getElementById('view');
  if(ehProfessor()){ v.innerHTML='<p class="sub">Sem permissão.</p>'; return; }
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--azul)"></span><h2 class="display">Trocar / criar turma</h2></div>
    <p class="sub">Mova um aluno de uma turma para outra, ou crie a próxima turma quando uma terminar.</p>
    <div class="card"><h3>🔄 Trocar aluno de turma</h3>
      <div class="field"><label class="lbl">Turma de origem</label><select id="gtOrigem" onchange="preencherGtAlunos()">${_selTurmasOpts()}</select></div>
      <div class="field"><label class="lbl">Aluno</label><select id="gtAluno"></select></div>
      <div class="field"><label class="lbl">Turma de destino</label><select id="gtDestino">${_selTurmasOpts()}</select></div>
      <button class="btn" onclick="moverAluno()">Mover aluno</button>
    </div>

      <p class="hint">Cria uma turma do próximo nível e, se quiser, traz os alunos da turma que terminou.</p>
      <button class="btn" onclick="abrirCriarProxima()">Criar próxima turma</button>
    </div>`;
  preencherGtAlunos();
};
function preencherGtAlunos(){
  const o=document.getElementById('gtOrigem'); const sel=document.getElementById('gtAluno'); if(!o||!sel)return;
  const als=alunosDa(o.value).slice().sort((a,b)=>a.nome.localeCompare(b.nome));
  sel.innerHTML=als.length?als.map(a=>`<option value="${a.id}">${a.nome}</option>`).join(''):'<option value="">(turma sem alunos)</option>';
}
function moverAluno(){
  if(ehProfessor())return toast('Sem permissão');
  const aid=document.getElementById('gtAluno').value, dest=document.getElementById('gtDestino').value, orig=document.getElementById('gtOrigem').value;
  if(!aid)return toast('Selecione um aluno');
  if(!dest)return toast('Selecione a turma de destino');
  if(dest===orig)return toast('Origem e destino são a mesma turma');
  const a=S.alunos.find(x=>x.id===aid); if(!a)return;
  const td=S.turmas.find(x=>x.id===dest);
  a.turmaId=dest; save(); montarNav(); VIEWS.gturmas();
  toast(`${a.nome} movido para ${td?td.nome:'a turma'}`);
}
function abrirCriarProxima(){
  if(ehProfessor())return toast('Sem permissão');
  const ts=turmasVisiveis().slice().sort((a,b)=>a.nome.localeCompare(b.nome));
  modal(`<h3>➕ Criar próxima turma <button class="close" onclick="fechar()">×</button></h3>
    <div class="field"><label class="lbl">Trilha</label><select id="cpTrilha" onchange="_cpNiveis()">${Object.keys(TRILHAS).map(k=>`<option value="${k}">${TRILHAS[k].label}</option>`).join('')}</select></div>
    <div class="field"><label class="lbl">Nível</label><select id="cpNivel"></select></div>
    <div class="field"><label class="lbl">Nome da turma</label><input type="text" id="cpNome" placeholder="Ex: A2 JUNIOR TARDINHA (2026)"></div>
    <div class="row"><div style="flex:2"><label class="lbl">Professor (opcional)</label><input type="text" id="cpProf" placeholder="Nome do professor"></div>
      <div style="flex:1"><label class="lbl">Horário</label><input type="text" id="cpHor" placeholder="18:15–19:30"></div></div>
    <div class="field" style="margin-top:8px"><label class="lbl">Dias de aula</label><div style="display:flex;flex-wrap:wrap;gap:6px">${[1,2,3,4,5,6].map(d=>`<label style="display:flex;align-items:center;gap:5px;font-size:.88rem;border:1px solid var(--linha);border-radius:9px;padding:6px 10px;cursor:pointer"><input type="checkbox" class="cpDia" value="${d}"> ${DIAS_SEMANA[d]}</label>`).join('')}</div></div>
    <div class="field" style="margin-top:8px"><label class="lbl">Trazer alunos de (opcional)</label><select id="cpOrigem"><option value="">— não trazer —</option>${ts.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}</select><p class="hint" style="margin:4px 0 0">Move os alunos ativos da turma escolhida para a nova.</p></div>
    <button class="btn block" onclick="criarProximaTurma()" style="margin-top:12px">Criar turma</button>`);
  _cpNiveis();
}
function _cpNiveis(){ const k=document.getElementById('cpTrilha').value; const sel=document.getElementById('cpNivel'); if(sel) sel.innerHTML=TRILHAS[k].niveis.map(n=>`<option value="${n}">${n}</option>`).join(''); }
function criarProximaTurma(){
  if(ehProfessor())return toast('Sem permissão');
  const trilha=document.getElementById('cpTrilha').value;
  const cefr=document.getElementById('cpNivel').value;
  const nome=(document.getElementById('cpNome').value||'').trim();
  if(!nome)return toast('Dê um nome à turma');
  const dias=[...document.querySelectorAll('.cpDia:checked')].map(c=>+c.value).sort((a,b)=>a-b);
  if(!dias.length)return toast('Selecione ao menos um dia de aula');
  const prof=(document.getElementById('cpProf').value||'').trim();
  const hor=(document.getElementById('cpHor').value||'').trim();
  const nivel = trilha==='avancado' ? 'adults' : trilha;
  const t={id:uid(),nome,nivel,cefr,horario:hor,dias,vezesSemana:dias.length,arquivada:false};
  if(prof) t.professor=prof;
  S.turmas.push(t);
  let movidos=0; const origem=document.getElementById('cpOrigem').value;
  if(origem){ S.alunos.forEach(a=>{ if(a.turmaId===origem && !a.arquivado){ a.turmaId=t.id; movidos++; } }); }
  save(); fechar(); montarNav();
  if(rota==='gturmas') VIEWS.gturmas(); else ir('gturmas');
  toast(`Turma criada${movidos?` · ${movidos} aluno(s) trazido(s)`:''}`);
}
/* ---- Aniversariantes da semana (pop-up) ---- */
function aniversariantesSemana(){
  const hoje=new Date(); hoje.setHours(0,0,0,0); const res=[];
  let ids;
  if(S.perfil==='professor'){ const u=S.usuarios.find(x=>x.nome===S.usuario); ids=new Set(S.turmas.filter(t=>!t.arquivada && t.professor===(u&&u.ensina)).map(t=>t.id)); }
  else { ids=new Set(S.turmas.filter(t=>!t.arquivada).map(t=>t.id)); }
  (S.alunos||[]).forEach(a=>{
    if(a.arquivado || !a.nascimento || !ids.has(a.turmaId)) return;
    const p=String(a.nascimento).split('-').map(Number); if(p.length<3||!p[1]||!p[2]) return;
    const yy=p[0],mm=p[1],dd=p[2];
    for(let i=0;i<7;i++){ const d=new Date(hoje); d.setDate(hoje.getDate()+i);
      if(d.getMonth()+1===mm && d.getDate()===dd){ const t=S.turmas.find(x=>x.id===a.turmaId);
        res.push({nome:a.nome, turma:t?t.nome:'', dia:new Date(d), faz:d.getFullYear()-yy}); break; }
    }
  });
  res.sort((a,b)=>a.dia-b.dia);
  return res;
}
let _avisoAniv=false;
function mostrarAniversariantes(){
  if(_avisoAniv) return; _avisoAniv=true;
  const lista=aniversariantesSemana(); if(!lista.length) return;
  modal(`<h3>🎂 Aniversariantes da semana <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:10px">Alunos que fazem aniversário nos próximos 7 dias:</p>
    ${lista.map(o=>`<div class="check"><span>🎉 <b>${o.nome}</b> — ${brDate(ymd(o.dia))} (${DIAS_SEMANA[o.dia.getDay()]})${(o.faz>0&&o.faz<130)?` · faz ${o.faz}`:''} <span class="pill">${o.turma}</span></span></div>`).join('')}
    <button class="btn block" onclick="fechar()" style="margin-top:12px">Fechar</button>`);
}

(async function boot(){
  const av=document.getElementById('appVer'); if(av) av.textContent=APP_VERSAO;
  _iniciarFilaSync();                       // fila de sincronização offline (reenvia ao voltar a conexão)
  // existe sessão guardada neste aparelho?
  let tk=null,tuser=null,tperfil=null;
  try{ tk=localStorage.getItem(TKEY); tuser=localStorage.getItem(UKEY); tperfil=localStorage.getItem(PKEY); }catch(e){}
  if(tk && tuser && tperfil){
    CLOUD_TOKEN=tk;
    const lp=document.getElementById('loginPanel'); if(lp) lp.innerHTML='<p class="hint" style="text-align:center">Reconectando…</p>';
    const res=await cloudGet(8000);
    if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
      let temPend=false; try{ temPend=!!localStorage.getItem(PEND_KEY); }catch(e){}
      let nova=migrar(res.state);
      if(temPend){                           // havia edições offline não enviadas → MESCLA (local vence), não perde
        let loc=null; try{ loc=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
        if(loc){ nova=mergeEstados(nova, migrar(loc)); _pendenteSync=true; }
      }
      S=nova;
      try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){}
      marcarSync(_pendenteSync?'...':'ok');
    } else if(res.auth){
      // token expirado/cancelado → limpa a sessão e pede login
      CLOUD_TOKEN=null;
      try{ localStorage.removeItem(TKEY); localStorage.removeItem(UKEY); localStorage.removeItem(PKEY); }catch(e){}
      S.usuario=null; S.perfil=null; renderLogin(); return;
    } else {
      try{ if(localStorage.getItem(PEND_KEY)) _pendenteSync=true; }catch(e){}
      marcarSync('off');                     // offline → entra com o estado local (NUNCA sobrescreve a nuvem)
    }
    const u=(S.usuarios||[]).find(x=>x.nome===tuser) || {nome:tuser, perfil:tperfil, ensina:null};
    S.usuario=u.nome; S.perfil=tperfil;
    aplicarLogin(u);
    if(_pendenteSync) setTimeout(flushSync,1200);   // sobe o que ficou pendente do offline
    return;
  }
  // sem sessão → tela de login
  S.usuario=null; S.perfil=null;
  renderLogin();
})();

/* PWA: registra o service worker (offline + instalável) */
function mostrarAtualizacao(){
  if(document.getElementById('updBanner')) return;
  var b=document.createElement('div');
  b.id='updBanner';
  b.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:var(--azul);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 26px rgba(0,0,0,.28);font-size:.92rem;max-width:560px;margin:0 auto';
  b.innerHTML='<span style="flex:1">✨ <b>Nova versão disponível.</b></span>'+
    '<button onclick="location.reload()" style="background:var(--amarelo);color:#1a1a1a;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer">Atualizar</button>'+
    '<button onclick="var e=document.getElementById(\'updBanner\');if(e)e.remove()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:8px 10px;cursor:pointer">Depois</button>';
  document.body.appendChild(b);
}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      try{ reg.update(); }catch(e){}
      setInterval(function(){ try{ reg.update(); }catch(e){} }, 60*60*1000);   // checa de hora em hora (sessões abertas o dia todo)
      reg.addEventListener('updatefound', function(){
        var nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller){ mostrarAtualizacao(); }  // 'installed' + já há controlador = atualização (não 1ª instalação)
        });
      });
    }).catch(function(){});
  });
}
