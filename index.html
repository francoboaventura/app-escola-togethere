<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Togethere · Gestão Escolar</title>
<!-- PWA: app instalável no celular/tablet -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#005EAF" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Togethere" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Zilla+Slab:ital,wght@1,600;1,700&display=swap" rel="stylesheet" />
<style>
/* ===================== Togethere — Identidade NUSA ===================== */
:root{
  --azul:#005EAF;       /* principal */
  --marinho:#002B64;    /* profundo */
  --vermelho:#E52524;   /* alerta */
  --amarelo:#FFC800;    /* destaque */
  --rosa:#FF005F;       /* apoio */
  --laranja:#FF2A00;    /* apoio */
  --roxo:#DF6DFF;       /* apoio */

  --bg:#F4F6FB;
  --card:#FFFFFF;
  --tinta:#15233B;
  --tinta-suave:#5A6B86;
  --linha:#E4E9F2;
  --ok:#16A07A;

  --r:16px;
  --r-sm:11px;
  --sombra:0 8px 30px rgba(0,43,100,.08);
  --sombra-sm:0 2px 10px rgba(0,43,100,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Urbanist',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tinta);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;font-weight:600;line-height:1.2}
.display{font-family:'Zilla Slab',serif;font-style:italic;font-weight:600}
button{font-family:'Poppins',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Urbanist',sans-serif}
a{color:inherit}

/* feijão — assinatura da marca */
.feijao{display:inline-block;border-radius:62% 38% 55% 45% / 55% 48% 52% 45%}

/* ===================== LOGIN ===================== */
#login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 100% 0%, #0a6dc4 0%, var(--azul) 38%, var(--marinho) 100%);
  overflow:hidden;z-index:50;
}
#login .blob{position:absolute;opacity:.9;filter:saturate(1.1)}
#login .b1{width:230px;height:230px;background:var(--amarelo);top:-60px;left:-50px;transform:rotate(18deg)}
#login .b2{width:170px;height:170px;background:var(--rosa);bottom:-40px;left:12%;transform:rotate(-12deg)}
#login .b3{width:140px;height:140px;background:var(--roxo);top:14%;right:8%;transform:rotate(30deg)}
#login .b4{width:90px;height:90px;background:var(--vermelho);bottom:18%;right:18%}
.login-card{
  position:relative;z-index:2;width:min(440px,92vw);background:var(--card);
  border-radius:26px;padding:38px 34px;box-shadow:0 30px 80px rgba(0,20,55,.4);
  animation:rise .5s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand .mark{width:42px;height:42px;background:var(--azul);position:relative;flex:none}
.brand .mark::after{content:"";position:absolute;width:15px;height:15px;background:var(--amarelo);border-radius:60% 40% 55% 45%;right:-4px;bottom:-4px}
.brand .name{font-family:'Poppins';font-weight:700;font-size:1.45rem;letter-spacing:-.5px}
.brand .name b{color:var(--azul)}
/* logomarca oficial (arquivo logo.png na pasta do projeto) */
.logo-img{height:46px;width:auto;display:block}
.wm{font-family:'Poppins';font-weight:700;font-size:1.4rem;letter-spacing:-.5px;color:var(--marinho)}
.wm b{color:var(--azul)}
.tagline{font-family:'Zilla Slab';font-style:italic;font-weight:600;color:var(--tinta-suave);margin:2px 0 26px;font-size:1.02rem}
.login-card h2{font-size:1.06rem;margin-bottom:14px}
.perfis{display:grid;gap:12px}
.perfil-btn{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:#fff;border:1.5px solid var(--linha);border-radius:var(--r);padding:14px 16px;
  transition:.15s;font-size:.97rem;color:var(--tinta);
}
.perfil-btn:hover{border-color:var(--azul);transform:translateY(-2px);box-shadow:var(--sombra-sm)}
.perfil-btn .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:1.25rem;flex:none}
.perfil-btn small{display:block;color:var(--tinta-suave);font-size:.8rem;font-family:'Urbanist'}
.perfil-btn b{font-family:'Poppins';font-weight:600}
.grp-login{font-family:'Poppins';font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tinta-suave);margin:16px 2px 8px}
.grp-login:first-child{margin-top:4px}

/* ===================== APP SHELL ===================== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}

/* Sidebar */
.side{
  width:248px;background:linear-gradient(180deg,var(--marinho),#001a3f);color:#fff;
  display:flex;flex-direction:column;flex:none;position:sticky;top:0;height:100vh;
}
.side .top{padding:22px 20px 14px}
.side .brand .name{color:#fff;font-size:1.2rem}
.side .brand .name b{color:var(--amarelo)}
.side .brand{background:#fff;border-radius:12px;padding:7px 11px;display:inline-flex;align-items:center}
.side .logo-img{height:28px}
.side .wm{font-size:1.12rem}
.side .brand .mark{width:34px;height:34px}
.nav{flex:1;overflow-y:auto;padding:8px 12px 20px}
.nav .grp{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:#7f94b8;margin:16px 10px 6px;font-family:'Poppins';font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  color:#c5d3ea;font-size:.92rem;font-family:'Poppins';font-weight:500;margin-bottom:2px;
  transition:.13s;border:none;background:none;width:100%;text-align:left;cursor:pointer;
}
.nav button .em{font-size:1.05rem;width:20px;text-align:center}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:var(--azul);color:#fff}
.nav button .badge{margin-left:auto;background:var(--vermelho);color:#fff;font-size:.7rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side .foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:.82rem;color:#9fb1d1}
.side .foot button{background:none;border:none;color:#9fb1d1;font-size:.82rem;display:flex;align-items:center;gap:8px;width:100%;padding:6px 0}
.side .foot button:hover{color:#fff}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--card);border-bottom:1px solid var(--linha);padding:16px 28px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;
}
.topbar h1{font-size:1.18rem}
.topbar .crumb{font-size:.8rem;color:var(--tinta-suave);font-family:'Poppins'}
.topbar .me{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.86rem;color:var(--tinta-suave)}
.topbar .me .dot{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:600;font-family:'Poppins';font-size:.85rem}
.content{padding:26px 28px 60px;max-width:1180px;width:100%}

/* Hamburger (mobile) */
.burger{display:none;background:none;border:none;font-size:1.4rem;color:var(--marinho)}

/* ===================== COMPONENTES ===================== */
.section-title{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.section-title .fj{width:18px;height:18px;flex:none}
.section-title h2{font-size:1.32rem}
.sub{color:var(--tinta-suave);font-size:.92rem;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--sombra-sm);padding:20px;margin-bottom:18px}
.card h3{font-size:1.02rem;margin-bottom:4px}
.card .hint{font-size:.84rem;color:var(--tinta-suave);margin-bottom:14px}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

label.lbl{display:block;font-family:'Poppins';font-weight:500;font-size:.85rem;margin:0 0 6px;color:var(--tinta)}
.field{margin-bottom:14px}
input[type=text],input[type=date],input[type=number],textarea,select{
  width:100%;border:1.5px solid var(--linha);border-radius:var(--r-sm);padding:11px 13px;
  font-size:.94rem;background:#fff;color:var(--tinta);transition:.13s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,94,175,.12)}
textarea{resize:vertical;min-height:90px;line-height:1.5}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:160px}

.btn{
  display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;
  border-radius:var(--r-sm);padding:11px 18px;font-weight:600;font-size:.9rem;transition:.13s;
}
.btn:hover{background:#0a6dc4;transform:translateY(-1px)}
.btn.ghost{background:#fff;color:var(--azul);border:1.5px solid var(--linha)}
.btn.ghost:hover{border-color:var(--azul);background:#f2f7fd}
.btn.amarelo{background:var(--amarelo);color:var(--marinho)}
.btn.amarelo:hover{background:#ffd633}
.btn.red{background:var(--vermelho)}
.btn.red:hover{background:#c91f1e}
.btn.sm{padding:7px 12px;font-size:.82rem}
.btn.block{width:100%;justify-content:center}

.tag{display:inline-flex;align-items:center;gap:5px;font-family:'Poppins';font-weight:600;font-size:.72rem;padding:3px 10px;border-radius:20px}
.tag.kids{background:#fff0f6;color:var(--rosa)}
.tag.junior{background:#fff8e0;color:#b88600}
.tag.teens{background:#eaf3ff;color:var(--azul)}
.tag.adults{background:#f4ecff;color:#9333c7}
.tag.talking{background:#ffeee9;color:var(--laranja)}
.pill{font-size:.74rem;font-family:'Poppins';font-weight:600;padding:3px 9px;border-radius:20px;background:#eef2f8;color:var(--tinta-suave)}

table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;font-family:'Poppins';font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--tinta-suave);padding:8px 10px;border-bottom:1px solid var(--linha)}
td{padding:10px;border-bottom:1px solid var(--linha);vertical-align:middle}
tr:last-child td{border-bottom:none}

.seg{display:inline-flex;background:#eef2f8;border-radius:10px;padding:3px}
.seg button{background:none;border:none;padding:6px 13px;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--tinta-suave)}
.seg button.on-p{background:var(--ok);color:#fff}
.seg button.on-f{background:var(--vermelho);color:#fff}
.seg button.on-ok{background:var(--ok);color:#fff}
.seg button.on-mid{background:var(--amarelo);color:#4a3a00}
.seg button.on-no{background:var(--vermelho);color:#fff}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0 4px}
.dash-grid .stat{background:#f3f8ff;border:1px solid #e6eefb;border-radius:12px;padding:12px;text-align:center}
.dash-grid .stat .n{font-size:1.5rem;font-weight:800;color:var(--azul);line-height:1}
.dash-grid .stat .l{font-size:.74rem;color:var(--tinta-suave);margin-top:3px}

.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--linha)}
.check:last-child{border-bottom:none}
.check input{width:20px;height:20px;accent-color:var(--azul);flex:none;cursor:pointer}
.check span{flex:1}
.check.done span{text-decoration:line-through;color:var(--tinta-suave)}
.check .x{background:none;border:none;color:var(--tinta-suave);font-size:1rem;opacity:.5}
.check .x:hover{opacity:1;color:var(--vermelho)}

.empty{text-align:center;padding:34px 20px;color:var(--tinta-suave)}
.empty .big{font-size:2rem;margin-bottom:8px;opacity:.5}

.alert-card{display:flex;gap:14px;align-items:flex-start;border-left:4px solid var(--vermelho);background:#fff;border-radius:var(--r-sm);padding:15px 16px;margin-bottom:12px;box-shadow:var(--sombra-sm)}
.alert-card.mat{border-left-color:var(--laranja)}
.alert-card .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;font-size:1.1rem}
.alert-card .ic.falta{background:#fdeaea;color:var(--vermelho)}
.alert-card .ic.mat{background:#ffeee5;color:var(--laranja)}
.alert-card .info{flex:1}
.alert-card .info b{font-family:'Poppins'}
.alert-card .info p{font-size:.86rem;color:var(--tinta-suave);margin-top:2px}
.alert-card .acts{display:flex;flex-direction:column;gap:6px}

/* Eisenhower */
.emat{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.quad{border-radius:var(--r);padding:16px;min-height:180px;border:1.5px solid var(--linha);background:#fff}
.quad h4{display:flex;align-items:center;gap:8px;font-size:.95rem;margin-bottom:3px}
.quad .qsub{font-size:.76rem;color:var(--tinta-suave);margin-bottom:12px}
.quad .dot{width:11px;height:11px;border-radius:50%}
.quad.q1{border-top:4px solid var(--vermelho)}
.quad.q2{border-top:4px solid var(--azul)}
.quad.q3{border-top:4px solid var(--amarelo)}
.quad.q4{border-top:4px solid var(--tinta-suave)}
.task{background:#f7f9fc;border:1px solid var(--linha);border-radius:10px;padding:9px 11px;margin-bottom:8px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start}
.task .grab{cursor:grab;color:var(--tinta-suave);font-size:.8rem;padding-top:2px}
.task .t-txt{flex:1}
.task .mv{font-size:.72rem;color:var(--azul);background:none;border:none;font-family:'Poppins';font-weight:600}
.task .del{background:none;border:none;color:var(--tinta-suave);opacity:.5;font-size:.85rem}
.task .del:hover{opacity:1;color:var(--vermelho)}
.task.feito{opacity:.55}.task.feito .t-txt{text-decoration:line-through}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--marinho);color:#fff;padding:13px 22px;border-radius:12px;font-family:'Poppins';font-weight:500;font-size:.9rem;box-shadow:0 12px 40px rgba(0,20,55,.35);opacity:0;transition:.25s;z-index:99;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,20,55,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--r);width:min(520px,96vw);max-height:90vh;overflow:auto;padding:24px;box-shadow:var(--sombra)}
.modal h3{margin-bottom:14px;display:flex;align-items:center;gap:9px}
.modal .close{margin-left:auto;background:none;border:none;font-size:1.3rem;color:var(--tinta-suave);cursor:pointer}

.gen-box{background:#f7f9fc;border:1.5px dashed var(--linha);border-radius:var(--r-sm);padding:16px;font-size:.92rem;line-height:1.65;white-space:pre-wrap;color:var(--tinta);min-height:80px}

.kpi{display:flex;align-items:center;gap:14px}
.kpi .num{font-family:'Poppins';font-weight:700;font-size:1.9rem;line-height:1}
.kpi .k-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.3rem;flex:none}
.kpi small{color:var(--tinta-suave);font-size:.82rem;display:block;margin-top:3px}

@media(max-width:860px){
  .side{position:fixed;left:-260px;z-index:40;transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .side.open{left:0}
  .burger{display:block}
  .g2,.g3{grid-template-columns:1fr}
  .emat{grid-template-columns:1fr}
  .content{padding:18px 16px 50px}
  .topbar{padding:14px 16px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <span class="feijao blob b1"></span>
  <span class="feijao blob b2"></span>
  <span class="feijao blob b3"></span>
  <span class="feijao blob b4"></span>
  <div class="login-card">
    <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
    <div class="tagline">inglês para chegar lá</div>
    <h2 id="loginTitulo">Entrar</h2>
    <div id="loginPanel"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="shell">
    <aside class="side" id="side">
      <div class="top">
        <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">
        <div id="syncDot" onclick="puxarDaNuvem()" style="font-size:.72rem;color:#9fb1d1;margin-bottom:8px;cursor:pointer" title="Clique para puxar os dados mais recentes da nuvem">☁️ …</div>
        <button onclick="puxarDaNuvem()" style="margin-bottom:8px">🔄 Atualizar (puxar da nuvem)</button>
        <div id="perfilLabel" style="margin-bottom:8px"></div>
        <div style="font-size:.66rem;color:#9fb1d1;margin-bottom:6px">versão <span id="appVer"></span></div>
        <button onclick="logout()">🚪 Sair</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="burger" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <div>
          <div class="crumb" id="crumb">Início</div>
          <h1 id="pageTitle">Painel</h1>
        </div>
        <div class="me">
          <span id="meName"></span>
          <span class="dot" id="meDot"></span>
        </div>
      </header>
      <div class="content" id="view"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   ESTADO  —  persistência em localStorage
   ========================================================================= */
const KEY='togethere_v2';
let S=load();

function load(){
  let s=null;
  try{const r=localStorage.getItem(KEY);if(r)s=JSON.parse(r);}catch(e){}
  if(!s) s=seed();
  return migrar(s);
}
function migrar(s){
  s.versao=s.versao||1;
  if(s.versao<2){                 // padroniza senhas para 12345
    (s.usuarios||[]).forEach(u=>{u.senha='12345';});
    s.versao=2;
  }
  s.comentarios=s.comentarios||[]; // garante campos novos
  s.relatorios=s.relatorios||[];
  s.boletins=s.boletins||[];
  s.aulasVip=s.aulasVip||[];
  s.vipAlunos=s.vipAlunos||[];
  (s.aulasVip||[]).forEach(a=>{
    if(!a.vipId && a.alunoId){
      const al=(s.alunos||[]).find(x=>x.id===a.alunoId);
      const nome=al?al.nome:'Aluno VIP';
      let vp=s.vipAlunos.find(x=>x.nome===nome);
      if(!vp){ vp={id:uid(),nome}; s.vipAlunos.push(vp); }
      a.vipId=vp.id; delete a.alunoId;
    }
    if(typeof a.faltou==='undefined') a.faltou=false;
  });
  (s.alunos||[]).forEach(a=>{ if('vip' in a) delete a.vip; });
  (s.temas||[]).forEach(t=>{ if(!t.dataEntrega) t.dataEntrega=t.data; });
  (s.presencas||[]).forEach(p=>{ if(typeof p.fechada==='undefined') p.fechada=true; });   // chamadas já existentes = salvas
  (s.turmas||[]).forEach(t=>{
    if(!Array.isArray(t.dias)||!t.dias.length){
      t.dias=diasFromHorario(t.horario);
      if(!t.dias.length) t.dias = (t.vezesSemana===1)?[1]:[1,3];
    }
    t.vezesSemana=t.dias.length;
    if(!t.cefr) t.cefr=cefrFromNome(t.nome);   // tenta achar A1/A2/B1+/C1... no nome
  });
  (s.testes||[]).forEach(t=>{                  // novo modelo: nota por habilidade
    t.notas=t.notas||{};
    Object.keys(t.notas).forEach(aid=>{ if(typeof t.notas[aid]!=='object'||t.notas[aid]===null) t.notas[aid]={}; });
  });
  s.config=s.config||{assinatura:'— Equipe Togethere\ninglês para chegar lá', escolaEmail:'inglestogethere@gmail.com'};

let _syncTimer=null;
function cloudOn(){ return CLOUD_URL && CLOUD_URL.indexOf('/exec')>0; }
function marcarSync(st){
  const e=document.getElementById('syncDot');
  if(e) e.textContent = st==='ok' ? '☁️ sincronizado' : st==='off' ? '⚠️ sem conexão' : '☁️ sincronizando…';
}
async function cloudGet(timeout){
  if(!cloudOn()) return {ok:false, off:true};
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),timeout||8000);
  try{
    const r=await fetch(CLOUD_URL+'?action=get&secret='+encodeURIComponent(CLOUD_SECRET),{signal:ctrl.signal});
    clearTimeout(t);
    const j=await r.json();
    return {ok:true, state:(j && Object.keys(j).length)?j:null};   // ok=respondeu; state=null só quando REALMENTE vazio
  }catch(e){ clearTimeout(t); return {ok:false}; }                 // ok=false → erro/sem conexão (NÃO é nuvem vazia)
}
function temAtividade(s){
  if(!s) return false;
  return ['presencas','material','temas','testes','contatos','planos','comentarios','atas','tarefas','relatorios','vipAlunos','aulasVip','boletins']
    .some(k=>Array.isArray(s[k]) && s[k].length);
}
function cloudPut(force){
  if(!cloudOn()) return Promise.resolve();
  marcarSync('...');
  const limpo=Object.assign({},S,{usuario:null,perfil:null});   // sessão não vai para a nuvem
  const url=CLOUD_URL+'?action=put&secret='+encodeURIComponent(CLOUD_SECRET)+(force?'&force=1':'');
  return fetch(url,{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(limpo)
  }).then(r=>r.json().catch(()=>({ok:true})))
    .then(j=>{ marcarSync(j&&j.bloqueado?'off':'ok'); return j; })
    .catch(()=>{ marcarSync('off'); });
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(S));
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(cloudPut,800);   // agrupa edições rápidas antes de enviar
}
async function puxarDaNuvem(){
  marcarSync('...');
  const res=await cloudGet(8000);
  if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
    const u=S.usuario, p=S.perfil;
    S=migrar(res.state); S.usuario=u; S.perfil=p;
    localStorage.setItem(KEY,JSON.stringify(S));
    marcarSync('ok'); toast('Dados atualizados da nuvem ✓');
    try{ if(typeof rota!=='undefined' && rota && VIEWS[rota]) VIEWS[rota](); montarNav(); }catch(e){}
  } else if(res.ok && !res.state){
    marcarSync('ok'); toast('A nuvem ainda está vazia');
  } else {
    marcarSync('off'); toast('Sem conexão com a nuvem agora');
  }
}
async function cloudEmail(to, subject, body){
  if(!cloudOn()) return {ok:false, erro:'nuvem não configurada'};
  try{
    const r=await fetch(CLOUD_URL+'?action=email&secret='+encodeURIComponent(CLOUD_SECRET),{
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({to, subject, body, from:(S.config&&S.config.escolaEmail)||'inglestogethere@gmail.com'})
    });
    return await r.json();
  }catch(e){ return {ok:false, erro:String(e)}; }
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function hoje(){return new Date().toISOString().slice(0,10);}
function diasAtras(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function pesoFalta(turmaId){const t=S.turmas.find(x=>x.id===turmaId);const n=(t&&t.dias&&t.dias.length)?t.dias.length:(t&&t.vezesSemana);return n===1?2:1;}
const DIAS_SEMANA=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayOf(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).getDay();}
function diasFromHorario(hor){const map={seg:1,ter:2,qua:3,qui:4,sex:5,sab:6,dom:0};const f=[];(hor||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(/[^a-z]+/).forEach(tok=>{const k=tok.slice(0,3);if(map[k]!=null&&!f.includes(map[k]))f.push(map[k]);});return f.sort((a,b)=>a-b);}
function diasTurmaLabel(t){return (t&&t.dias&&t.dias.length)?t.dias.map(d=>DIAS_SEMANA[d]).join('/'):'';}
function datasAula(turmaId,atras,frente){atras=atras==null?8:atras;frente=frente==null?2:frente;const t=S.turmas.find(x=>x.id===turmaId);if(!t||!t.dias||!t.dias.length)return[];const out=[];const a=new Date();a.setDate(a.getDate()-atras*7);const b=new Date();b.setDate(b.getDate()+frente*7);for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){if(t.dias.includes(d.getDay()))out.push(ymd(new Date(d)));}return out;}
function dataAulaPadrao(turmaId,datas){datas=datas||datasAula(turmaId);if(!datas.length)return hoje();const h=hoje();const pas=datas.filter(d=>d<=h).sort((x,y)=>y.localeCompare(x));if(pas.length)return pas[0];return datas.slice().sort()[0];}
function selectDataAula(id,turmaId,sel){let ds=datasAula(turmaId);if(!ds.length)return`<select id="${id}"><option value="">(defina os dias de aula da turma)</option></select>`;if(sel&&!ds.includes(sel))ds.push(sel);ds=[...new Set(ds)].sort((x,y)=>y.localeCompare(x));const def=sel||dataAulaPadrao(turmaId,ds);return`<select id="${id}">${ds.map(d=>`<option value="${d}" ${d===def?'selected':''}>${brDate(d)} · ${DIAS_SEMANA[weekdayOf(d)]}</option>`).join('')}</select>`;}
function proximaEntrega(turmaId,fromYmd){const ds=datasAula(turmaId,2,8).sort();const f=ds.filter(d=>d>(fromYmd||hoje()));return f[0]||ds[ds.length-1]||fromYmd||hoje();}

/* =========================================================================
   MOTOR DE ALERTAS
   ========================================================================= */
function alertasFaltas(){
  const out=[];
  S.alunos.forEach(a=>{
    const sess=S.presencas.filter(p=>p.turmaId===a.turmaId && a.id in p.registros)
                          .sort((x,y)=>x.data.localeCompare(y.data));
    let streak=0;
    for(let i=sess.length-1;i>=0;i--){ if(sess[i].registros[a.id]==='falta')streak++; else break; }
    const peso=pesoFalta(a.turmaId), equiv=streak*peso;
    if(equiv>=3){
      const motivo = peso===2
        ? `${streak} aula(s) seguida(s) sem vir (${equiv} faltas)`
        : `${streak} faltas consecutivas`;
      out.push({alunoId:a.id, tipo:'falta', n:equiv, motivo});
    }
  });
  return out.filter(o=>!jaContatado(o.alunoId,'falta'));
}
function alertasMaterial(){
  const out=[];
  S.alunos.forEach(a=>{
    const sess=S.material.filter(m=>m.turmaId===a.turmaId).sort((x,y)=>x.data.localeCompare(y.data));
    let streak=0, total=0;
    sess.forEach(m=>{ if(m.faltantes.includes(a.id)) total++; });
    for(let i=sess.length-1;i>=0;i--){ if(sess[i].faltantes.includes(a.id))streak++; else break; }
    if(streak>=3) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${streak} aulas seguidas`});
    else if(total>=5) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${total} aulas (alternadas)`});
  });
  return out.filter(o=>!jaContatado(o.alunoId,'material'));
}
function jaContatado(alunoId,tipo){
  return S.contatos.some(c=>c.alunoId===alunoId && c.tipo===tipo);
}
function totalAlertas(){return alertasFaltas().length+alertasMaterial().length;}

/* ---- incidentes detalhados (para registro da direção e relatórios) ---- */
function faltasDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && p.registros[alunoId]==='falta')
    .map(p=>p.data).sort();
}
function materialDoAluno(alunoId,turmaId){
  return S.material.filter(m=>m.turmaId===turmaId && (m.faltantes||[]).includes(alunoId))
    .map(m=>m.data).sort();}
function atrasosDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.atrasados||[]).includes(alunoId)).map(p=>p.data).sort();}
function saidasCedoDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.saiuCedo||[]).includes(alunoId)).map(p=>p.data).sort();}
function temasNaoFeitosDoAluno(alunoId,turmaId){
  return S.temas.filter(t=>t.turmaId===turmaId && (t.entregas[alunoId]===false || t.entregas[alunoId]==='parcial'))
    .map(t=>({data:t.data,descricao:t.descricao,origem:t.origem||'extra',status:t.entregas[alunoId]==='parcial'?'parcial':'naofeito'})).sort((a,b)=>a.data.localeCompare(b.data));
}
function comentariosDoAluno(alunoId){
  return S.comentarios.filter(c=>c.alunoId===alunoId).sort((a,b)=>a.data.localeCompare(b.data));
}
// lista geral de incidentes de um tipo (para a direção)
function registroGeral(tipo){
  const out=[];
  S.alunos.forEach(a=>{
    let datas=[];
    if(tipo==='falta') datas=faltasDoAluno(a.id,a.turmaId);
    else if(tipo==='material') datas=materialDoAluno(a.id,a.turmaId);
    else if(tipo==='tema') datas=temasNaoFeitosDoAluno(a.id,a.turmaId).map(t=>t.data);
    datas.forEach(d=>out.push({alunoId:a.id,turmaId:a.turmaId,data:d}));
  });
  return out.sort((x,y)=>y.data.localeCompare(x.data)); // mais recentes primeiro
}

  box.innerHTML=`<h3>${als.length} alunos · ${brDate(presData)}</h3><p class="hint">Toque para alternar presença. Marque atraso, saída antecipada, <b>sem material</b> e a entrega do <b>tema</b> em cada aluno. Ao terminar, clique em <b>Salvar</b>.</p>

}

    </div>

    <button class="btn block" onclick="criarTema('${turmaId}','${origem||'extra'}')">Criar tema</button>`);

function criarTema(turmaId,origem){
  const desc=document.getElementById('mtDesc').value.trim();
  if(!desc)return toast('Descreva o tema');
  const data=document.getElementById('mtOrig').value||hoje();
  const entrega=(document.getElementById('mtEntrega')||{}).value||proximaEntrega(turmaId,data);
  let alvos;
  if(document.getElementById('mtAlvo').value==='alguns'){
    alvos=[...document.querySelectorAll('.mtChk:checked')].map(c=>c.value);
    if(!alvos.length)return toast('Selecione ao menos um aluno');
  }else{
    alvos=alunosDa(turmaId).map(a=>a.id);
  }
  const ent={}; alvos.forEach(id=>ent[id]=true);   // padrão: todos entregaram (marca-se quem NÃO entregou)
  const id=uid();
  S.temas.push({id,turmaId,data,dataEntrega:entrega,descricao:desc,entregas:ent,origem:origem||'extra'});
  if(origem==='plano' && _temaPlanoRef){
    const p=S.planos.find(x=>x.id===_temaPlanoRef.pid);
    if(p && p.itens[_temaPlanoRef.i]){ p.itens[_temaPlanoRef.i].virouTema=true; p.itens[_temaPlanoRef.i].temaId=id; }
  }
  _temaPlanoRef=null;
  save(); fechar(); toast('Tema de casa criado');
  if(rota==='temas'){ temaTurma=turmaId; VIEWS.temas(); }
  else if(rota==='planos'){ renderPlanos(); }
  else if(rota==='presenca'){ renderTemaChamada(); }
}

const SKILLS=['Grammar','Vocabulary','Listening','Reading','Writing','Speaking'];
function cefrFromNome(nome){ const m=(nome||'').toUpperCase().match(/\b([ABC][12]\+?)\b/); return m?m[1]:''; }
function cefrRank(c){ const o=['A1','A1+','A2','A2+','B1','B1+','B2','B2+','C1','C2']; const i=o.indexOf((c||'').toUpperCase()); return i<0?-1:i; }
function numTestes(turma){
  if(!turma) return 3;
  if(turma.nivel==='kids') return 0;                 // KIDS: sem teste formal
  if(cefrRank(turma.cefr)>=cefrRank('B2')) return 2;  // B2, B2+, C1, C2 → 2 testes
  return 3;                                           // júnior, teens até B1+, demais → 3 testes
}
function bandaConceito(n){
  if(n===''||n==null||isNaN(n)) return {label:'—',cor:'#9aa6b6',bg:'transparent'};
  n=+n;
  if(n>=90) return {label:'merit',cor:'var(--azul)',bg:'#E7F0FB'};       // 90–100 merit (azul)
  if(n>=60) return {label:'pass',cor:'var(--ok)',bg:'#E6F6F0'};          // 60–89 pass (verde)
  return {label:'in need of improvement',cor:'var(--vermelho)',bg:'#FDECEC'}; // 0–59 (vermelho)
}
const DIST_COR='#B8860B', DIST_BG='#FBF3D6';
function legendaConceitos(){
  const it=(c,t)=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:.76rem;margin:0 10px 4px 0"><span style="width:12px;height:12px;border-radius:3px;background:${c};display:inline-block"></span>${t}</span>`;
  return `<div style="display:flex;flex-wrap:wrap;align-items:center;margin-top:4px">${it('var(--vermelho)','0–59 in need of improvement')}${it('var(--ok)','60–89 pass')}${it('var(--azul)','90–100 merit')}${it(DIST_COR,'★ distinction (acima do nível, sem nota)')}</div>`;
}
function testeDaTurma(turmaId,numero,criar){
  let t=S.testes.find(x=>x.turmaId===turmaId && x.numero===numero);
  if(!t && criar){ t={id:uid(),turmaId,numero,data:hoje(),notas:{}}; S.testes.push(t); }
  return t;
}
function notaSkill(t,aid,skill){ return (t&&t.notas&&t.notas[aid]&&t.notas[aid][skill]!=null)?t.notas[aid][skill]:''; }
function mediaTesteAluno(t,aid){
  if(!t||!t.notas||!t.notas[aid]) return null;
  const v=SKILLS.map(s=>t.notas[aid][s]).filter(x=>x!==''&&x!=null&&!isNaN(x)).map(Number);
  return v.length?v.reduce((a,n)=>a+n,0)/v.length:null;
}
function mediaSkillAno(turmaId,aid,skill){
  const v=S.testes.filter(t=>t.turmaId===turmaId).map(t=>t.notas&&t.notas[aid]?t.notas[aid][skill]:'').filter(x=>x!==''&&x!=null&&!isNaN(x)).map(Number);
  return v.length?Math.round(v.reduce((a,n)=>a+n,0)/v.length):null;
}
function boletimDe(turmaId,aid,criar){
  let b=S.boletins.find(x=>x.turmaId===turmaId && x.alunoId===aid);
  if(!b && criar){ b={id:uid(),turmaId,alunoId:aid,ano:new Date().getFullYear(),conceitos:{},distincao:{},distincaoGeral:false,parecer:'',conceitoGeral:'',criadoEm:hoje(),criadoPor:S.usuario}; S.boletins.push(b); }
  if(b) b.distincao=b.distincao||{};
  return b;
}

function imprimirDoc(html){
  // imprime sem abrir janela nova (evita ficar preso em tela cheia no PWA/iPad)
  let f=document.getElementById('printFrame'); if(f) f.remove();
  f=document.createElement('iframe'); f.id='printFrame'; f.setAttribute('aria-hidden','true');
  f.style.cssText='position:fixed;left:-10000px;top:0;width:794px;height:1123px;border:0';
  document.body.appendChild(f);
  let feito=false;
  const go=()=>{ if(feito)return; feito=true; try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ toast('Não consegui abrir a impressão'); } };
  const d=f.contentWindow.document; d.open(); d.write(html); d.close();
  f.onload=()=>setTimeout(go,450);
  setTimeout(go,1200); // garantia caso o onload não dispare
}

function renderPlanos(){
  const list=document.getElementById('plList');
  const raw=(_buscaPlano||'').trim(), q=_normTxt(raw);
  const base=(painelTurma?S.planos.filter(p=>p.turmaId===painelTurma):[...S.planos]);
  if(q){
    const ps=base.filter(p=> _normTxt(p.titulo).includes(q) || _normTxt(p.conteudo||'').includes(q) || _normTxt(turmaNome(p.turmaId)).includes(q) || p.data.includes(raw) || brDate(p.data).includes(raw)).sort((a,b)=>b.data.localeCompare(a.data));
    list.innerHTML = ps.length ? ps.map(planoCard).join('') : `<div class="card empty"><div class="big">🔎</div>Nenhum plano encontrado.</div>`;
    return;
  }
  const pend=base.filter(p=>!p.realizado).sort((a,b)=>a.data.localeCompare(b.data));
  const feitos=base.filter(p=>p.realizado).sort((a,b)=>b.data.localeCompare(a.data));
  if(!pend.length && !feitos.length){ list.innerHTML=`<div class="card empty"><div class="big">✅</div>Nenhum plano de aula ainda. Crie um novo no botão acima.</div>`; return; }
  let html=`<p style="font-weight:700;margin:4px 0 8px;opacity:.7">⏳ Pendentes (${pend.length})</p>`;
  html += pend.length ? pend.map(planoCard).join('') : '<p class="hint" style="margin:0 0 8px">Nenhum plano pendente.</p>';
  html += `<p style="font-weight:700;margin:20px 0 8px;opacity:.7">✓ Realizados (${feitos.length})</p>`;
  html += feitos.length ? feitos.map(planoCard).join('') : '<p class="hint" style="margin:0">Nenhum plano realizado ainda.</p>';
  list.innerHTML=html;
}

function corpoRelatorioDia(turmaId,dataAula){
  const turma=S.turmas.find(t=>t.id===turmaId)||{};
  const planos=S.planos.filter(p=>p.turmaId===turmaId && p.data===dataAula);
  const materia=planos.map(p=>p.conteudo||p.titulo).filter(Boolean).join(' · ');
  const feitos=[].concat(...planos.map(p=>(p.itens||[]).filter(i=>i.done).map(i=>i.txt)));
  const temas=S.temas.filter(t=>t.turmaId===turmaId && t.data===dataAula);

function copiarTexto(txt, msg){
  txt=String(txt||'');
  if(!txt) return toast('Nada para copiar');
  const ok=()=>toast(msg||'Copiado!');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok, ()=>fallbackCopia(txt,msg));
  } else { fallbackCopia(txt,msg); }
}
function fallbackCopia(txt,msg){
  try{
    const ta=document.createElement('textarea');
    ta.value=txt; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.top='-1000px'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, txt.length);
    const sucesso=document.execCommand('copy');
    document.body.removeChild(ta);
    toast(sucesso ? (msg||'Copiado!') : 'Não foi possível copiar — selecione manualmente');
  }catch(e){ toast('Não foi possível copiar — selecione manualmente'); }
}

    if(feitos.length)txt+=`✅ Trabalhamos: ${feitos.join(', ')}.\n`;
  }else{
    txt+=`📖 Tivemos mais um dia de aprendizado de inglês!\n`;
  }
  if(tema)txt+=`\n📚 Tema de casa: ${tema.descricao}\n`;
  else txt+=`\n📚 Hoje não passamos tema de casa.\n`;
  txt+=`\nQualquer dúvida, estamos à disposição.\nEquipe Togethere 💙\ninglês para chegar lá`;
  document.getElementById('rOut').textContent=txt;
}
function copiarResumo(){
  const t=document.getElementById('rOut').textContent;
  if(t.startsWith('Clique'))return toast('Gere o resumo primeiro');
  copiarTexto(t,'Texto copiado!');
}
// resumo do que foi dado numa aula (para os dias de falta)
function resumoAulaDoDia(turmaId,data){
  const plano=S.planos.find(p=>p.turmaId===turmaId&&p.data===data);
  const tema=S.temas.find(t=>t.turmaId===turmaId&&t.data===data);
  let s='';
  if(plano){ s=plano.conteudo||plano.titulo; const f=plano.itens.filter(i=>i.done).map(i=>i.txt); if(f.length)s+=' (trabalhado: '+f.join(', ')+')'; }
  if(tema) s+=(s?' | ':'')+'Tema passado: '+tema.descricao;
  return s||'aula não registrada no sistema';
}
function corpoRelatorioAluno(alunoId,turmaId,de,ate){
  const inRange=d=> (!de||d>=de) && (!ate||d<=ate);
  const aluno=S.alunos.find(a=>a.id===alunoId), turma=S.turmas.find(t=>t.id===turmaId);
  const faltas=faltasDoAluno(alunoId,turmaId).filter(inRange), mat=materialDoAluno(alunoId,turmaId).filter(inRange);
  const temas=temasNaoFeitosDoAluno(alunoId,turmaId).filter(t=>inRange(t.data)), coms=comentariosDoAluno(alunoId).filter(c=>inRange(c.data));
  const atrasos=atrasosDoAluno(alunoId,turmaId).filter(inRange), saidas=saidasCedoDoAluno(alunoId,turmaId).filter(inRange);
  const peso=pesoFalta(turmaId);
  let txt=`RELATÓRIO DO ALUNO\n${aluno.nome}\nTurma: ${turma.nome}${turma.professor?' · Prof. '+turma.professor:''}\nPeríodo: ${de?brDate(de):'início'} a ${ate?brDate(ate):'hoje'}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  txt+=`\n📋 FALTAS (${faltas.length}${peso===2?` aulas = ${faltas.length*2} faltas (turma 1x/semana)`:''})\n`;
  if(faltas.length) faltas.forEach(d=>{ txt+=`• ${brDate(d)} — conteúdo da aula: ${resumoAulaDoDia(turmaId,d)}\n`; });
  else txt+=`• Nenhuma falta registrada.\n`;
  txt+=`\n⏰ CHEGOU ATRASADO (${atrasos.length})\n`;
  if(atrasos.length) atrasos.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🚪 SAIU MAIS CEDO (${saidas.length})\n`;
  if(saidas.length) saidas.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n📚 TEMAS DE CASA NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(t=>{ txt+=`• ${brDate(t.data)} — ${t.descricao}${t.origem==='plano'?' (do plano de aula)':' (extra)'} — ${t.status==='parcial'?'parcialmente feito':'não feito'}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n💬 COMENTÁRIOS (${coms.length})\n`;
  if(coms.length) coms.forEach(c=>{ txt+=`• ${brDate(c.data)} (${c.autor}): ${c.texto}\n`; }); else txt+=`• Nenhum comentário.\n`;
  txt+=`\n—\nTogethere · inglês para chegar lá`;
  return txt;
}
let _relatorioHTML='', _relatorioTxt='';
function montarRelatorioHTML(alunoId, turmaId, de, ate){
  const turma=S.turmas.find(t=>t.id===turmaId)||{}, aluno=S.alunos.find(a=>a.id===alunoId)||{};

  const inRange=d=>(!de||d>=de)&&(!ate||d<=ate);
  const faltas=faltasDoAluno(alunoId,turmaId).filter(inRange);

  const saidas=saidasCedoDoAluno(alunoId,turmaId).filter(inRange);
  const mat=materialDoAluno(alunoId,turmaId).filter(inRange);
  const temas=temasNaoFeitosDoAluno(alunoId,turmaId).filter(t=>inRange(t.data));
  const coms=comentariosDoAluno(alunoId).filter(c=>inRange(c.data));
  const peso=pesoFalta(turmaId);
  const testes=S.testes.filter(t=>t.turmaId===turmaId && t.notas && t.notas[alunoId] && SKILLS.some(s=>t.notas[alunoId][s]!==''&&t.notas[alunoId][s]!=null)).sort((a,b)=>(a.numero||0)-(b.numero||0));
  const tile=(v,k)=>`<div class="st"><div class="v">${v}</div><div class="k">${k}</div></div>`;
  const statsHTML=`<div class="stats">${tile(faltas.length,'Faltas')}${tile(atrasos.length,'Atrasos')}${tile(saidas.length,'Saídas antecip.')}${tile(mat.length,'Aulas sem material')}${tile(temas.length,'Temas pendentes')}</div>`;
  let notasHTML;
  if(testes.length){
    notasHTML=`<table class="tnotas"><thead><tr><th class="s">Habilidade</th>${testes.map(t=>`<th>${t.numero}º teste</th>`).join('')}</tr></thead><tbody>`+
      SKILLS.map(s=>`<tr><td class="s">${s}</td>${testes.map(t=>{const v=t.notas[alunoId][s];const bd=bandaConceito(v===''||v==null?'':v);return `<td><span class="num" style="color:${bd.cor}">${v===''||v==null?'—':v}</span></td>`;}).join('')}</tr>`).join('')+
      `</tbody></table>`;
  } else notasHTML='<div class="okline">Ainda não há notas de teste lançadas.</div>';
  const lista=(arr,fmt)=>arr.length?('<ul class="lst">'+arr.map(fmt).join('')+'</ul>'):'<div class="okline">Nenhum registro ✓</div>';
  const periodo=`${de?brDate(de):'início'} — ${ate?brDate(ate):'hoje'}`;
  const html=`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório — ${esc(aluno.nome)}</title>
<style>${DOC_CSS}</style></head>
<body><div class="page">
  <div class="hd"><img src="${LOGO_B64}" alt="Togethere">
    <div><div class="nm">Togethere</div><div class="tg">inglês para chegar lá</div></div>
    <div class="doc"><b>Relatório</b><span>do aluno</span></div></div>
  <div class="who"><div class="al">${esc(aluno.nome)}</div>
    <div class="meta">${esc(turma.nome)}${turma.cefr?' · Nível '+esc(turma.cefr):''}${turma.professor?' · Prof. '+esc(turma.professor):''}<br>Período: ${periodo} · Emitido em ${brDate(hoje())} por ${esc(S.usuario)}</div></div>
  <div class="sec"><h2>Resumo do período</h2>${statsHTML}${peso===2?`<div class="leg">Turma de 1 encontro por semana: para fins de alerta, cada falta conta em dobro.</div>`:''}</div>
  <div class="sec"><h2>Resultados de testes</h2>${notasHTML}</div>
  <div class="sec"><h2>Faltas — com o conteúdo da aula (${faltas.length})</h2>${lista(faltas,d=>`<li><span class="d">${brDate(d)}</span><span>${esc(resumoAulaDoDia(turmaId,d))}</span></li>`)}</div>
  <div class="sec"><h2>Atrasos (${atrasos.length}) e saídas antecipadas (${saidas.length})</h2>
    <div class="skills"><div><div class="leg" style="margin:0 0 6px">Atrasos</div>${lista(atrasos,d=>`<li><span class="d">${brDate(d)}</span></li>`)}</div><div><div class="leg" style="margin:0 0 6px">Saídas antecipadas</div>${lista(saidas,d=>`<li><span class="d">${brDate(d)}</span></li>`)}</div></div></div>
  <div class="sec"><h2>Material não trazido (${mat.length})</h2>${lista(mat,d=>`<li><span class="d">${brDate(d)}</span></li>`)}</div>
  <div class="sec"><h2>Temas de casa não feitos / parciais (${temas.length})</h2>${lista(temas,t=>`<li><span class="d">${brDate(t.data)}</span><span>${esc(t.descricao)}${t.origem==='plano'?' (do plano de aula)':''} — ${t.status==='parcial'?'parcialmente feito':'não feito'}</span></li>`)}</div>
  <div class="sec"><h2>Comentários (${coms.length})</h2>${lista(coms,c=>`<li><span class="d">${brDate(c.data)}</span><span><b>${esc(c.autor)}:</b> ${esc(c.texto)}</span></li>`)}</div>
  <div class="ft"><div>${esc((S.config&&S.config.assinatura)||'Equipe Togethere').replace(/\n/g,'<br>')}<br><small>Documento interno · emitido em ${brDate(hoje())}</small></div><div class="tag">Togethere</div></div>
</div></body></html>`;
  return {html, txt:corpoRelatorioAluno(alunoId,turmaId,de,ate)};
}
function gerarRelatorioAluno(){
  const turmaId=document.getElementById('relT').value, alunoId=document.getElementById('relA').value;
  if(!alunoId)return toast('Escolha o aluno');
  const de=(document.getElementById('relDe')||{}).value||'', ate=(document.getElementById('relAte')||{}).value||'';
  if(de&&ate&&de>ate)return toast('A data inicial é maior que a final');
  const r=montarRelatorioHTML(alunoId,turmaId,de,ate);
  _relatorioHTML=r.html; _relatorioTxt=r.txt;
  const fr=document.getElementById('relFrame'), vz=document.getElementById('relVazio');
  if(fr){ fr.srcdoc=r.html; fr.style.display='block'; }
  if(vz) vz.style.display='none';
}
function addComentario(){
  const alunoId=document.getElementById('relA').value;
  if(!alunoId)return toast('Escolha o aluno');
  const txt=document.getElementById('relCom').value.trim();
  if(!txt)return toast('Escreva o comentário');
  S.comentarios.push({id:uid(),alunoId,data:hoje(),texto:txt,autor:S.usuario});
  document.getElementById('relCom').value=''; save(); toast('Comentário adicionado');
  if(_relatorioHTML) gerarRelatorioAluno();
}
function copiarRelatorio(){ if(!_relatorioTxt)return toast('Gere o relatório primeiro'); copiarTexto(_relatorioTxt,'Relatório copiado!'); }
function imprimirRelatorio(){ if(!_relatorioHTML)return toast('Gere o relatório primeiro'); imprimirDoc(_relatorioHTML); }

const QUADS={

  2:{nome:'Agendar',sub:'Importante, não urgente',cor:'var(--azul)'},
  3:{nome:'Standby',sub:'Urgente, não importante',cor:'#b88600'},

VIEWS.tarefas=()=>{
  const v=document.getElementById('view');
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--marinho)"></span><h2 class="display">Tarefas internas</h2></div>

function addTarefa(){
  const txt=document.getElementById('tkTxt').value.trim();

  S.tarefas.push({id:uid(),txt,quad:+document.getElementById('tkQ').value,feito:false});

}
function renderTarefas(){
  const mat=document.getElementById('eMat');

    const ts=S.tarefas.filter(t=>t.quad==k);

        <span class="t-txt">${t.txt}</span>
        <button class="mv" onclick="moverTarefa('${t.id}')">mover</button>

    </div>`;
  }).join('');
}
function toggleTarefa(id){const t=S.tarefas.find(t=>t.id===id);t.feito=!t.feito;save();renderTarefas();}
function delTarefa(id){S.tarefas=S.tarefas.filter(t=>t.id!==id);save();renderTarefas();}
function moverTarefa(id){
  const t=S.tarefas.find(t=>t.id===id);
  modal(`<h3>Mover tarefa <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:14px">“${t.txt}”</p>
    ${Object.entries(QUADS).map(([k,q])=>`<button class="btn ghost block" style="margin-bottom:8px;justify-content:flex-start" onclick="confirmaMover('${id}',${k})"><span class="dot" style="width:10px;height:10px;border-radius:50%;background:${q.cor};display:inline-block;margin-right:8px"></span><b>${q.nome}</b> — ${q.sub}</button>`).join('')}`);
}
function confirmaMover(id,q){const t=S.tarefas.find(t=>t.id===id);t.quad=q;save();fechar();renderTarefas();toast('Tarefa movida');}

    ${ehProf?'':`<div class="card"><h3>Nova turma</h3><div class="row">
      <div style="flex:2"><label class="lbl">Nome da turma</label><input type="text" id="nT" placeholder="Ex: A2 ADULTS NOITE"></div>
      <div><label class="lbl">Categoria</label><select id="nN"><option value="kids">kids</option><option value="junior">junior</option><option value="teens" selected>teens</option><option value="adults">adults</option><option value="talking">talking</option></select></div>
      <div><label class="lbl">Nível CEFR</label><select id="nC"><option value="">—</option>${['A1','A1+','A2','A2+','B1','B1+','B2','B2+','C1','C2'].map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
      <div style="flex:1"><label class="lbl">Horário (opcional)</label><input type="text" id="nHor" placeholder="Ex: 18:15–19:30"></div>
    </div>
    <div class="field" style="margin-top:10px"><label class="lbl">Dias de aula</label><div style="display:flex;flex-wrap:wrap;gap:6px">
      ${[1,2,3,4,5,6].map(d=>`<label style="display:flex;align-items:center;gap:5px;font-size:.88rem;border:1px solid var(--linha);border-radius:9px;padding:6px 10px;cursor:pointer"><input type="checkbox" class="nDia" value="${d}"> ${DIAS_SEMANA[d]}</label>`).join('')}
    </div><p class="hint" style="margin:6px 0 0">A chamada e os planos só permitirão datas nesses dias. Aulas 1x/semana contam falta em dobro. <b>Aluno VIP</b> (aula avulsa) é registrado dentro da turma, em "👑 Aulas VIP".</p></div>
    <div style="margin-top:12px"><button class="btn" onclick="addTurma()">+ Criar turma</button></div></div>`}
    <div class="card" style="padding:14px 18px"><input type="text" id="buscaAluno" placeholder="🔎 Buscar aluno pelo nome (em todas as turmas)" value="${_buscaAluno||''}" oninput="filtrarAlunos(this.value)"></div>
    <div id="turmaList"></div>
    ${ehProf?'':`<div class="card" style="border-color:#fdd"><h3 style="color:var(--vermelho)">Zona de risco</h3><p class="hint">Apaga <b>todos os dados</b> (chamadas, temas, planos, testes…) e volta às turmas iniciais. Exige a <b>senha de um(a) diretor(a)</b> e baixa um <b>backup automático</b> antes de apagar.</p>
      <button class="btn red sm" onclick="resetarSeguro()">Restaurar dados originais</button></div>`}`;
  renderTurmaList();
};
let _buscaAluno='';
function filtrarAlunos(v){ _buscaAluno=v; renderTurmaList(); }
function addTurma(){
  if(ehProfessor())return toast('Sem permissão');
  const nome=document.getElementById('nT').value.trim();
  if(!nome)return toast('Dê um nome à turma');
  const dias=[...document.querySelectorAll('.nDia:checked')].map(c=>+c.value).sort((a,b)=>a-b);
  if(!dias.length)return toast('Selecione ao menos um dia de aula');
  const hor=(document.getElementById('nHor').value||'').trim();
  const cefr=(document.getElementById('nC')||{}).value||cefrFromNome(nome);
  const t={id:uid(),nome,nivel:document.getElementById('nN').value,cefr,horario:hor,dias,vezesSemana:dias.length};
  if(S.perfil==='professor'){const u=S.usuarios.find(u=>u.nome===S.usuario);t.professor=u&&u.ensina;}
  S.turmas.push(t);
  save();VIEWS.turmas();toast('Turma criada');
}
function renderTurmaList(){
  const list=document.getElementById('turmaList');
  const ts=turmasVisiveis();
  if(!ts.length){list.innerHTML='<div class="card empty"><div class="big">👥</div>Nenhuma turma. Crie a primeira!</div>';return;}
  const f=_normTxt(_buscaAluno||'').trim();
  if(f){   // modo busca: lista achatada de alunos que batem
    const res=[];
    ts.forEach(t=>alunosDa(t.id).forEach(a=>{ if(_normTxt(a.nome).includes(f)) res.push({a,t}); }));
    list.innerHTML = res.length
      ? `<div class="card"><h3>${res.length} aluno(s) encontrado(s)</h3>`+
        res.map(r=>`<div class="check"><span>${r.a.nome} <span class="pill">${r.t.nome}</span></span>
          ${ehProfessor()?'':`<button class="btn ghost sm" onclick="delAluno('${r.a.id}')">remover</button>`}</div>`).join('')+`</div>`
      : `<div class="card empty"><div class="big">🔎</div>Nenhum aluno encontrado para “${_buscaAluno}”.</div>`;
    return;
  }
  list.innerHTML=ts.map(t=>{
    const als=alunosDa(t.id);
    const prof=t.professor?` · Prof. ${t.professor}`:'';
    const hor=t.horario?` · ${t.horario}`:'';
    const freq=` · ${diasTurmaLabel(t)||((t.vezesSemana===1)?'1x/sem':'2x/sem')}${t.vezesSemana===1?' (falta dupla)':''}`;
    return `<div class="card" style="cursor:pointer" onclick="abrirTurma('${t.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><h3 style="margin:0">${t.nome} ${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''}</h3>
          <p class="hint" style="margin:4px 0 0">${als.length} aluno(s)${prof}${hor}${freq}</p></div>
        <span style="font-size:1.7rem;color:var(--azul);line-height:1">›</span>
      </div></div>`;
  }).join('');
}
let painelTurma=null;
function abrirTurma(id){ painelTurma=id; presTurma=matTurma=temaTurma=testeTurma=id; renderPainelTurma(); }
function voltarTurmas(){ painelTurma=null; VIEWS.turmas(); }
function voltarPainel(){ if(painelTurma) renderPainelTurma(); else ir('turmas'); }
function btnVoltaPainel(){ const t=painelTurma&&S.turmas.find(x=>x.id===painelTurma); return t?`<button class="btn ghost sm" onclick="voltarPainel()" style="margin-bottom:10px">‹ Voltar para ${t.nome}</button>`:''; }
function paAcao(destino){
  const id=painelTurma; presTurma=matTurma=temaTurma=testeTurma=id;   // mantém painelTurma para o botão Voltar
  ir(destino);
}
function renderPainelTurma(){
  const id=painelTurma, t=S.turmas.find(x=>x.id===id);
  if(!t){ painelTurma=null; return VIEWS.turmas(); }
  const als=alunosDa(id);
  const freq=(t.vezesSemana===1)?'1x por semana (cada falta conta em dobro)':'2x por semana';
  // ---- métricas do dashboard ----
  const pendentes=S.planos.filter(p=>p.turmaId===id && !p.realizado);
  const prox=pendentes.slice().sort((a,b)=>a.data.localeCompare(b.data))[0];
  const chamadas=S.presencas.filter(p=>p.turmaId===id).sort((a,b)=>b.data.localeCompare(a.data));
  const ult=chamadas[0];
  const ultTxt=ult?`${brDate(ult.data)} — ${Object.values(ult.registros).filter(s=>s==='falta').length} falta(s)`:'nenhuma ainda';
  const alertasN=alertasFaltas().filter(o=>{const a=S.alunos.find(x=>x.id===o.alunoId);return a&&a.turmaId===id;}).length;
  const temasPend=S.temas.filter(x=>x.turmaId===id && Object.values(x.entregas).some(v=>v===false||v==='parcial')).length;
  const btn=(cor,acao,emoji,titulo,sub)=>`<button class="btn block" style="background:${cor};justify-content:flex-start;text-align:left;margin-bottom:10px;height:auto;padding:14px 16px" onclick="paAcao('${acao}')">${emoji} ${titulo}<span style="display:block;font-weight:400;font-size:.78rem;opacity:.85;margin-top:2px">${sub}</span></button>`;
  const v=document.getElementById('view');
  const podeCadastrar=!ehProfessor();
  v.innerHTML=`<button class="btn ghost sm" onclick="voltarTurmas()">‹ Voltar para turmas</button>
    <div class="section-title" style="margin-top:10px"><span class="feijao fj" style="background:var(--azul)"></span><h2 class="display">${t.nome}</h2></div>
    <p class="sub">${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''} · ${als.length} aluno(s)${t.professor?' · Prof. '+t.professor:''}${diasTurmaLabel(t)?' · '+diasTurmaLabel(t):''}${t.horario?' · '+t.horario:''} · ${freq}</p>
    <div class="card"><h3>Visão geral</h3>
      <div class="dash-grid">
        <div class="stat"><div class="n">${als.length}</div><div class="l">alunos</div></div>
        <div class="stat"><div class="n">${pendentes.length}</div><div class="l">plano(s) pendente(s)</div></div>
        <div class="stat"><div class="n">${alertasN}</div><div class="l">alerta(s) de falta</div></div>
        <div class="stat"><div class="n">${temasPend}</div><div class="l">tema(s) com pendência</div></div>
      </div>
      <p class="hint" style="margin:2px 0 0">Última chamada: ${ultTxt}${prox?` · Próximo plano: <b>${prox.titulo}</b> (${brDate(prox.data)})`:''}</p>
    </div>
    <div class="card"><h3>O que você quer fazer?</h3>
      ${btn('var(--azul)','presenca','📋','Chamada do dia','presença, atraso, saída antecipada, material e tema de casa — tudo aqui')}
      ${btn('var(--azul)','planos','🗒️','Planos de aula','ver o plano pendente e marcar como feito; criar novos')}
      ${btn('var(--roxo)','testes','✏️','Testes','lançar as notas da turma')}
      <button class="btn block" style="background:var(--rosa);justify-content:flex-start;text-align:left;margin-bottom:10px;height:auto;padding:14px 16px" onclick="temaExtraTurma('${id}')">📩 Tema extra<span style="display:block;font-weight:400;font-size:.78rem;opacity:.85;margin-top:2px">atribuir um tema de casa à turma toda ou a alunos específicos</span></button>
      ${btn('var(--vermelho)','relatorio','🧾','Relatório do dia','gerar o resumo da aula para enviar às famílias')}
    </div>
    <div class="card"><h3>Alunos (${als.length})</h3>
      ${podeCadastrar?'<p class="hint" style="margin:0 0 8px">E-mail do responsável (usado para enviar o relatório da aula).</p>':''}
      ${als.map(a=>`<div style="padding:8px 0;border-bottom:1px dashed var(--linha)"><div style="display:flex;align-items:center;gap:8px"><span style="flex:1">${a.nome}</span>${podeCadastrar?`<button class="btn ghost sm" onclick="delAluno('${a.id}')">remover</button>`:''}</div>
        ${podeCadastrar?`<input type="email" value="${escAttr(a.email||'')}" placeholder="email.responsavel@exemplo.com" style="margin-top:6px;font-size:.85rem" onchange="setAlunoEmail('${a.id}',this.value)">`:''}</div>`).join('')||'<p class="hint">Sem alunos ainda.</p>'}
      ${podeCadastrar?`<div class="row" style="margin-top:12px"><div style="flex:3"><input type="text" id="al_${id}" placeholder="Nome do novo aluno" onkeydown="if(event.key==='Enter')addAluno('${id}')"></div>
      <button class="btn ghost" onclick="addAluno('${id}')">+ Aluno</button></div>`:''}</div>
    ${podeCadastrar?`<button class="btn ghost sm" style="color:var(--vermelho)" onclick="delTurma('${id}')">Excluir turma</button>`:''}`;
  window.scrollTo(0,0);
}
function _refreshTurmas(){ if(painelTurma) renderPainelTurma(); else renderTurmaList(); }
function setAlunoEmail(id,val){const a=S.alunos.find(x=>x.id===id);if(!a)return;a.email=(val||'').trim();save();}
function addAluno(turmaId){
  if(ehProfessor())return toast('Sem permissão');
  const inp=document.getElementById('al_'+turmaId);
  const nome=inp.value.trim();if(!nome)return toast('Digite o nome');
  S.alunos.push({id:uid(),nome,turmaId});save();_refreshTurmas();montarNav();toast('Aluno adicionado');
}
function delAluno(id){if(ehProfessor())return toast('Sem permissão');if(confirm('Remover este aluno?')){S.alunos=S.alunos.filter(a=>a.id!==id);save();_refreshTurmas();montarNav();}}
function delTurma(id){if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir turma e seus alunos?')){S.turmas=S.turmas.filter(t=>t.id!==id);S.alunos=S.alunos.filter(a=>a.turmaId!==id);painelTurma=null;save();VIEWS.turmas();montarNav();toast('Turma excluída');}}
function resetarSeguro(){
  modal(`<h3>⚠️ Restaurar dados originais <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:12px">Isto <b>apaga todos os dados atuais</b> (chamadas, temas, planos, testes, comentários…) e volta à base inicial de turmas. Um <b>backup será baixado automaticamente</b> antes de apagar.</p>
    <div class="field"><label class="lbl">Senha de um(a) diretor(a)</label><input type="password" id="resetSenha" placeholder="senha da direção"></div>
    <button class="btn block red" onclick="confirmarReset()">Baixar backup e restaurar</button>`);
  setTimeout(()=>{const i=document.getElementById('resetSenha');if(i)i.focus();},60);
}
function confirmarReset(){
  const senha=(document.getElementById('resetSenha').value||'');
  const dir=S.usuarios.find(u=>u.perfil==='direcao' && u.senha===senha);
  if(!dir){ toast('Senha de diretor(a) incorreta'); return; }
  exportarBackup();                        // baixa o estado atual antes de apagar
  S=seed(); S.usuario=null; S.perfil=null;
  localStorage.setItem(KEY, JSON.stringify(S));
  fechar(); toast('Restaurando…');
  cloudPut(true).finally(()=>setTimeout(()=>location.reload(), 800));
}

/* ---- ACESSOS (somente direção) ---- */
VIEWS.acessos=()=>{
  const v=document.getElementById('view');
  const rotulo={direcao:'Direção',professor:'Professor(a)',secretaria:'Secretaria'};
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--marinho)"></span><h2 class="display">Acessos e senhas</h2></div>
    <p class="sub">Redefina as senhas da equipe. A senha padrão é <b>12345</b>.</p>
    <div class="card"><h3>Usuários</h3><p class="hint">Toque em “Redefinir para 12345” ou digite uma nova senha e salve.</p>
    <table><thead><tr><th>Usuário</th><th>Perfil</th><th>Nova senha</th><th></th></tr></thead><tbody>
    ${S.usuarios.map((u,i)=>`<tr>
      <td><b>${u.nome}</b></td>
      <td><span class="pill">${rotulo[u.perfil]}</span></td>
      <td><input type="text" id="sn_${i}" placeholder="nova senha" style="max-width:160px"></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn sm" onclick="salvarSenha(${i})">Salvar</button>
        <button class="btn ghost sm" onclick="resetSenha(${i})">Redefinir p/ 12345</button>
      </td></tr>`).join('')}
    </tbody></table></div>
    <div class="card"><h3>+ Novo usuário</h3><div class="row">
      <div><label class="lbl">Nome de acesso</label><input type="text" id="nuNome" placeholder="Ex: Ana"></div>
      <div><label class="lbl">Perfil</label><select id="nuPerfil"><option value="professor">Professor(a)</option><option value="secretaria">Secretaria</option><option value="direcao">Direção</option></select></div>
      <div><label class="lbl">Professor da turma (opcional)</label><input type="text" id="nuEnsina" placeholder="Nome usado nas turmas"></div>
    </div><div style="margin-top:12px"><button class="btn" onclick="addUsuario()">Criar usuário (senha 12345)</button></div></div>
    <div class="card"><h3>Assinatura e e-mail da escola</h3><p class="hint">Usados no relatório enviado às famílias. O e-mail é o remetente/cópia da escola.</p>
      <div class="field"><label class="lbl">E-mail da escola (remetente)</label><input type="email" id="cfgEmail" value="${escAttr((S.config&&S.config.escolaEmail)||'')}" placeholder="inglestogethere@gmail.com"></div>
      <div class="field"><label class="lbl">Assinatura</label><textarea id="cfgAssin" placeholder="— Equipe Togethere">${escAttr((S.config&&S.config.assinatura)||'')}</textarea></div>
      <button class="btn" onclick="salvarConfig()">Salvar assinatura</button></div>
    <div class="card"><h3>Backup dos dados</h3><p class="hint">Baixe uma cópia de segurança (arquivo .json) ou restaure os dados a partir de um backup.</p>
      <div class="row">
        <button class="btn" onclick="exportarBackup()">⬇️ Baixar backup agora</button>
        <button class="btn ghost" onclick="document.getElementById('impFile').click()">⬆️ Restaurar de um arquivo</button>
      </div>
      <input type="file" id="impFile" accept="application/json,.json" style="display:none" onchange="importarBackup(this)">
      <p class="hint" style="margin-top:10px">Guarde o arquivo no seu computador ou no Drive. Restaurar <b>substitui</b> todos os dados atuais.</p>
    </div>`;
};
function salvarConfig(){
  S.config=S.config||{};
  S.config.escolaEmail=(document.getElementById('cfgEmail').value||'').trim();
  S.config.assinatura=document.getElementById('cfgAssin').value;
  save(); toast('Assinatura salva');
}
function exportarBackup(){
  const dados=JSON.stringify(Object.assign({},S,{usuario:null,perfil:null}));
  const blob=new Blob([dados],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-togethere-'+hoje()+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},200);
  toast('Backup baixado');
}
function importarBackup(input){
  const f=input.files&&input.files[0]; if(!f){return;}
  const r=new FileReader();
  r.onload=function(){
    let obj;
    try{ obj=JSON.parse(r.result); }catch(e){ toast('Arquivo inválido (não é um backup válido)'); return; }
    if(!obj || !obj.usuarios || !obj.alunos){ toast('Arquivo não parece um backup do app'); return; }
    if(!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Deseja continuar?')) return;
    S=migrar(obj); S.usuario=null; S.perfil=null;
    localStorage.setItem(KEY, JSON.stringify(S));
    toast('Restaurando…');
    cloudPut(true).then(function(){ location.reload(); });
  };
  r.readAsText(f); input.value='';
}
function salvarSenha(i){
  const nova=document.getElementById('sn_'+i).value.trim();
  if(!nova)return toast('Digite a nova senha');
  S.usuarios[i].senha=nova; save(); VIEWS.acessos(); toast('Senha atualizada para '+S.usuarios[i].nome);
}
function resetSenha(i){
  S.usuarios[i].senha='12345'; save(); VIEWS.acessos(); toast('Senha de '+S.usuarios[i].nome+' redefinida (12345)');
}
function addUsuario(){
  const nome=document.getElementById('nuNome').value.trim();
  if(!nome)return toast('Dê um nome de acesso');
  if(S.usuarios.some(u=>u.nome.toLowerCase()===nome.toLowerCase()))return toast('Já existe um usuário com esse nome');
  S.usuarios.push({nome,perfil:document.getElementById('nuPerfil').value,senha:'12345',ensina:document.getElementById('nuEnsina').value.trim()||null});
  save(); VIEWS.acessos(); toast('Usuário criado com senha 12345');
}

/* =========================================================================
   BOOT
   ========================================================================= */
(async function boot(){
  const lp=document.getElementById('loginPanel'); if(lp) lp.innerHTML='<p class="hint" style="text-align:center">Conectando ao servidor…</p>';
  const res = await cloudGet(8000);
  if (res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
    S = migrar(res.state);                 // nuvem respondeu com dados → usa a nuvem
    localStorage.setItem(KEY, JSON.stringify(S));
    marcarSync('ok');
  } else if (res.ok && !res.state){
    cloudPut();                            // servidor respondeu e está REALMENTE vazio → primeira vez: envia a base
  } else {
    marcarSync('off');                     // erro/sem conexão → NUNCA sobrescreve a nuvem; mantém o local
  }
  S.usuario=null; S.perfil=null;   // segurança: sempre pede login ao abrir
  const av=document.getElementById('appVer'); if(av) av.textContent=APP_VERSAO;
  renderLogin();
})();

/* PWA: registra o service worker (offline + instalável) */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
