<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Togethere · Gestão Escolar</title>
<!-- PWA: app instalável no celular/tablet -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#005EAF" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Togethere" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Zilla+Slab:ital,wght@1,600;1,700&display=swap" rel="stylesheet" />
<style>
/* ===================== Togethere — Identidade NUSA ===================== */
:root{
  --azul:#005EAF;       /* principal */
  --marinho:#002B64;    /* profundo */
  --vermelho:#E52524;   /* alerta */
  --amarelo:#FFC800;    /* destaque */
  --rosa:#FF005F;       /* apoio */
  --laranja:#FF2A00;    /* apoio */
  --roxo:#DF6DFF;       /* apoio */

  --bg:#F4F6FB;
  --card:#FFFFFF;
  --tinta:#15233B;
  --tinta-suave:#5A6B86;
  --linha:#E4E9F2;
  --ok:#16A07A;

  --r:16px;
  --r-sm:11px;
  --sombra:0 8px 30px rgba(0,43,100,.08);
  --sombra-sm:0 2px 10px rgba(0,43,100,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Urbanist',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tinta);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;font-weight:600;line-height:1.2}
.display{font-family:'Zilla Slab',serif;font-style:italic;font-weight:600}
button{font-family:'Poppins',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Urbanist',sans-serif}
a{color:inherit}

/* feijão — assinatura da marca */
.feijao{display:inline-block;border-radius:62% 38% 55% 45% / 55% 48% 52% 45%}

/* ===================== LOGIN ===================== */
#login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 100% 0%, #0a6dc4 0%, var(--azul) 38%, var(--marinho) 100%);
  overflow:hidden;z-index:50;
}
#login .blob{position:absolute;opacity:.9;filter:saturate(1.1)}
#login .b1{width:230px;height:230px;background:var(--amarelo);top:-60px;left:-50px;transform:rotate(18deg)}
#login .b2{width:170px;height:170px;background:var(--rosa);bottom:-40px;left:12%;transform:rotate(-12deg)}
#login .b3{width:140px;height:140px;background:var(--roxo);top:14%;right:8%;transform:rotate(30deg)}
#login .b4{width:90px;height:90px;background:var(--vermelho);bottom:18%;right:18%}
.login-card{
  position:relative;z-index:2;width:min(440px,92vw);background:var(--card);
  border-radius:26px;padding:38px 34px;box-shadow:0 30px 80px rgba(0,20,55,.4);
  animation:rise .5s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand .mark{width:42px;height:42px;background:var(--azul);position:relative;flex:none}
.brand .mark::after{content:"";position:absolute;width:15px;height:15px;background:var(--amarelo);border-radius:60% 40% 55% 45%;right:-4px;bottom:-4px}
.brand .name{font-family:'Poppins';font-weight:700;font-size:1.45rem;letter-spacing:-.5px}
.brand .name b{color:var(--azul)}
/* logomarca oficial (arquivo logo.png na pasta do projeto) */
.logo-img{height:46px;width:auto;display:block}
.wm{font-family:'Poppins';font-weight:700;font-size:1.4rem;letter-spacing:-.5px;color:var(--marinho)}
.wm b{color:var(--azul)}
.tagline{font-family:'Zilla Slab';font-style:italic;font-weight:600;color:var(--tinta-suave);margin:2px 0 26px;font-size:1.02rem}
.login-card h2{font-size:1.06rem;margin-bottom:14px}
.perfis{display:grid;gap:12px}
.perfil-btn{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:#fff;border:1.5px solid var(--linha);border-radius:var(--r);padding:14px 16px;
  transition:.15s;font-size:.97rem;color:var(--tinta);
}
.perfil-btn:hover{border-color:var(--azul);transform:translateY(-2px);box-shadow:var(--sombra-sm)}
.perfil-btn .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:1.25rem;flex:none}
.perfil-btn small{display:block;color:var(--tinta-suave);font-size:.8rem;font-family:'Urbanist'}
.perfil-btn b{font-family:'Poppins';font-weight:600}
.grp-login{font-family:'Poppins';font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tinta-suave);margin:16px 2px 8px}
.grp-login:first-child{margin-top:4px}

/* ===================== APP SHELL ===================== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}

/* Sidebar */
.side{
  width:248px;background:linear-gradient(180deg,var(--marinho),#001a3f);color:#fff;
  display:flex;flex-direction:column;flex:none;position:sticky;top:0;height:100vh;
}
.side .top{padding:22px 20px 14px}
.side .brand .name{color:#fff;font-size:1.2rem}
.side .brand .name b{color:var(--amarelo)}
.side .brand{background:#fff;border-radius:12px;padding:7px 11px;display:inline-flex;align-items:center}
.side .logo-img{height:28px}
.side .wm{font-size:1.12rem}
.side .brand .mark{width:34px;height:34px}
.nav{flex:1;overflow-y:auto;padding:8px 12px 20px}
.nav .grp{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:#7f94b8;margin:16px 10px 6px;font-family:'Poppins';font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  color:#c5d3ea;font-size:.92rem;font-family:'Poppins';font-weight:500;margin-bottom:2px;
  transition:.13s;border:none;background:none;width:100%;text-align:left;cursor:pointer;
}
.nav button .em{font-size:1.05rem;width:20px;text-align:center}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:var(--azul);color:#fff}
.nav button .badge{margin-left:auto;background:var(--vermelho);color:#fff;font-size:.7rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side .foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:.82rem;color:#9fb1d1}
.side .foot button{background:none;border:none;color:#9fb1d1;font-size:.82rem;display:flex;align-items:center;gap:8px;width:100%;padding:6px 0}
.side .foot button:hover{color:#fff}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--card);border-bottom:1px solid var(--linha);padding:16px 28px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;
}
.topbar h1{font-size:1.18rem}
.topbar .crumb{font-size:.8rem;color:var(--tinta-suave);font-family:'Poppins'}
.topbar .me{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.86rem;color:var(--tinta-suave)}
.topbar .me .dot{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:600;font-family:'Poppins';font-size:.85rem}
.content{padding:26px 28px 60px;max-width:1180px;width:100%}

/* Hamburger (mobile) */
.burger{display:none;background:none;border:none;font-size:1.4rem;color:var(--marinho)}

/* ===================== COMPONENTES ===================== */
.section-title{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.section-title .fj{width:18px;height:18px;flex:none}
.section-title h2{font-size:1.32rem}
.sub{color:var(--tinta-suave);font-size:.92rem;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--sombra-sm);padding:20px;margin-bottom:18px}
.card h3{font-size:1.02rem;margin-bottom:4px}
.card .hint{font-size:.84rem;color:var(--tinta-suave);margin-bottom:14px}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

label.lbl{display:block;font-family:'Poppins';font-weight:500;font-size:.85rem;margin:0 0 6px;color:var(--tinta)}
.field{margin-bottom:14px}
input[type=text],input[type=date],input[type=number],textarea,select{
  width:100%;border:1.5px solid var(--linha);border-radius:var(--r-sm);padding:11px 13px;
  font-size:.94rem;background:#fff;color:var(--tinta);transition:.13s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,94,175,.12)}
textarea{resize:vertical;min-height:90px;line-height:1.5}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:160px}

.btn{
  display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;
  border-radius:var(--r-sm);padding:11px 18px;font-weight:600;font-size:.9rem;transition:.13s;
}
.btn:hover{background:#0a6dc4;transform:translateY(-1px)}
.btn.ghost{background:#fff;color:var(--azul);border:1.5px solid var(--linha)}
.btn.ghost:hover{border-color:var(--azul);background:#f2f7fd}
.btn.amarelo{background:var(--amarelo);color:var(--marinho)}
.btn.amarelo:hover{background:#ffd633}
.btn.red{background:var(--vermelho)}
.btn.red:hover{background:#c91f1e}
.btn.sm{padding:7px 12px;font-size:.82rem}
.btn.block{width:100%;justify-content:center}

.tag{display:inline-flex;align-items:center;gap:5px;font-family:'Poppins';font-weight:600;font-size:.72rem;padding:3px 10px;border-radius:20px}
.tag.kids{background:#fff0f6;color:var(--rosa)}
.tag.junior{background:#fff8e0;color:#b88600}
.tag.teens{background:#eaf3ff;color:var(--azul)}
.tag.adults{background:#f4ecff;color:#9333c7}
.tag.talking{background:#ffeee9;color:var(--laranja)}
.pill{font-size:.74rem;font-family:'Poppins';font-weight:600;padding:3px 9px;border-radius:20px;background:#eef2f8;color:var(--tinta-suave)}

table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;font-family:'Poppins';font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--tinta-suave);padding:8px 10px;border-bottom:1px solid var(--linha)}
td{padding:10px;border-bottom:1px solid var(--linha);vertical-align:middle}
tr:last-child td{border-bottom:none}

.seg{display:inline-flex;background:#eef2f8;border-radius:10px;padding:3px}
.seg button{background:none;border:none;padding:6px 13px;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--tinta-suave)}
.seg button.on-p{background:var(--ok);color:#fff}
.seg button.on-f{background:var(--vermelho);color:#fff}
.seg button.on-ok{background:var(--ok);color:#fff}
.seg button.on-mid{background:var(--amarelo);color:#4a3a00}
.seg button.on-no{background:var(--vermelho);color:#fff}

.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--linha)}
.check:last-child{border-bottom:none}
.check input{width:20px;height:20px;accent-color:var(--azul);flex:none;cursor:pointer}
.check span{flex:1}
.check.done span{text-decoration:line-through;color:var(--tinta-suave)}
.check .x{background:none;border:none;color:var(--tinta-suave);font-size:1rem;opacity:.5}
.check .x:hover{opacity:1;color:var(--vermelho)}

.empty{text-align:center;padding:34px 20px;color:var(--tinta-suave)}
.empty .big{font-size:2rem;margin-bottom:8px;opacity:.5}

.alert-card{display:flex;gap:14px;align-items:flex-start;border-left:4px solid var(--vermelho);background:#fff;border-radius:var(--r-sm);padding:15px 16px;margin-bottom:12px;box-shadow:var(--sombra-sm)}
.alert-card.mat{border-left-color:var(--laranja)}
.alert-card .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;font-size:1.1rem}
.alert-card .ic.falta{background:#fdeaea;color:var(--vermelho)}
.alert-card .ic.mat{background:#ffeee5;color:var(--laranja)}
.alert-card .info{flex:1}
.alert-card .info b{font-family:'Poppins'}
.alert-card .info p{font-size:.86rem;color:var(--tinta-suave);margin-top:2px}
.alert-card .acts{display:flex;flex-direction:column;gap:6px}

/* Eisenhower */
.emat{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.quad{border-radius:var(--r);padding:16px;min-height:180px;border:1.5px solid var(--linha);background:#fff}
.quad h4{display:flex;align-items:center;gap:8px;font-size:.95rem;margin-bottom:3px}
.quad .qsub{font-size:.76rem;color:var(--tinta-suave);margin-bottom:12px}
.quad .dot{width:11px;height:11px;border-radius:50%}
.quad.q1{border-top:4px solid var(--vermelho)}
.quad.q2{border-top:4px solid var(--azul)}
.quad.q3{border-top:4px solid var(--amarelo)}
.quad.q4{border-top:4px solid var(--tinta-suave)}
.task{background:#f7f9fc;border:1px solid var(--linha);border-radius:10px;padding:9px 11px;margin-bottom:8px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start}
.task .grab{cursor:grab;color:var(--tinta-suave);font-size:.8rem;padding-top:2px}
.task .t-txt{flex:1}
.task .mv{font-size:.72rem;color:var(--azul);background:none;border:none;font-family:'Poppins';font-weight:600}
.task .del{background:none;border:none;color:var(--tinta-suave);opacity:.5;font-size:.85rem}
.task .del:hover{opacity:1;color:var(--vermelho)}
.task.feito{opacity:.55}.task.feito .t-txt{text-decoration:line-through}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--marinho);color:#fff;padding:13px 22px;border-radius:12px;font-family:'Poppins';font-weight:500;font-size:.9rem;box-shadow:0 12px 40px rgba(0,20,55,.35);opacity:0;transition:.25s;z-index:99;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,20,55,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--r);width:min(520px,96vw);max-height:90vh;overflow:auto;padding:24px;box-shadow:var(--sombra)}
.modal h3{margin-bottom:14px;display:flex;align-items:center;gap:9px}
.modal .close{margin-left:auto;background:none;border:none;font-size:1.3rem;color:var(--tinta-suave);cursor:pointer}

.gen-box{background:#f7f9fc;border:1.5px dashed var(--linha);border-radius:var(--r-sm);padding:16px;font-size:.92rem;line-height:1.65;white-space:pre-wrap;color:var(--tinta);min-height:80px}

.kpi{display:flex;align-items:center;gap:14px}
.kpi .num{font-family:'Poppins';font-weight:700;font-size:1.9rem;line-height:1}
.kpi .k-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.3rem;flex:none}
.kpi small{color:var(--tinta-suave);font-size:.82rem;display:block;margin-top:3px}

@media(max-width:860px){
  .side{position:fixed;left:-260px;z-index:40;transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .side.open{left:0}
  .burger{display:block}
  .g2,.g3{grid-template-columns:1fr}
  .emat{grid-template-columns:1fr}
  .content{padding:18px 16px 50px}
  .topbar{padding:14px 16px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <span class="feijao blob b1"></span>
  <span class="feijao blob b2"></span>
  <span class="feijao blob b3"></span>
  <span class="feijao blob b4"></span>
  <div class="login-card">
    <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
    <div class="tagline">inglês para chegar lá</div>
    <h2 id="loginTitulo">Entrar</h2>
    <div id="loginPanel"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="shell">
    <aside class="side" id="side">
      <div class="top">
        <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">
        <div id="syncDot" onclick="cloudPut()" style="font-size:.72rem;color:#9fb1d1;margin-bottom:8px;cursor:pointer" title="Clique para sincronizar agora">☁️ …</div>
        <div id="perfilLabel" style="margin-bottom:8px"></div>
        <button onclick="logout()">🚪 Sair</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="burger" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <div>
          <div class="crumb" id="crumb">Início</div>
          <h1 id="pageTitle">Painel</h1>
        </div>
        <div class="me">
          <span id="meName"></span>
          <span class="dot" id="meDot"></span>
        </div>
      </header>
      <div class="content" id="view"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   ESTADO  —  persistência em localStorage
   ========================================================================= */
const KEY='togethere_v2';
let S=load();

function load(){
  let s=null;
  try{const r=localStorage.getItem(KEY);if(r)s=JSON.parse(r);}catch(e){}
  if(!s) s=seed();
  return migrar(s);
}
function migrar(s){
  s.versao=s.versao||1;
  if(s.versao<2){                 // padroniza senhas para 12345
    (s.usuarios||[]).forEach(u=>{u.senha='12345';});
    s.versao=2;
  }
  s.comentarios=s.comentarios||[]; // garante campos novos
  return s;
}
/* ============== NUVEM — sincronização com o Google Apps Script ==============
   CLOUD_SECRET precisa ser IGUAL ao APP_SECRET que você colocou no Apps Script. */
const CLOUD_URL    = 'https://script.google.com/macros/s/AKfycbylxwXqDh5ohAL4qLTn7WBQAu4juwt2bwgdiuGHDl1Ll3d1ViK-mdbeMghnG4UH3GNH/exec';
const CLOUD_SECRET = 'togethere-junho-7Q2';
/* ============================================================================ */
let _syncTimer=null;
function cloudOn(){ return CLOUD_URL && CLOUD_URL.indexOf('/exec')>0; }
function marcarSync(st){
  const e=document.getElementById('syncDot');
  if(e) e.textContent = st==='ok' ? '☁️ sincronizado' : st==='off' ? '⚠️ sem conexão' : '☁️ sincronizando…';
}
async function cloudGet(timeout){
  if(!cloudOn()) return null;
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),timeout||7000);
  try{
    const r=await fetch(CLOUD_URL+'?action=get&secret='+encodeURIComponent(CLOUD_SECRET),{signal:ctrl.signal});
    clearTimeout(t);
    const j=await r.json();
    return (j && Object.keys(j).length) ? j : null;
  }catch(e){ clearTimeout(t); return null; }
}
function cloudPut(){
  if(!cloudOn()) return Promise.resolve();
  marcarSync('...');
  const limpo=Object.assign({},S,{usuario:null,perfil:null});   // sessão não vai para a nuvem
  return fetch(CLOUD_URL+'?action=put&secret='+encodeURIComponent(CLOUD_SECRET),{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(limpo)
  }).then(()=>marcarSync('ok')).catch(()=>marcarSync('off'));
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(S));
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(cloudPut,800);   // agrupa edições rápidas antes de enviar
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function hoje(){return new Date().toISOString().slice(0,10);}
function diasAtras(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function pesoFalta(turmaId){const t=S.turmas.find(x=>x.id===turmaId);return (t&&t.vezesSemana===1)?2:1;}

/* dados reais da escola (relatório Sponte 12/06/2026) */
function seed(){
  const T=[

/* =========================================================================
   MOTOR DE ALERTAS
   ========================================================================= */
function alertasFaltas(){
  const out=[];
  S.alunos.forEach(a=>{
    const sess=S.presencas.filter(p=>p.turmaId===a.turmaId && a.id in p.registros)
                          .sort((x,y)=>x.data.localeCompare(y.data));
    let streak=0;
    for(let i=sess.length-1;i>=0;i--){ if(sess[i].registros[a.id]==='falta')streak++; else break; }
    const peso=pesoFalta(a.turmaId), equiv=streak*peso;
    if(equiv>=3){
      const motivo = peso===2
        ? `${streak} aula(s) seguida(s) sem vir (${equiv} faltas)`
        : `${streak} faltas consecutivas`;
      out.push({alunoId:a.id, tipo:'falta', n:equiv, motivo});
    }
  });
  return out.filter(o=>!jaContatado(o.alunoId,'falta'));
}
function alertasMaterial(){
  const out=[];
  S.alunos.forEach(a=>{
    const sess=S.material.filter(m=>m.turmaId===a.turmaId).sort((x,y)=>x.data.localeCompare(y.data));
    let streak=0, total=0;
    sess.forEach(m=>{ if(m.faltantes.includes(a.id)) total++; });
    for(let i=sess.length-1;i>=0;i--){ if(sess[i].faltantes.includes(a.id))streak++; else break; }
    if(streak>=3) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${streak} aulas seguidas`});
    else if(total>=5) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${total} aulas (alternadas)`});
  });
  return out.filter(o=>!jaContatado(o.alunoId,'material'));
}
function jaContatado(alunoId,tipo){
  return S.contatos.some(c=>c.alunoId===alunoId && c.tipo===tipo);
}
function totalAlertas(){return alertasFaltas().length+alertasMaterial().length;}

/* ---- incidentes detalhados (para registro da direção e relatórios) ---- */
function faltasDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && p.registros[alunoId]==='falta')
    .map(p=>p.data).sort();
}
function materialDoAluno(alunoId,turmaId){
  return S.material.filter(m=>m.turmaId===turmaId && (m.faltantes||[]).includes(alunoId))
    .map(m=>m.data).sort();}
function atrasosDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.atrasados||[]).includes(alunoId)).map(p=>p.data).sort();}
function saidasCedoDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.saiuCedo||[]).includes(alunoId)).map(p=>p.data).sort();}
function temasNaoFeitosDoAluno(alunoId,turmaId){
  return S.temas.filter(t=>t.turmaId===turmaId && (t.entregas[alunoId]===false || t.entregas[alunoId]==='parcial'))
    .map(t=>({data:t.data,descricao:t.descricao,origem:t.origem||'extra',status:t.entregas[alunoId]==='parcial'?'parcial':'naofeito'})).sort((a,b)=>a.data.localeCompare(b.data));
}
function comentariosDoAluno(alunoId){
  return S.comentarios.filter(c=>c.alunoId===alunoId).sort((a,b)=>a.data.localeCompare(b.data));
}
// lista geral de incidentes de um tipo (para a direção)
function registroGeral(tipo){
  const out=[];
  S.alunos.forEach(a=>{
    let datas=[];
    if(tipo==='falta') datas=faltasDoAluno(a.id,a.turmaId);
    else if(tipo==='material') datas=materialDoAluno(a.id,a.turmaId);
    else if(tipo==='tema') datas=temasNaoFeitosDoAluno(a.id,a.turmaId).map(t=>t.data);
    datas.forEach(d=>out.push({alunoId:a.id,turmaId:a.turmaId,data:d}));
  });
  return out.sort((x,y)=>y.data.localeCompare(x.data)); // mais recentes primeiro
}

function fazerLogin(){
  const nome=(document.getElementById('loginUser').value||'').trim();
  const senha=(document.getElementById('loginSenha').value||'').trim();
  if(!nome||!senha) return toast('Preencha usuário e senha');
  const u=S.usuarios.find(x=>x.nome.toLowerCase()===nome.toLowerCase());
  if(!u || u.senha!==senha){ toast('Usuário ou senha incorretos'); return; }
  S.usuario=u.nome; S.perfil=u.perfil;
  aplicarLogin(u);
}
function aplicarLogin(u){
  S.perfil=u.perfil;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  const meta=PERFIS[u.perfil];
  document.getElementById('meName').textContent=u.nome;
  document.getElementById('meDot').style.background=meta.cor;
  document.getElementById('meDot').textContent=u.nome[0];
  document.getElementById('perfilLabel').innerHTML='Conectado como <b style="color:#fff">'+u.nome+'</b> · '+meta.nome;
  montarNav(); ir(NAV.find(n=>n.roles.includes(u.perfil)).id);
}
function logout(){ location.reload(); }

function montarNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  let grpAtual='';
  NAV.filter(n=>n.menu!==false && n.roles.includes(S.perfil)).forEach(n=>{
    if(n.grp!==grpAtual){grpAtual=n.grp;const g=document.createElement('div');g.className='grp';g.textContent=n.grp;nav.appendChild(g);}
    const a=document.createElement('button');
    a.className='nav-a'; a.dataset.id=n.id;
    a.innerHTML=`<span class="em">${n.em}</span> ${n.label}`;
    if(n.badge){const t=totalAlertas();if(t)a.innerHTML+=`<span class="badge">${t}</span>`;}
    a.onclick=()=>ir(n.id);
    nav.appendChild(a);
  });
  // aplica classe ".nav a" via tag genérica
  nav.querySelectorAll('button').forEach(b=>b.classList.add('navbtn'));
}
function ir(id){
  rota=id; const n=NAV.find(x=>x.id===id);
  document.getElementById('pageTitle').textContent=n.label;
  document.getElementById('crumb').textContent=n.grp;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.getElementById('side').classList.remove('open');
  VIEWS[id]();
  window.scrollTo(0,0);

function presRec(criar){
  let rec=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData);
  if(!rec && criar){ rec={id:uid(),turmaId:presTurma,data:presData,registros:{},atrasados:[],saiuCedo:[]}; alunosDa(presTurma).forEach(a=>rec.registros[a.id]='presente'); S.presencas.push(rec); }
  return rec;
}
function renderPres(){
  const box=document.getElementById('pBox');
  const rec=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData)||{registros:{},atrasados:[],saiuCedo:[]};
  const reg=rec.registros||{}, atr=rec.atrasados||[], cedo=rec.saiuCedo||[];
  const als=alunosDa(presTurma);
  if(!als.length){box.innerHTML='<div class="empty"><div class="big">👥</div>Nenhum aluno nesta turma ainda.</div>';return;}
  box.innerHTML=`<h3>${als.length} alunos · ${brDate(presData)}</h3><p class="hint">Toque para alternar presença. Marque atraso / saída antecipada quando houver.</p>
    ${als.map(a=>{
      const st=reg[a.id]||'presente';
      return `<div style="padding:10px 0;border-bottom:1px dashed var(--linha)">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <b style="flex:1;min-width:130px">${a.nome}</b>
          <div class="seg"><button class="${st==='presente'?'on-p':''}" onclick="setPres('${a.id}','presente')">Presente</button>
          <button class="${st==='falta'?'on-f':''}" onclick="setPres('${a.id}','falta')">Falta</button></div>
        </div>
        ${st==='presente'?`<div style="display:flex;gap:18px;margin-top:8px;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer"><input type="checkbox" ${atr.includes(a.id)?'checked':''} onchange="toggleAtraso('${a.id}')"> chegou atrasado</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer"><input type="checkbox" ${cedo.includes(a.id)?'checked':''} onchange="toggleSaiuCedo('${a.id}')"> saiu mais cedo</label>
        </div>`:''}
      </div>`;
    }).join('')}
    <div style="margin-top:16px"><button class="btn" onclick="salvarPres()">Salvar chamada</button></div>`;
}
function setPres(id,st){
  const rec=presRec(true);
  rec.registros[id]=st;
  if(st==='falta'){ rec.atrasados=(rec.atrasados||[]).filter(x=>x!==id); rec.saiuCedo=(rec.saiuCedo||[]).filter(x=>x!==id); }
  renderPres();
}
function toggleAtraso(id){const rec=presRec(true);rec.atrasados=rec.atrasados||[];const i=rec.atrasados.indexOf(id);if(i>=0)rec.atrasados.splice(i,1);else rec.atrasados.push(id);renderPres();}
function toggleSaiuCedo(id){const rec=presRec(true);rec.saiuCedo=rec.saiuCedo||[];const i=rec.saiuCedo.indexOf(id);if(i>=0)rec.saiuCedo.splice(i,1);else rec.saiuCedo.push(id);renderPres();}
function salvarPres(){save();montarNav();renderPresLista();toast('Chamada salva');}
function carregaPres(data){presData=data;const el=document.getElementById('pD');if(el)el.value=data;renderPres();window.scrollTo({top:0,behavior:'smooth'});}
function renderPresLista(){
  const box=document.getElementById('pLista'); if(!box)return;
  const recs=S.presencas.filter(p=>p.turmaId===presTurma);
  const q=presBusca.trim();
  let filt,titulo;
  if(q){ filt=recs.filter(p=>p.data.includes(q)||brDate(p.data).includes(q)); titulo=`Resultados (${filt.length})`; }
  else { const lim=diasAtras(7); filt=recs.filter(p=>p.data>=lim); titulo='Chamadas dos últimos 7 dias'; }
  filt.sort((a,b)=>b.data.localeCompare(a.data));
  if(!filt.length){ box.innerHTML=`<p class="hint">${q?'Nenhuma chamada encontrada.':'Nenhuma chamada nos últimos 7 dias.'}</p>`; return; }
  box.innerHTML=`<p class="hint" style="margin:4px 0 6px">${titulo}</p>`+filt.map(p=>{
    const nf=Object.values(p.registros).filter(s=>s==='falta').length;
    return `<div class="check"><span>${brDate(p.data)} · ${nf} falta(s)</span><button class="btn ghost sm" style="margin-left:auto" onclick="carregaPres('${p.data}')">abrir</button></div>`;
  }).join('');
}

function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function modalTema(turmaId,descricao,data,origem){
  const als=alunosDa(turmaId);
  modal(`<h3>📩 Tema de casa <button class="close" onclick="fechar()">×</button></h3>
    <div class="field"><label class="lbl">Descrição do tema</label><input type="text" id="mtDesc" value="${escAttr(descricao)}" placeholder="Ex: Workbook pág. 30, ex. 1 a 4"></div>
    <div class="row"><div class="field"><label class="lbl">Data</label><input type="date" id="mtData" value="${data||hoje()}"></div>
    <div class="field"><label class="lbl">Para quem?</label><select id="mtAlvo" onchange="document.getElementById('mtAlunos').style.display=this.value==='alguns'?'block':'none'">
      <option value="todos">Turma toda</option><option value="alguns">Escolher alunos</option></select></div></div>
    <div id="mtAlunos" style="display:none;max-height:230px;overflow:auto;border:1px solid var(--linha);border-radius:10px;padding:4px 12px;margin-bottom:14px">
      ${als.map(a=>`<label class="check" style="cursor:pointer"><input type="checkbox" class="mtChk" value="${a.id}"><span>${a.nome}</span></label>`).join('')||'<p class="hint">Turma sem alunos.</p>'}
    </div>
    <button class="btn block" onclick="criarTema('${turmaId}','${origem||'extra'}')">Criar tema</button>`);
  setTimeout(()=>{const i=document.getElementById('mtDesc'); if(i&&!i.value) i.focus();},60);
}
function criarTema(turmaId,origem){
  const desc=document.getElementById('mtDesc').value.trim();
  if(!desc)return toast('Descreva o tema');
  const data=document.getElementById('mtData').value;
  let alvos;
  if(document.getElementById('mtAlvo').value==='alguns'){
    alvos=[...document.querySelectorAll('.mtChk:checked')].map(c=>c.value);
    if(!alvos.length)return toast('Selecione ao menos um aluno');
  }else{
    alvos=alunosDa(turmaId).map(a=>a.id);
  }
  const ent={}; alvos.forEach(id=>ent[id]=true);   // padrão: todos entregaram (marca-se quem NÃO entregou)
  S.temas.push({id:uid(),turmaId,data,descricao:desc,entregas:ent,origem:origem||'extra'});
  save(); fechar(); toast('Tema de casa criado');
  if(rota==='temas'){ temaTurma=turmaId; VIEWS.temas(); }
  else if(rota==='planos'){ renderPlanos(); }
}
function temaDoPlano(pid,i){ const p=S.planos.find(p=>p.id===pid); if(!p)return; modalTema(p.turmaId,p.itens[i].txt,p.data,'plano'); }
function renderTemas(){
  const list=document.getElementById('tList');
  let ts=S.temas.filter(t=>t.turmaId===temaTurma);
  const raw=(_buscaTema||'').trim(), q=_normTxt(raw);
  if(q){ ts=ts.filter(t=>_normTxt(t.descricao).includes(q)||t.data.includes(raw)||brDate(t.data).includes(raw)); }
  else { const lim=diasAtras(7); ts=ts.filter(t=>t.data>=lim); }
  ts.sort((a,b)=>b.data.localeCompare(a.data));
  if(!ts.length){list.innerHTML=`<div class="card empty"><div class="big">📚</div>${raw?'Nenhum tema encontrado.':'Nenhum tema extra na última semana para esta turma.'}</div>`;return;}
  const totalTurma=alunosDa(temaTurma).length;
  list.innerHTML=ts.map(t=>{
    const alvos=Object.keys(t.entregas);
    const naoFeito=alvos.filter(aid=>t.entregas[aid]===false).length;
    const parcial=alvos.filter(aid=>t.entregas[aid]==='parcial').length;
    const alvoLabel=(totalTurma>0 && alvos.length>=totalTurma)?'Turma toda':alvos.length+' aluno(s)';
    const badge=t.origem==='plano'?'<span class="pill" style="background:#e6f0fb;color:var(--azul)">do plano</span>':'<span class="pill">extra</span>';
    return `<div class="card"><div style="display:flex;align-items:flex-start;gap:8px"><div style="flex:1"><h3 style="margin:0">${t.descricao}</h3>
      <p class="hint" style="margin:4px 0 0">${brDate(t.data)} · ${alvoLabel} · ${naoFeito} não feito${parcial?` · ${parcial} parcial`:''} &nbsp;${badge}</p></div>
      <button class="btn ghost sm" onclick="editarTema('${t.id}')">✏️ editar</button></div>
      <p class="hint" style="margin:8px 0 8px">Padrão: <b>feito</b>. Marque quem fez <b>parcialmente</b> ou <b>não fez</b>.</p>
      <button class="btn ghost sm" style="margin-bottom:6px" onclick="todosEntregaram('${t.id}')">✓ Todos feito</button>
      ${alvos.map(aid=>{const a=S.alunos.find(x=>x.id===aid);const st=t.entregas[aid];
        return `<div class="check"><span style="flex:1">${a?a.nome:'—'}</span>
          <div class="seg"><button class="${st===true?'on-ok':''}" onclick="setTema('${t.id}','${aid}',true)">feito</button>
          <button class="${st==='parcial'?'on-mid':''}" onclick="setTema('${t.id}','${aid}','parcial')">parcial</button>
          <button class="${st===false?'on-no':''}" onclick="setTema('${t.id}','${aid}',false)">não feito</button></div></div>`;}).join('')}
      ${ehProfessor()?'':`<button class="btn ghost sm" style="margin-top:12px;color:var(--vermelho)" onclick="delTema('${t.id}')">Excluir tema</button>`}</div>`;
  }).join('');
}
function setTema(tid,aid,val){const t=S.temas.find(t=>t.id===tid);t.entregas[aid]=val;save();renderTemas();}
function todosEntregaram(tid){const t=S.temas.find(t=>t.id===tid);if(!t)return;Object.keys(t.entregas).forEach(k=>t.entregas[k]=true);save();renderTemas();toast('Todos marcados como feito');}
function delTema(id){if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir este tema de casa?')){S.temas=S.temas.filter(t=>t.id!==id);save();renderTemas();toast('Tema excluído');}}
function editarTema(id){
  const t=S.temas.find(x=>x.id===id); if(!t)return;
  modal(`<h3>✏️ Editar tema <button class="close" onclick="fechar()">×</button></h3>
    <div class="field"><label class="lbl">Descrição</label><input type="text" id="etDesc" value="${escAttr(t.descricao)}"></div>
    <div class="field"><label class="lbl">Data</label><input type="date" id="etData" value="${t.data}"></div>
    <button class="btn block" onclick="salvarEdicaoTema('${id}')">Salvar alterações</button>`);
  setTimeout(()=>{const i=document.getElementById('etDesc'); if(i)i.focus();},60);
}
function salvarEdicaoTema(id){
  const t=S.temas.find(x=>x.id===id); if(!t)return;
  const d=document.getElementById('etDesc').value.trim(); if(!d)return toast('Descreva o tema');
  t.descricao=d; t.data=document.getElementById('etData').value;
  save(); fechar(); renderTemas(); toast('Tema atualizado');
}

    <p class="sub">Lance as notas e veja a média da turma.</p>
    <div class="card"><h3>Novo teste</h3><div class="row">
      <div><label class="lbl">Turma</label>${selectTurma('teT',testeTurma)}</div>
      <div style="flex:2"><label class="lbl">Nome do teste</label><input type="text" id="teNome" placeholder="Ex: Unit 5 — Reading"></div>
      <div><label class="lbl">Data</label><input type="date" id="teD" value="${hoje()}"></div></div>
      <div style="margin-top:12px"><button class="btn" onclick="addTeste()">Criar teste</button></div></div>
    <div id="teList"></div>`;
  document.getElementById('teT').onchange=e=>testeTurma=e.target.value;

};
function addTeste(){
  const nome=document.getElementById('teNome').value.trim();
  if(!nome)return toast('Dê um nome ao teste');
  const turmaId=document.getElementById('teT').value;
  S.testes.push({id:uid(),turmaId,nome,data:document.getElementById('teD').value,notas:{}});
  save();VIEWS.testes();toast('Teste criado');
}
function renderTestes(){
  const list=document.getElementById('teList');
  const ts=S.testes.filter(t=>t.turmaId===testeTurma).sort((a,b)=>b.data.localeCompare(a.data));
  if(!ts.length){list.innerHTML='<div class="card empty"><div class="big">✏️</div>Nenhum teste para esta turma.</div>';return;}
  list.innerHTML=ts.map(t=>{
    const als=alunosDa(t.turmaId);
    const notas=als.map(a=>t.notas[a.id]).filter(n=>n!=null&&n!=='');
    const media=notas.length?(notas.reduce((s,n)=>s+(+n),0)/notas.length).toFixed(1):'—';
    return `<div class="card"><h3>${t.nome}</h3><p class="hint">${brDate(t.data)} · Média da turma: <b>${media}</b></p>
      <table><tbody>${als.map(a=>`<tr><td>${a.nome}</td><td style="width:110px"><input type="number" step="0.5" min="0" max="10" value="${t.notas[a.id]??''}" placeholder="—" onchange="setNota('${t.id}','${a.id}',this.value)"></td></tr>`).join('')}</tbody></table></div>`;
  }).join('');
}
function setNota(tid,aid,val){const t=S.testes.find(t=>t.id===tid);t.notas[aid]=val===''?'':+val;save();renderTestes();}

let matTurma=null, matData=hoje(), matBusca='';
VIEWS.material=()=>{
  matTurma=matTurma||primeiraTurma();
  const v=document.getElementById('view');
  v.innerHTML=`${btnVoltaPainel()}<div class="section-title"><span class="feijao fj" style="background:var(--laranja)"></span><h2 class="display">Material não trazido</h2></div>
    <p class="sub">Marque quem veio sem material. Alimenta os alertas: 3 aulas seguidas ou 5 alternadas.</p>
    <div class="card"><div class="row">
      <div><label class="lbl">Turma</label>${selectTurma('mT',matTurma)}</div>
      <div><label class="lbl">Data da aula</label><input type="date" id="mD" value="${matData}"></div></div></div>
    <div class="card" id="mBox"></div>
    <div class="card"><input type="text" id="mBusca" placeholder="🔎 Buscar registro anterior por data" value="${escAttr(matBusca)}" oninput="matBusca=this.value;renderMatLista()"><div id="mLista" style="margin-top:8px"></div></div>`;
  document.getElementById('mT').onchange=e=>{matTurma=e.target.value;renderMat();renderMatLista();};
  document.getElementById('mD').onchange=e=>{matData=e.target.value;renderMat();};
  renderMat(); renderMatLista();
};
function renderMat(){
  const box=document.getElementById('mBox');
  const rec=S.material.find(m=>m.turmaId===matTurma&&m.data===matData);
  const falt=rec?rec.faltantes:[];
  const als=alunosDa(matTurma);
  if(!als.length){box.innerHTML='<div class="empty"><div class="big">🎒</div>Sem alunos nesta turma.</div>';return;}
  box.innerHTML=`<h3>${brDate(matData)}</h3><p class="hint">Marque quem <b>não trouxe</b> o material.</p>
    ${als.map(a=>`<div class="check"><input type="checkbox" ${falt.includes(a.id)?'checked':''} onchange="toggleMat('${a.id}')"><span>${a.nome}</span>${falt.includes(a.id)?'<span class="pill" style="margin-left:auto;background:#ffeee5;color:var(--laranja)">sem material</span>':''}</div>`).join('')}
    <div style="margin-top:16px"><button class="btn" onclick="salvarMat()">Salvar</button></div>`;
}
function toggleMat(aid){
  let rec=S.material.find(m=>m.turmaId===matTurma&&m.data===matData);
  if(!rec){rec={id:uid(),turmaId:matTurma,data:matData,faltantes:[]};S.material.push(rec);}
  const i=rec.faltantes.indexOf(aid);
  if(i>=0)rec.faltantes.splice(i,1);else rec.faltantes.push(aid);
  renderMat();
}
function salvarMat(){save();montarNav();renderMatLista();toast('Material registrado');}
function carregaMat(data){matData=data;const el=document.getElementById('mD');if(el)el.value=data;renderMat();window.scrollTo({top:0,behavior:'smooth'});}
function renderMatLista(){
  const box=document.getElementById('mLista'); if(!box)return;
  const recs=S.material.filter(m=>m.turmaId===matTurma);
  const q=matBusca.trim();
  let filt,titulo;
  if(q){ filt=recs.filter(m=>m.data.includes(q)||brDate(m.data).includes(q)); titulo=`Resultados (${filt.length})`; }
  else { const lim=diasAtras(7); filt=recs.filter(m=>m.data>=lim); titulo='Registros dos últimos 7 dias'; }
  filt.sort((a,b)=>b.data.localeCompare(a.data));
  if(!filt.length){ box.innerHTML=`<p class="hint">${q?'Nenhum registro encontrado.':'Nenhum registro nos últimos 7 dias.'}</p>`; return; }
  box.innerHTML=`<p class="hint" style="margin:4px 0 6px">${titulo}</p>`+filt.map(m=>`<div class="check"><span>${brDate(m.data)} · ${(m.faltantes||[]).length} sem material</span><button class="btn ghost sm" style="margin-left:auto" onclick="carregaMat('${m.data}')">abrir</button></div>`).join('');
}

VIEWS.planos=()=>{
  const v=document.getElementById('view');
  v.innerHTML=`${btnVoltaPainel()}<div class="section-title"><span class="feijao fj" style="background:var(--azul)"></span><h2 class="display">Planos de aula</h2></div>
    <p class="sub">Mostra os da última semana. Use a busca para encontrar planos anteriores.</p>
    <button class="btn" style="margin-bottom:14px" onclick="novoPlano(painelTurma||'')">+ Novo plano de aula</button>
    <div class="card" style="padding:14px 18px"><input type="text" id="buscaPlano" placeholder="🔎 Buscar plano (título, conteúdo, turma ou data)" value="${escAttr(_buscaPlano)}" oninput="_buscaPlano=this.value;renderPlanos()"></div>
    <div id="plList"></div>`;
  renderPlanos();
};
let _buscaPlano='';
function novoPlano(turmaPreset){
  modal(`<h3>🗒️ Novo plano de aula <button class="close" onclick="fechar()">×</button></h3>
    <div class="field"><label class="lbl">Título</label><input type="text" id="plTit" placeholder="Ex: Present Perfect — experiências"></div>
    <div class="row"><div class="field"><label class="lbl">Turma</label>${selectTurma('plTurma',turmaPreset||primeiraTurma())}</div>
    <div class="field"><label class="lbl">Data</label><input type="date" id="plData" value="${hoje()}"></div></div>
    <div class="field"><label class="lbl">Itens do plano (um por linha)</label><textarea id="plItens" placeholder="Warm-up&#10;Apresentar estrutura&#10;Listening&#10;Speaking em duplas&#10;Tema de casa"></textarea></div>
    <button class="btn block" onclick="salvarPlano()">Criar plano</button>`);
}
function salvarPlano(){
  const tit=document.getElementById('plTit').value.trim();
  if(!tit)return toast('Dê um título');
  const itens=document.getElementById('plItens').value.split('\n').map(s=>s.trim()).filter(Boolean).map(t=>({txt:t,done:false}));
  S.planos.push({id:uid(),titulo:tit,turmaId:document.getElementById('plTurma').value,data:document.getElementById('plData').value,itens,anotacoes:'',conteudo:''});
  save();fechar();renderPlanos();toast('Plano criado');
}
function renderPlanos(){
  const list=document.getElementById('plList');
  let ps=(painelTurma?S.planos.filter(p=>p.turmaId===painelTurma):[...S.planos]).sort((a,b)=>b.data.localeCompare(a.data));
  const raw=(_buscaPlano||'').trim(), q=_normTxt(raw);
  if(q){ ps=ps.filter(p=> _normTxt(p.titulo).includes(q) || _normTxt(p.conteudo||'').includes(q) || _normTxt(turmaNome(p.turmaId)).includes(q) || p.data.includes(raw) || brDate(p.data).includes(raw)); }
  else { const lim=diasAtras(7); ps=ps.filter(p=>p.data>=lim); }
  if(!ps.length){list.innerHTML=`<div class="card empty"><div class="big">🗒️</div>${raw?'Nenhum plano encontrado.':'Nenhum plano na última semana. Crie um novo ou busque os anteriores acima.'}</div>`;return;}
  list.innerHTML=ps.map(p=>{
    const feitos=p.itens.filter(i=>i.done).length;
    return `<div class="card"><div style="display:flex;align-items:flex-start;gap:8px"><div style="flex:1"><h3 style="margin:0">${p.titulo}</h3><p class="hint" style="margin:4px 0 0">${turmaNome(p.turmaId)} · ${brDate(p.data)} · ${feitos}/${p.itens.length} itens feitos</p></div>
      <button class="btn ghost sm" onclick="editarPlano('${p.id}')">✏️ editar</button></div>
      <div style="margin-top:10px">${p.itens.map((it,i)=>`<div class="check ${it.done?'done':''}"><input type="checkbox" ${it.done?'checked':''} onchange="togglePlano('${p.id}',${i})"><span>${it.txt}</span><button class="btn ghost sm" style="margin-left:auto" title="Transformar em tema de casa" onclick="temaDoPlano('${p.id}',${i})">📩 tema</button></div>`).join('')}</div>
      <div class="field" style="margin-top:14px"><label class="lbl">Anotações</label><textarea onchange="setPlanoCampo('${p.id}','anotacoes',this.value)" placeholder="Observações sobre a aula...">${p.anotacoes||''}</textarea></div>
      ${ehProfessor()?'':`<button class="btn ghost sm" style="color:var(--vermelho)" onclick="delPlano('${p.id}')">Excluir plano</button>`}</div>`;
  }).join('');
}
function togglePlano(pid,i){const p=S.planos.find(p=>p.id===pid);p.itens[i].done=!p.itens[i].done;save();renderPlanos();}
function setPlanoCampo(pid,campo,val){const p=S.planos.find(p=>p.id===pid);p[campo]=val;save();}
function delPlano(pid){if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir este plano?')){S.planos=S.planos.filter(p=>p.id!==pid);save();renderPlanos();toast('Plano excluído');}}
function editarPlano(id){
  const p=S.planos.find(x=>x.id===id); if(!p)return;
  modal(`<h3>✏️ Editar plano <button class="close" onclick="fechar()">×</button></h3>
    <div class="field"><label class="lbl">Título</label><input type="text" id="epTit" value="${escAttr(p.titulo)}"></div>
    <div class="row"><div class="field"><label class="lbl">Data</label><input type="date" id="epData" value="${p.data}"></div>
    <div class="field"><label class="lbl">Conteúdo da aula</label><input type="text" id="epCont" value="${escAttr(p.conteudo||'')}" placeholder="Ex: Present perfect"></div></div>
    <div class="field"><label class="lbl">Itens (um por linha)</label><textarea id="epItens">${escAttr((p.itens||[]).map(i=>i.txt).join('\n'))}</textarea></div>
    <div class="field"><label class="lbl">Anotações</label><textarea id="epNotas">${escAttr(p.anotacoes||'')}</textarea></div>
    <button class="btn block" onclick="salvarEdicaoPlano('${id}')">Salvar alterações</button>`);
}
function salvarEdicaoPlano(id){
  const p=S.planos.find(x=>x.id===id); if(!p)return;
  const tit=document.getElementById('epTit').value.trim(); if(!tit)return toast('Dê um título');
  const antigos={}; (p.itens||[]).forEach(i=>antigos[i.txt]=i.done);
  p.itens=document.getElementById('epItens').value.split('\n').map(s=>s.trim()).filter(Boolean).map(txt=>({txt,done:!!antigos[txt]}));
  p.titulo=tit; p.data=document.getElementById('epData').value;
  p.conteudo=document.getElementById('epCont').value.trim(); p.anotacoes=document.getElementById('epNotas').value;
  save(); fechar(); renderPlanos(); toast('Plano atualizado');
}

function alunosSelect(id,turmaId,sel){
  const als=alunosDa(turmaId);
  if(!als.length)return `<select id="${id}"><option value="">(sem alunos)</option></select>`;
  return `<select id="${id}">${als.map(a=>`<option value="${a.id}" ${a.id===sel?'selected':''}>${a.nome}</option>`).join('')}</select>`;
}
function gerarResumo(){
  const turmaId=document.getElementById('rT').value, data=document.getElementById('rD').value;
  const turma=S.turmas.find(t=>t.id===turmaId);
  const plano=S.planos.find(p=>p.turmaId===turmaId&&p.data===data);
  const tema=S.temas.find(t=>t.turmaId===turmaId&&t.data===data);
  const feitos=plano?plano.itens.filter(i=>i.done).map(i=>i.txt):[];
  let txt=`Olá, famílias! 👋\n\nResumo da aula de hoje (${brDate(data)}) — ${turma.nome}:\n\n`;
  if(plano){
    txt+=`📖 Conteúdo: ${plano.conteudo||plano.titulo}\n`;
    if(feitos.length)txt+=`✅ Trabalhamos: ${feitos.join(', ')}.\n`;
  }else{
    txt+=`📖 Tivemos mais um dia de aprendizado de inglês!\n`;
  }
  if(tema)txt+=`\n📚 Tema de casa: ${tema.descricao}\n`;
  else txt+=`\n📚 Hoje não passamos tema de casa.\n`;
  txt+=`\nQualquer dúvida, estamos à disposição.\nEquipe Togethere 💙\ninglês para chegar lá`;
  document.getElementById('rOut').textContent=txt;
}
function copiarResumo(){
  const t=document.getElementById('rOut').textContent;
  if(t.startsWith('Clique'))return toast('Gere o resumo primeiro');
  navigator.clipboard.writeText(t).then(()=>toast('Texto copiado!'),()=>toast('Selecione e copie manualmente'));
}
// resumo do que foi dado numa aula (para os dias de falta)
function resumoAulaDoDia(turmaId,data){
  const plano=S.planos.find(p=>p.turmaId===turmaId&&p.data===data);
  const tema=S.temas.find(t=>t.turmaId===turmaId&&t.data===data);
  let s='';
  if(plano){ s=plano.conteudo||plano.titulo; const f=plano.itens.filter(i=>i.done).map(i=>i.txt); if(f.length)s+=' (trabalhado: '+f.join(', ')+')'; }
  if(tema) s+=(s?' | ':'')+'Tema passado: '+tema.descricao;
  return s||'aula não registrada no sistema';
}
function gerarRelatorioAluno(){
  const turmaId=document.getElementById('relT').value, alunoId=document.getElementById('relA').value;
  if(!alunoId)return toast('Escolha o aluno');
  const aluno=S.alunos.find(a=>a.id===alunoId), turma=S.turmas.find(t=>t.id===turmaId);
  const faltas=faltasDoAluno(alunoId,turmaId), mat=materialDoAluno(alunoId,turmaId);
  const temas=temasNaoFeitosDoAluno(alunoId,turmaId), coms=comentariosDoAluno(alunoId);
  const atrasos=atrasosDoAluno(alunoId,turmaId), saidas=saidasCedoDoAluno(alunoId,turmaId);
  const peso=pesoFalta(turmaId);
  let txt=`RELATÓRIO DO ALUNO\n${aluno.nome}\nTurma: ${turma.nome}${turma.professor?' · Prof. '+turma.professor:''}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  txt+=`\n📋 FALTAS (${faltas.length}${peso===2?` aulas = ${faltas.length*2} faltas (turma 1x/semana)`:''})\n`;
  if(faltas.length) faltas.forEach(d=>{ txt+=`• ${brDate(d)} — conteúdo da aula: ${resumoAulaDoDia(turmaId,d)}\n`; });
  else txt+=`• Nenhuma falta registrada.\n`;
  txt+=`\n⏰ CHEGOU ATRASADO (${atrasos.length})\n`;
  if(atrasos.length) atrasos.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🚪 SAIU MAIS CEDO (${saidas.length})\n`;
  if(saidas.length) saidas.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n📚 TEMAS DE CASA NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(t=>{ txt+=`• ${brDate(t.data)} — ${t.descricao}${t.origem==='plano'?' (do plano de aula)':' (extra)'} — ${t.status==='parcial'?'parcialmente feito':'não feito'}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n💬 COMENTÁRIOS (${coms.length})\n`;
  if(coms.length) coms.forEach(c=>{ txt+=`• ${brDate(c.data)} (${c.autor}): ${c.texto}\n`; }); else txt+=`• Nenhum comentário.\n`;
  txt+=`\n—\nTogethere · inglês para chegar lá`;
  document.getElementById('relOut').textContent=txt;
}
function addComentario(){
  const alunoId=document.getElementById('relA').value;
  if(!alunoId)return toast('Escolha o aluno');
  const txt=document.getElementById('relCom').value.trim();
  if(!txt)return toast('Escreva o comentário');
  S.comentarios.push({id:uid(),alunoId,data:hoje(),texto:txt,autor:S.usuario});
  document.getElementById('relCom').value=''; save(); toast('Comentário adicionado');
  if(!document.getElementById('relOut').textContent.startsWith('Selecione')) gerarRelatorioAluno();

function copiarRelatorio(){
  const t=document.getElementById('relOut').textContent;
  if(t.startsWith('Selecione'))return toast('Gere o relatório primeiro');
  navigator.clipboard.writeText(t).then(()=>toast('Relatório copiado!'),()=>toast('Selecione e copie manualmente'));

function imprimirRelatorio(){

function renderTurmaList(){
  const list=document.getElementById('turmaList');
  const ts=turmasVisiveis();

  const f=_normTxt(_buscaAluno||'').trim();
  if(f){   // modo busca: lista achatada de alunos que batem
    const res=[];
    ts.forEach(t=>alunosDa(t.id).forEach(a=>{ if(_normTxt(a.nome).includes(f)) res.push({a,t}); }));

      ? `<div class="card"><h3>${res.length} aluno(s) encontrado(s)</h3>`+

      : `<div class="card empty"><div class="big">🔎</div>Nenhum aluno encontrado para “${_buscaAluno}”.</div>`;
    return;

function abrirTurma(id){ painelTurma=id; presTurma=matTurma=temaTurma=testeTurma=id; renderPainelTurma(); }
function voltarTurmas(){ painelTurma=null; VIEWS.turmas(); }
function voltarPainel(){ if(painelTurma) renderPainelTurma(); else ir('turmas'); }
function btnVoltaPainel(){ const t=painelTurma&&S.turmas.find(x=>x.id===painelTurma); return t?`<button class="btn ghost sm" onclick="voltarPainel()" style="margin-bottom:10px">‹ Voltar para ${t.nome}</button>`:''; }
function paAcao(destino){
  const id=painelTurma; presTurma=matTurma=temaTurma=testeTurma=id;   // mantém painelTurma para o botão Voltar
  if(destino==='plano'){ ir('planos'); novoPlano(id); }
  else ir(destino);

function renderPainelTurma(){
  const id=painelTurma, t=S.turmas.find(x=>x.id===id);
  if(!t){ painelTurma=null; return VIEWS.turmas(); }
  const als=alunosDa(id);
  const freq=(t.vezesSemana===1)?'1x por semana (cada falta conta em dobro)':'2x por semana';
  const btn=(cor,acao,emoji,titulo,sub)=>`<button class="btn block" style="background:${cor};justify-content:flex-start;text-align:left;margin-bottom:10px;height:auto;padding:14px 16px" onclick="paAcao('${acao}')">${emoji} ${titulo}<span style="display:block;font-weight:400;font-size:.78rem;opacity:.85;margin-top:2px">${sub}</span></button>`;
  const v=document.getElementById('view');
  const podeCadastrar=!ehProfessor();
  v.innerHTML=`<button class="btn ghost sm" onclick="voltarTurmas()">‹ Voltar para turmas</button>
    <div class="section-title" style="margin-top:10px"><span class="feijao fj" style="background:var(--azul)"></span><h2 class="display">${t.nome}</h2></div>
    <p class="sub">${nivelTag(t.nivel)} · ${als.length} aluno(s)${t.professor?' · Prof. '+t.professor:''}${t.horario?' · '+t.horario:''} · ${freq}</p>
    <div class="card"><h3>O que você quer fazer?</h3>
      ${btn('var(--azul)','presenca','📋','Fazer a chamada','presença, falta, chegou atrasado e saiu mais cedo')}
      ${btn('var(--azul)','plano','🗒️','Criar plano de aula','checklist da aula + virar item em tema de casa')}
      ${btn('var(--laranja)','material','🎒','Material não trazido','marcar quem veio sem material')}
      ${btn('var(--rosa)','temas','📚','Temas de casa','registrar tema e marcar feito / parcial / não feito')}
      ${btn('var(--roxo)','testes','✏️','Testes','lançar as notas da turma')}
    </div>
    <div class="card"><h3>Alunos (${als.length})</h3>
      ${als.map(a=>`<div class="check"><span>${a.nome}</span>${podeCadastrar?`<button class="btn ghost sm" style="margin-left:auto" onclick="delAluno('${a.id}')">remover</button>`:''}</div>`).join('')||'<p class="hint">Sem alunos ainda.</p>'}
      ${podeCadastrar?`<div class="row" style="margin-top:12px"><div style="flex:3"><input type="text" id="al_${id}" placeholder="Nome do novo aluno" onkeydown="if(event.key==='Enter')addAluno('${id}')"></div>
      <button class="btn ghost" onclick="addAluno('${id}')">+ Aluno</button></div>`:''}</div>
    ${podeCadastrar?`<button class="btn ghost sm" style="color:var(--vermelho)" onclick="delTurma('${id}')">Excluir turma</button>`:''}`;
  window.scrollTo(0,0);
}
function _refreshTurmas(){ if(painelTurma) renderPainelTurma(); else renderTurmaList(); }
function addAluno(turmaId){
  if(ehProfessor())return toast('Sem permissão');
  const inp=document.getElementById('al_'+turmaId);
  const nome=inp.value.trim();if(!nome)return toast('Digite o nome');
  S.alunos.push({id:uid(),nome,turmaId});save();_refreshTurmas();montarNav();toast('Aluno adicionado');
}
function delAluno(id){if(ehProfessor())return toast('Sem permissão');if(confirm('Remover este aluno?')){S.alunos=S.alunos.filter(a=>a.id!==id);save();_refreshTurmas();montarNav();}}
function delTurma(id){if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir turma e seus alunos?')){S.turmas=S.turmas.filter(t=>t.id!==id);S.alunos=S.alunos.filter(a=>a.turmaId!==id);painelTurma=null;save();VIEWS.turmas();montarNav();toast('Turma excluída');}}
function resetarSeguro(){
  modal(`<h3>⚠️ Restaurar dados originais <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:12px">Isto <b>apaga todos os dados atuais</b> (chamadas, temas, planos, testes, comentários…) e volta à base inicial de turmas. Um <b>backup será baixado automaticamente</b> antes de apagar.</p>
    <div class="field"><label class="lbl">Senha de um(a) diretor(a)</label><input type="password" id="resetSenha" placeholder="senha da direção"></div>
    <button class="btn block red" onclick="confirmarReset()">Baixar backup e restaurar</button>`);
  setTimeout(()=>{const i=document.getElementById('resetSenha');if(i)i.focus();},60);
}
function confirmarReset(){
  const senha=(document.getElementById('resetSenha').value||'');
  const dir=S.usuarios.find(u=>u.perfil==='direcao' && u.senha===senha);
  if(!dir){ toast('Senha de diretor(a) incorreta'); return; }
  exportarBackup();                        // baixa o estado atual antes de apagar
  S=seed(); S.usuario=null; S.perfil=null;
  localStorage.setItem(KEY, JSON.stringify(S));
  fechar(); toast('Restaurando…');
  cloudPut().finally(()=>setTimeout(()=>location.reload(), 800));
}

/* ---- ACESSOS (somente direção) ---- */
VIEWS.acessos=()=>{
  const v=document.getElementById('view');
  const rotulo={direcao:'Direção',professor:'Professor(a)',secretaria:'Secretaria'};
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--marinho)"></span><h2 class="display">Acessos e senhas</h2></div>
    <p class="sub">Redefina as senhas da equipe. A senha padrão é <b>12345</b>.</p>
    <div class="card"><h3>Usuários</h3><p class="hint">Toque em “Redefinir para 12345” ou digite uma nova senha e salve.</p>
    <table><thead><tr><th>Usuário</th><th>Perfil</th><th>Nova senha</th><th></th></tr></thead><tbody>
    ${S.usuarios.map((u,i)=>`<tr>
      <td><b>${u.nome}</b></td>
      <td><span class="pill">${rotulo[u.perfil]}</span></td>
      <td><input type="text" id="sn_${i}" placeholder="nova senha" style="max-width:160px"></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn sm" onclick="salvarSenha(${i})">Salvar</button>
        <button class="btn ghost sm" onclick="resetSenha(${i})">Redefinir p/ 12345</button>
      </td></tr>`).join('')}
    </tbody></table></div>
    <div class="card"><h3>+ Novo usuário</h3><div class="row">
      <div><label class="lbl">Nome de acesso</label><input type="text" id="nuNome" placeholder="Ex: Ana"></div>
      <div><label class="lbl">Perfil</label><select id="nuPerfil"><option value="professor">Professor(a)</option><option value="secretaria">Secretaria</option><option value="direcao">Direção</option></select></div>
      <div><label class="lbl">Professor da turma (opcional)</label><input type="text" id="nuEnsina" placeholder="Nome usado nas turmas"></div>
    </div><div style="margin-top:12px"><button class="btn" onclick="addUsuario()">Criar usuário (senha 12345)</button></div></div>
    <div class="card"><h3>Backup dos dados</h3><p class="hint">Baixe uma cópia de segurança (arquivo .json) ou restaure os dados a partir de um backup.</p>
      <div class="row">
        <button class="btn" onclick="exportarBackup()">⬇️ Baixar backup agora</button>
        <button class="btn ghost" onclick="document.getElementById('impFile').click()">⬆️ Restaurar de um arquivo</button>
      </div>
      <input type="file" id="impFile" accept="application/json,.json" style="display:none" onchange="importarBackup(this)">
      <p class="hint" style="margin-top:10px">Guarde o arquivo no seu computador ou no Drive. Restaurar <b>substitui</b> todos os dados atuais.</p>
    </div>`;
};
function exportarBackup(){
  const dados=JSON.stringify(Object.assign({},S,{usuario:null,perfil:null}));
  const blob=new Blob([dados],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-togethere-'+hoje()+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},200);
  toast('Backup baixado');
}
function importarBackup(input){
  const f=input.files&&input.files[0]; if(!f){return;}
  const r=new FileReader();
  r.onload=function(){
    let obj;
    try{ obj=JSON.parse(r.result); }catch(e){ toast('Arquivo inválido (não é um backup válido)'); return; }
    if(!obj || !obj.usuarios || !obj.alunos){ toast('Arquivo não parece um backup do app'); return; }
    if(!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Deseja continuar?')) return;
    S=migrar(obj); S.usuario=null; S.perfil=null;
    localStorage.setItem(KEY, JSON.stringify(S));
    toast('Restaurando…');
    cloudPut().then(function(){ location.reload(); });
  };
  r.readAsText(f); input.value='';
}
function salvarSenha(i){
  const nova=document.getElementById('sn_'+i).value.trim();
  if(!nova)return toast('Digite a nova senha');
  S.usuarios[i].senha=nova; save(); VIEWS.acessos(); toast('Senha atualizada para '+S.usuarios[i].nome);
}
function resetSenha(i){
  S.usuarios[i].senha='12345'; save(); VIEWS.acessos(); toast('Senha de '+S.usuarios[i].nome+' redefinida (12345)');
}
function addUsuario(){
  const nome=document.getElementById('nuNome').value.trim();
  if(!nome)return toast('Dê um nome de acesso');
  if(S.usuarios.some(u=>u.nome.toLowerCase()===nome.toLowerCase()))return toast('Já existe um usuário com esse nome');
  S.usuarios.push({nome,perfil:document.getElementById('nuPerfil').value,senha:'12345',ensina:document.getElementById('nuEnsina').value.trim()||null});
  save(); VIEWS.acessos(); toast('Usuário criado com senha 12345');
}

/* =========================================================================
   BOOT
   ========================================================================= */
(async function boot(){
  const lp=document.getElementById('loginPanel'); if(lp) lp.innerHTML='<p class="hint" style="text-align:center">Conectando ao servidor…</p>';
  const remoto = await cloudGet(7000);
  if (remoto && remoto.usuarios && remoto.usuarios.length){
    S = migrar(remoto);
    localStorage.setItem(KEY, JSON.stringify(S));
    marcarSync('ok');
  } else if (cloudOn()){
    cloudPut();                 // nuvem vazia → semeia com os dados atuais
  }
  S.usuario=null; S.perfil=null;   // segurança: sempre pede login ao abrir
  renderLogin();
})();

/* PWA: registra o service worker (offline + instalável) */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
