  if(plano){ s=plano.conteudo||plano.titulo; const f=plano.itens.filter(i=>i.done).map(i=>i.txt); if(f.length)s+=' (trabalhado: '+f.join(', ')+')'; }
  if(tema) s+=(s?' | ':'')+'Tema passado: '+tema.descricao;
  return s||'aula não registrada no sistema';
}
function corpoRelatorioAluno(alunoId,turmaId,de,ate){
  const inRange=d=> (!de||d>=de) && (!ate||d<=ate);
  const aluno=S.alunos.find(a=>a.id===alunoId), turma=S.turmas.find(t=>t.id===turmaId);
  const faltas=faltasDoAluno(alunoId,turmaId).filter(inRange), mat=materialDoAluno(alunoId,turmaId).filter(inRange);
  const temas=temasNaoFeitosDoAluno(alunoId,turmaId).filter(t=>inRange(t.data)), coms=comentariosDoAluno(alunoId).filter(c=>inRange(c.data));
  const atrasos=atrasosDoAluno(alunoId,turmaId).filter(inRange), saidas=saidasCedoDoAluno(alunoId,turmaId).filter(inRange);
  const peso=pesoFalta(turmaId);
  const baseF=Number(aluno.faltasRetro)||0, totalF=baseF+faltas.length;
  let txt=`RELATÓRIO DO ALUNO\n${aluno.nome}\nTurma: ${turma.nome}${turma.professor?' · Prof. '+turma.professor:''}\nPeríodo: ${de?brDate(de):'início'} a ${ate?brDate(ate):'hoje'}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  txt+=`\n📋 FALTAS (${totalF}${peso===2?` — turma com 2 aulas por encontro`:''})\n`;
  if(baseF) txt+=`• ${baseF} falta(s) retroativas (registro manual)\n`;
  if(faltas.length) faltas.forEach(d=>{ txt+=`• ${brDate(d)} — conteúdo da aula: ${resumoAulaDoDia(turmaId,d)}\n`; });
  if(!totalF) txt+=`• Nenhuma falta registrada.\n`;
  txt+=`\n⏰ CHEGOU ATRASADO (${atrasos.length})\n`;
  if(atrasos.length) atrasos.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🚪 SAIU MAIS CEDO (${saidas.length})\n`;
  if(saidas.length) saidas.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n📚 TEMAS DE CASA NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(t=>{ txt+=`• ${brDate(t.data)} — ${t.descricao}${t.origem==='plano'?' (do plano de aula)':' (extra)'} — ${t.status==='parcial'?'parcialmente feito':'não feito'}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n💬 COMENTÁRIOS (${coms.length})\n`;
  if(coms.length) coms.forEach(c=>{ txt+=`• ${brDate(c.data)} (${c.autor}): ${c.texto}\n`; }); else txt+=`• Nenhum comentário.\n`;
  txt+=`\n—\nTogethere · inglês para chegar lá`;
  return txt;
}

let _cmAberto=null;
function toggleComunicado(id){ _cmAberto=(_cmAberto===id)?null:id; VIEWS.comunicados(); }
function _cmAlvos(){
  const allEl=document.getElementById('cmAll');
  const all=!!(allEl&&allEl.checked);
  const ativas=(S.turmas||[]).filter(t=>turmaStatus(t)!=='encerrada');
  let sel;
  if(all){ sel=ativas; }
  else { sel=ativas.filter(t=>{ const c=document.getElementById('cm_t_'+t.id); return !!(c&&c.checked); }); }
  const ids=sel.map(t=>t.id);
  const alunos=(S.alunos||[]).filter(a=>!a.arquivado && ids.indexOf(a.turmaId)>=0);
  const map={}; let comEmail=0;
  alunos.forEach(a=>{ const raw=(a.email||'').trim(); if(raw){ comEmail++; map[raw.toLowerCase()]=raw; } });
  return {turmas:sel, ids, alunos, emails:Object.values(map), comEmail, total:alunos.length, escolaToda:all};
}
function renderCmResumo(){
  const box=document.getElementById('cmResumo'); if(!box) return;
  const a=_cmAlvos();
  if(!a.ids.length){ box.innerHTML='<p class="hint" style="margin:0">Escolha as turmas (ou a escola toda) acima.</p>'; return; }
  let h=`<b>${a.emails.length}</b> e-mail(s) único(s) — de ${a.comEmail} aluno(s) com e-mail, num total de ${a.total} aluno(s) na seleção.`;
  if(a.total>a.comEmail) h+=` <span class="hint">(${a.total-a.comEmail} sem e-mail cadastrado ficam de fora)</span>`;
  let cor='#1a8a4a', bg='#eafaf0';
  if(a.emails.length>90){ cor='var(--vermelho)'; bg='#fdeaea'; h+=`<br><b>⚠️ Atenção:</b> o Gmail comum entrega ~100 e-mails/dia. Acima disso o envio pode falhar — divida em partes ou aguarde o Workspace.`; }
  box.innerHTML=`<div class="card" style="background:${bg};color:${cor};padding:10px 12px;margin:8px 0">${h}</div>`;
}
async function enviarComunicado(){
  if(ehProfessor()) return toast('Sem permissão');
  const assunto=(document.getElementById('cmAssunto').value||'').trim();
  const corpo=(document.getElementById('cmCorpo').value||'').trim();
  if(!assunto) return toast('Escreva o assunto');
  if(!corpo) return toast('Escreva a mensagem');
  const a=_cmAlvos();
  if(!a.ids.length) return toast('Escolha ao menos uma turma (ou a escola toda)');
  if(!a.emails.length) return toast('Nenhum responsável com e-mail cadastrado nessa seleção');
  let aviso='';
  if(a.emails.length>90) aviso='\n\nATENÇÃO: '+a.emails.length+' destinatários — acima do limite diário do Gmail comum (~100). Pode falhar.';
  const ondePara=a.escolaToda?'a ESCOLA TODA':(a.turmas.length+' turma(s)');
  if(!confirm('Enviar comunicado para '+ondePara+'?\n\nDestinatários: '+a.emails.length+' responsável(is) em cópia oculta.\nAssunto: '+assunto+aviso)) return;
  const btn=document.getElementById('cmEnviar'); if(btn){ btn.disabled=true; btn.textContent='Enviando…'; }
  const res=await cloudEmail(a.emails, assunto, corpo);
  if(btn){ btn.disabled=false; btn.textContent='✉️ Enviar comunicado'; }
  if(res && res.ok){
    S.comunicados=S.comunicados||[];
    S.comunicados.push({id:uid(),data:hoje(),ts:Date.now(),assunto,corpo,turmas:a.ids.slice(),escolaToda:a.escolaToda,enviados:res.enviados||a.emails.length,por:S.usuario});
    save();
    document.getElementById('cmAssunto').value='';
    document.getElementById('cmCorpo').value='';
    VIEWS.comunicados();
    toast('Comunicado enviado para '+(res.enviados||a.emails.length)+' e-mail(s)');
  } else {
    toast('Não foi possível enviar: '+((res&&res.erro)||'erro'));
  }
}

          <div style="white-space:pre-wrap;background:#f7f5f2;border-radius:10px;padding:10px 12px;line-height:1.5">${escAttr(c.corpo||'(sem conteúdo)')}</div>

};

/* ===== Ficha do Aluno (b49) ===== */
let _fichaAlunoId=null, _fichaDe='', _fichaAte='';
function _fichaTurmasDoAluno(alunoId){
  const ids={};
  const a=(S.alunos||[]).find(x=>x.id===alunoId);
  if(a && a.turmaId) ids[a.turmaId]=true;
  (S.presencas||[]).forEach(p=>{ if(p.registros && (alunoId in p.registros)) ids[p.turmaId]=true; });
  (S.turmas||[]).forEach(t=>{ if((t.alunosSnapshot||[]).some(s=>s.id===alunoId)) ids[t.id]=true; });
  return Object.keys(ids).map(id=>(S.turmas||[]).find(t=>t.id===id)).filter(Boolean);
}
function testesDoAluno(alunoId){
  return (S.testes||[]).filter(t=>t.notas && (alunoId in t.notas))
    .map(t=>({data:t.data,turmaId:t.turmaId,numero:t.numero,nota:t.notas[alunoId]}))
    .sort((a,b)=>(a.data||'').localeCompare(b.data||''));
}
function _fichaAulas(alunoId, turmaIds, de, ate){
  const inRange=d=>(!de||d>=de)&&(!ate||d<=ate);
  const out=[];
  (S.presencas||[]).forEach(p=>{
    if(turmaIds.indexOf(p.turmaId)<0) return;
    if(!p.registros || !(alunoId in p.registros)) return;
    if(!inRange(p.data)) return;
    const rel=(S.relatorios||[]).find(r=>r.turmaId===p.turmaId && r.data===p.data);
    out.push({data:p.data, turmaId:p.turmaId, status:p.registros[alunoId],
      cancelada:p.statusAula==='cancelada', transferida:p.statusAula==='transferida',
      resumo:(rel&&rel.corpo)||resumoAulaDoDia(p.turmaId,p.data)});
  });
  return out.sort((a,b)=>b.data.localeCompare(a.data));
}
function _fichaStreakFaltas(alunoId,turmaId){
  const dois=temAula2(turmaId);
  const sess=(S.presencas||[]).filter(p=>p.turmaId===turmaId && _aulaConta(p) && p.registros && (alunoId in p.registros)).sort((x,y)=>x.data.localeCompare(y.data));
  const seq=[]; sess.forEach(p=>{ const s1=p.registros[alunoId]; if(p.registros2){seq.push(s1);seq.push(p.registros2[alunoId]||'presente');} else if(dois){seq.push(s1);seq.push(s1);} else seq.push(s1); });
  let streak=0; for(let i=seq.length-1;i>=0;i--){ if(seq[i]==='falta')streak++; else break; }
  return streak;
}
function corpoFichaAluno(alunoId, de, ate){
  const a=(S.alunos||[]).find(x=>x.id===alunoId); if(!a) return '';
  const turmas=_fichaTurmasDoAluno(alunoId);
  const inRange=d=>(!de||d>=de)&&(!ate||d<=ate);
  const tatual=(S.turmas||[]).find(t=>t.id===a.turmaId);
  let txt=`FICHA DO ALUNO\n${a.nome}\n`;
  if(tatual) txt+=`Turma atual: ${tatual.nome}${tatual.professor?' · Prof. '+tatual.professor:''}\n`;
  txt+=`Período: ${de?brDate(de):'início'} a ${ate?brDate(ate):'hoje'}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  let totalF=Number(a.faltasRetro)||0;
  turmas.forEach(t=>{ totalF+=faltasDoAluno(alunoId,t.id).filter(inRange).length; });
  const aulas=_fichaAulas(alunoId, turmas.map(t=>t.id), de, ate);
  const pres=aulas.filter(x=>x.status==='presente'&&!x.cancelada&&!x.transferida).length;
  txt+=`\n📊 FREQUÊNCIA\n• Presenças: ${pres}\n• Faltas: ${totalF}${(Number(a.faltasRetro)||0)?` (inclui ${a.faltasRetro} retroativa(s))`:''}\n`;
  txt+=`\n📅 AULAS (${aulas.length})\n`;
  if(aulas.length) aulas.forEach(x=>{
    const tag=x.cancelada?'aula cancelada':x.transferida?'aula transferida':(x.status==='falta'?'FALTOU':'presente');
    txt+=`• ${brDate(x.data)} — ${tag}${(!x.cancelada&&!x.transferida)?` — ${x.resumo}`:''}\n`;
  }); else txt+=`• Nenhuma aula no período.\n`;
  let temas=[]; turmas.forEach(t=>{ temas=temas.concat(temasNaoFeitosDoAluno(alunoId,t.id).filter(z=>inRange(z.data))); });
  txt+=`\n📚 TEMAS NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(z=>{ txt+=`• ${brDate(z.data)} — ${z.descricao} — ${z.status==='parcial'?'parcial':'não feito'}\n`; }); else txt+=`• Nenhum.\n`;
  let mat=[]; turmas.forEach(t=>{ mat=mat.concat(materialDoAluno(alunoId,t.id).filter(inRange)); });
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.sort().forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum.\n`;
  const tst=testesDoAluno(alunoId).filter(z=>inRange(z.data));
  txt+=`\n📝 TESTES (${tst.length})\n`;
  if(tst.length) tst.forEach(z=>{ const tn=((S.turmas||[]).find(t=>t.id===z.turmaId)||{}).nome||''; txt+=`• ${brDate(z.data)}${z.numero?(' · teste '+z.numero):''} — nota ${z.nota}${tn?(' ('+tn+')'):''}\n`; }); else txt+=`• Nenhum registro.\n`;
  const coms=comentariosDoAluno(alunoId).filter(c=>inRange(c.data));
  txt+=`\n💬 COMENTÁRIOS (${coms.length})\n`;
  if(coms.length) coms.forEach(c=>{ txt+=`• ${brDate(c.data)} (${c.autor}): ${c.texto}\n`; }); else txt+=`• Nenhum.\n`;
  txt+=`\n—\nTogethere · inglês para chegar lá`;
  return txt;
}

// Registra no histórico que um relatório por aluno (ficha) foi enviado.
// Sem duplicidade: 1 registro por aluno por dia — se reenviar no mesmo dia, atualiza via/hora.
// Só conta como "enviado à família" quando feito por secretaria/direção (não por professor).
function _registrarEnvioFicha(a, via, corpo){
  if(!a || ehProfessor()) return;
  a.relatoriosEnviados = Array.isArray(a.relatoriosEnviados) ? a.relatoriosEnviados : [];
  const em=hoje();
  let reg=a.relatoriosEnviados.find(r=>r.em===em);
  if(reg){ reg.ts=Date.now(); reg.via=via; reg.por=S.usuario; reg.de=_fichaDe||''; reg.ate=_fichaAte||''; if(corpo!=null) reg.corpo=corpo; }
  else { a.relatoriosEnviados.push({ts:Date.now(), em, por:S.usuario, via, de:_fichaDe||'', ate:_fichaAte||'', corpo:(corpo!=null?corpo:'')}); }
  if(a.relatoriosEnviados.length>200) a.relatoriosEnviados=a.relatoriosEnviados.slice(-200);
  a.atualizadoEm=Date.now();   // carimbo para a sincronização entre aparelhos
}

let _fSeg='', _fPer='', _fDia='', _fProf='', _filtroAberto=false;
function toggleFiltroTurma(){ _filtroAberto=!_filtroAberto; renderTurmaList(); }
const PERIODOS=[['manha','Manhã'],['tarde','Tarde'],['tardinha','Tardinha'],['noite','Noite']];
function _minHHMM(s){ const m=String(s||'').match(/(\d{1,2}):(\d{2})/); return m? (+m[1]*60 + +m[2]) : null; }
function _horaIniTurma(t){ const m=String((t&&t.horario)||'').match(/(\d{1,2}):(\d{2})/g); if(m&&m.length){ const p=m[0].split(':'); return +p[0]*60 + +p[1]; } return null; }
function podeVerTodos(){ return S.perfil==='direcao'||S.perfil==='secretaria'; }
function periodoTurma(t){ const s=_horaIniTurma(t); if(s==null)return ''; if(s<720)return 'manha'; if(s<1020)return 'tarde'; if(s<1140)return 'tardinha'; return 'noite'; }
function turmaPassaFiltro(t){
  if(_fSeg && t.nivel!==_fSeg) return false;
  if(_fPer && periodoTurma(t)!==_fPer) return false;
  if(_fDia && diasTurmaLabel(t)!==_fDia) return false;
  if(_fProf && _normTxt(t.professor||'')!==_normTxt(_fProf)) return false;
  return true;
}
function _filtroTurmaAtivo(){ return _fSeg||_fPer||_fDia||_fProf; }
function setFiltroTurma(campo,val){ if(campo==='seg')_fSeg=val; else if(campo==='per')_fPer=val; else if(campo==='dia')_fDia=val; else if(campo==='prof')_fProf=val; renderTurmaList(); }
function limparFiltrosTurma(){ _fSeg=_fPer=_fDia=_fProf=''; renderTurmaList(); }
function renderFiltrosTurma(base){
  const ativos=[_fSeg,_fPer,_fDia,_fProf].filter(Boolean).length;
  if(!_filtroAberto){   // recolhido: lista aparece como antes, com um botão discreto
    let resumo='';
    if(ativos){
      const partes=[]; if(_fSeg)partes.push(_fSeg); if(_fPer)partes.push((PERIODOS.find(p=>p[0]===_fPer)||[])[1]||_fPer); if(_fDia)partes.push(_fDia); if(_fProf)partes.push(_fProf);
      resumo=` <span class="hint">${partes.join(' · ')}</span> <button class="btn ghost sm" onclick="limparFiltrosTurma()">limpar</button>`;
    }
    return `<div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="toggleFiltroTurma()">🔎 Filtrar${ativos?` (${ativos})`:''}</button>${resumo}</div>`;
  }
  const segs=[...new Set(base.map(t=>t.nivel).filter(Boolean))].sort();
  const dias=[...new Set(base.map(t=>diasTurmaLabel(t)).filter(Boolean))].sort();
  const profs=[...new Set(base.map(t=>t.professor).filter(Boolean))].sort();
  const opt=(val,cur,lbl)=>`<option value="${escAttr(val)}" ${cur===val?'selected':''}>${escAttr(lbl)}</option>`;
  const sel=(campo,cur,ph,items)=>`<select onchange="setFiltroTurma('${campo}',this.value)" style="flex:1;min-width:130px">${opt('',cur,ph)}${items.map(it=>opt(it[0],cur,it[1])).join('')}</select>`;
  return `<div class="card" style="padding:12px 14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b>Filtrar turmas e alunos</b>
      <button class="btn ghost sm" onclick="toggleFiltroTurma()">ocultar ▲</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${sel('seg',_fSeg,'Todos os segmentos',segs.map(s=>[s,s]))}
      ${sel('per',_fPer,'Todos os horários',PERIODOS.filter(p=>base.some(t=>periodoTurma(t)===p[0])))}
      ${sel('dia',_fDia,'Todos os dias',dias.map(d=>[d,d]))}
      ${sel('prof',_fProf,'Todos os professores',profs.map(p=>[p,p]))}
      ${_filtroTurmaAtivo()?`<button class="btn ghost sm" onclick="limparFiltrosTurma()">limpar</button>`:''}
    </div></div>`;
}
function renderTurmaList(){
  const list=document.getElementById('turmaList');

  const base=ts.slice();
  if(!base.length){list.innerHTML='<div class="card empty"><div class="big">👥</div>Nenhuma turma. Crie a primeira!</div>';return;}
  const bar = podeVerTodos()? renderFiltrosTurma(base) : '';

  const f=_normTxt(_buscaAluno||'').trim();
  if(f){   // modo busca: lista achatada de alunos que batem (respeitando os filtros)
    const res=[];
    ts.forEach(t=>alunosDa(t.id).forEach(a=>{ if(_normTxt(a.nome).includes(f)) res.push({a,t}); }));
    list.innerHTML = bar + (res.length
      ? `<div class="card"><h3>${res.length} aluno(s) encontrado(s)</h3>`+
        res.map(r=>`<div class="check"><span style="flex:1">${r.a.nome} <span class="pill">${r.t.nome}</span></span>
          <button class="btn ghost sm" onclick="abrirTurma('${r.t.id}')">🏫 Turma</button>
          <button class="btn ghost sm" onclick="abrirFicha('${r.a.id}')">📇 Ficha</button>
          ${(ehProfessor()||soLeitura())?'':`<button class="btn ghost sm" style="color:var(--vermelho)" onclick="delAluno('${r.a.id}')">remover</button>`}</div>`).join('')+`</div>`
      : `<div class="card empty"><div class="big">🔎</div>Nenhum aluno encontrado para “${_buscaAluno}”${_filtroTurmaAtivo()?' com esses filtros':''}.</div>`);
    return;
  }
  if(!ts.length){ list.innerHTML = bar + '<div class="card empty"><div class="big">🔎</div>Nenhuma turma com esses filtros.</div>'; return; }
  list.innerHTML = bar + ts.map(t=>{
    const als=alunosDa(t.id);
    const pend=pendenciasDaTurmaParaMim(t.id);
    const selo=pend.length?`<span class="pill" style="background:#fdeaea;color:var(--vermelho)" title="Pendências nesta turma">⚠️ ${pend.length}</span>`:'';
    const prof=t.professor?` · Prof. ${t.professor}`:'';
    const hor=t.horario?` · ${t.horario}`:'';
    const freq=` · ${diasTurmaLabel(t)||((t.vezesSemana===1)?'1x/sem':'2x/sem')}${t.vezesSemana===1?' (falta dupla)':''}`;
    return `<div class="card" style="cursor:pointer" onclick="abrirTurma('${t.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><h3 style="margin:0">${t.nome} ${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''} ${selo}</h3>
          <p class="hint" style="margin:4px 0 0">${als.length} aluno(s)${prof}${hor}${freq}</p></div>
        <span style="font-size:1.7rem;color:var(--azul);line-height:1">›</span>
      </div></div>`;
  }).join('');
}

  const r=new FileReader();

    if(!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Deseja continuar?')) return;

const TRILHAS={

  junior:{label:'JUNIOR', niveis:['A1','A1+','A2','A2+']},

function _selTurmasOpts(sel){ return turmasVisiveis().slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${t.nome}</option>`).join(''); }
/* ===== Varredura de duplicidades (b44) ===== */
function _normTxt(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }
function _normNomeAluno(s){ return _normTxt(s); }
function _normNomeTurma(s){ return _normTxt(s).replace(/\([^)]*\)/g,'').replace(/[^a-z0-9+]+/g,''); }
function _refsDaTurma(tid){
  const c={alunos:0,presencas:0,planos:0,temas:0,testes:0,material:0,relatorios:0};
  (S.alunos||[]).forEach(a=>{ if(a.turmaId===tid) c.alunos++; });
  ['presencas','planos','temas','testes','material','relatorios'].forEach(col=>{ (S[col]||[]).forEach(r=>{ if(r&&r.turmaId===tid) c[col]++; }); });
  return c;
}
function _turmaNomePorId(tid){ const t=(S.turmas||[]).find(x=>x.id===tid); return t?t.nome:'(turma inexistente)'; }
function escanearDuplicidades(){
  const turmas=S.turmas||[], alunos=S.alunos||[];
  const tg={};
  turmas.forEach(t=>{ const nk=_normNomeTurma(t.nome); if(!nk) return; const k=nk+'|'+((t.dias||[]).slice().sort((x,y)=>x-y).join(',')); (tg[k]=tg[k]||[]).push(t); });
  const turmasDup=Object.values(tg).filter(g=>g.length>1);
  const ag={};
  alunos.forEach(a=>{ if(a.arquivado) return; const k=_normNomeAluno(a.nome); if(!k) return; (ag[k]=ag[k]||[]).push(a); });
  const alunosDup=Object.values(ag).filter(g=>g.length>1);
  const idsT=new Set(turmas.map(t=>t.id));
  const cols=['presencas','material','temas','testes','planos','relatorios'];
  const orfaos={};
  cols.forEach(c=>{ const arr=(S[c]||[]).filter(r=>r&&r.turmaId && !idsT.has(r.turmaId)); if(arr.length) orfaos[c]=arr; });
  const alunosOrfaos=alunos.filter(a=>a.turmaId && !idsT.has(a.turmaId));
  return {turmasDup, alunosDup, orfaos, alunosOrfaos};
}
function dupDelAluno(id){
  if(ehProfessor()) return toast('Sem permissão');
  const a=(S.alunos||[]).find(x=>x.id===id); if(!a) return;
  if(!confirm('Apagar o aluno duplicado "'+a.nome+'"?\n\nIsto remove SOMENTE este registro. A outra cópia continua no app.')) return;
  S.alunos=(S.alunos||[]).filter(x=>x.id!==id); marcarExcluido('alunos',id);
  save(); VIEWS.dupes(); toast('Aluno duplicado removido');
}
function dupDelTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  const r=_refsDaTurma(id);
  const temReg=r.alunos||r.presencas||r.planos||r.temas||r.testes||r.material||r.relatorios;
  let msg='Apagar a turma duplicada "'+t.nome+'"?';
  if(temReg){
    msg+='\n\nEsta turma ainda tem:\n• '+r.alunos+' aluno(s)\n• '+r.presencas+' chamada(s)\n• '+r.planos+' plano(s) · '+r.temas+' tema(s) · '+r.testes+' teste(s)\n• '+r.relatorios+' relatório(s)\n\nTUDO isso será apagado junto. Não dá para desfazer.\n\nDica: apague a turma ANTIGA (a que não tem o "(2026)" ou tem menos registros).';
  }
  if(!confirm(msg)) return;
  S.turmas=(S.turmas||[]).filter(x=>x.id!==id); marcarExcluido('turmas',id);
  (S.alunos||[]).filter(a=>a.turmaId===id).forEach(a=>marcarExcluido('alunos',a.id));
  S.alunos=(S.alunos||[]).filter(a=>a.turmaId!==id);
  ['presencas','planos','temas','testes','material','relatorios'].forEach(col=>{
    (S[col]||[]).filter(rr=>rr&&rr.turmaId===id).forEach(rr=>marcarExcluido(col,rr.id));
    S[col]=(S[col]||[]).filter(rr=>!(rr&&rr.turmaId===id));
  });
  save(); montarNav(); VIEWS.dupes(); toast('Turma duplicada removida');
}
function dupDelOrfao(col,id){
  if(ehProfessor()) return toast('Sem permissão');
  if(!confirm('Apagar este registro órfão?\n\nEle pertence a uma turma que não existe mais no app.')) return;
  S[col]=(S[col]||[]).filter(r=>!(r&&r.id===id)); marcarExcluido(col,id);
  save(); VIEWS.dupes(); toast('Registro órfão removido');
}

      });

    });
  }
  // ÓRFÃOS
  if(nOrf){
    h+='<h3 style="margin:18px 0 6px">🧩 Registros órfãos</h3><p class="hint" style="margin:0 0 8px">Registros que apontam para uma turma que não existe mais.</p>';

      h+='<div class="card" style="padding:12px 14px"><b>'+(COLLBL[col]||col)+' ('+d.orfaos[col].length+')</b>';

      h+='</div>';
    });
  }
  v.innerHTML=h;
};

/* ===== Ciclo de vida da turma (b45) ===== */
const TSTATUS={aberta:{lbl:'ABERTA',cor:'#1a8a4a',bg:'#eafaf0'},formacao:{lbl:'EM FORMAÇÃO',cor:'#b88600',bg:'#fff8e0'},encerrada:{lbl:'ENCERRADA',cor:'#888',bg:'#eeeeee'}};
let _amBusca='';
function turmaStatus(t){ if(!t) return 'aberta'; return t.status || (t.arquivada?'encerrada':'aberta'); }
function turmaTrancada(tid){ const t=(S.turmas||[]).find(x=>x.id===tid); return turmaStatus(t)==='encerrada'; }
function statusPill(t){ const s=TSTATUS[turmaStatus(t)]||TSTATUS.aberta; return `<span class="pill" style="background:${s.bg};color:${s.cor}">${s.lbl}</span>`; }
function encerrarTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  if(turmaStatus(t)==='encerrada') return toast('Esta turma já está encerrada');
  const als=(S.alunos||[]).filter(a=>a.turmaId===id && !a.arquivado);
  if(!confirm('Encerrar a turma "'+t.nome+'"?\n\nEla vai para o ARQUIVO MORTO guardando os '+als.length+' aluno(s) atuais. Depois de encerrada, NADA nela poderá ser editado.\n\nOs alunos continuam no app e podem ser rematriculados em outra turma pelo "+ Aluno".')) return;
  t.alunosSnapshot=als.map(a=>({id:a.id,nome:a.nome}));
  t.status='encerrada'; t.arquivada=true; t.encerradaEm=hoje();
  if(painelTurma===id) painelTurma=null;
  save(); montarNav(); if(rota==='gturmas') VIEWS.gturmas(); toast('Turma encerrada e arquivada');
}
function iniciarTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  t.status='aberta'; t.arquivada=false;
  save(); montarNav(); if(rota==='gturmas') VIEWS.gturmas(); toast('Turma aberta');
}

/* ---- Aniversariantes da semana (pop-up) ---- */
function aniversariantesSemana(){
  const hoje=new Date(); hoje.setHours(0,0,0,0); const res=[];
  let ids;
  if(S.perfil==='professor'){ const u=S.usuarios.find(x=>x.nome===S.usuario); ids=new Set(S.turmas.filter(t=>!t.arquivada && t.professor===(u&&u.ensina)).map(t=>t.id)); }
  else { ids=new Set(S.turmas.filter(t=>!t.arquivada).map(t=>t.id)); }
  (S.alunos||[]).forEach(a=>{
    if(a.arquivado || !a.nascimento || !ids.has(a.turmaId)) return;
    const p=String(a.nascimento).split('-').map(Number); if(p.length<3||!p[1]||!p[2]) return;
    const yy=p[0],mm=p[1],dd=p[2];
    for(let i=0;i<7;i++){ const d=new Date(hoje); d.setDate(hoje.getDate()+i);
      if(d.getMonth()+1===mm && d.getDate()===dd){ const t=S.turmas.find(x=>x.id===a.turmaId);
        res.push({nome:a.nome, turma:t?t.nome:'', dia:new Date(d), faz:d.getFullYear()-yy}); break; }
    }
  });
  res.sort((a,b)=>a.dia-b.dia);
  return res;
}
let _avisoAniv=false;
function mostrarAniversariantes(){
  if(_avisoAniv) return; _avisoAniv=true;
  const lista=aniversariantesSemana(); if(!lista.length) return;
  modal(`<h3>🎂 Aniversariantes da semana <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin-bottom:10px">Alunos que fazem aniversário nos próximos 7 dias:</p>
    ${lista.map(o=>`<div class="check"><span>🎉 <b>${o.nome}</b> — ${brDate(ymd(o.dia))} (${DIAS_SEMANA[o.dia.getDay()]})${(o.faz>0&&o.faz<130)?` · faz ${o.faz}`:''} <span class="pill">${o.turma}</span></span></div>`).join('')}
    <button class="btn block" onclick="fechar()" style="margin-top:12px">Fechar</button>`);
}

(async function boot(){
  const av=document.getElementById('appVer'); if(av) av.textContent=APP_VERSAO;
  _iniciarFilaSync();                       // fila de sincronização offline (reenvia ao voltar a conexão)
  // existe sessão guardada neste aparelho?
  let tk=null,tuser=null,tperfil=null;
  try{ tk=localStorage.getItem(TKEY); tuser=localStorage.getItem(UKEY); tperfil=localStorage.getItem(PKEY); }catch(e){}
  if(tk && tuser && tperfil){
    CLOUD_TOKEN=tk;
    const lp=document.getElementById('loginPanel'); if(lp) lp.innerHTML='<p class="hint" style="text-align:center">Reconectando…</p>';
    const res=await cloudGet(8000);
    if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
      let temPend=false; try{ temPend=!!localStorage.getItem(PEND_KEY); }catch(e){}
      let nova=migrar(res.state);
      if(temPend){                           // havia edições offline não enviadas → MESCLA (local vence), não perde
        let loc=null; try{ loc=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
        if(loc){ nova=mergeEstados(nova, migrar(loc)); _pendenteSync=true; }
      }
      S=nova;
      try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){}
      marcarSync(_pendenteSync?'...':'ok');
    } else if(res.auth){
      // token expirado/cancelado → limpa a sessão e pede login
      CLOUD_TOKEN=null;
      try{ localStorage.removeItem(TKEY); localStorage.removeItem(UKEY); localStorage.removeItem(PKEY); }catch(e){}
      S.usuario=null; S.perfil=null; renderLogin(); return;
    } else {
      try{ if(localStorage.getItem(PEND_KEY)) _pendenteSync=true; }catch(e){}
      marcarSync('off');                     // offline → entra com o estado local (NUNCA sobrescreve a nuvem)
    }
    const u=(S.usuarios||[]).find(x=>x.nome===tuser) || {nome:tuser, perfil:tperfil, ensina:null};
    S.usuario=u.nome; S.perfil=tperfil;
    aplicarLogin(u);
    if(_pendenteSync) setTimeout(flushSync,1200);   // sobe o que ficou pendente do offline
    return;
  }
  // sem sessão → tela de login
  S.usuario=null; S.perfil=null;
  renderLogin();
})();

/* PWA: registra o service worker (offline + instalável) */
function mostrarAtualizacao(){
  if(document.getElementById('updBanner')) return;

  b.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:var(--azul);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 26px rgba(0,0,0,.28);font-size:.92rem;max-width:560px;margin:0 auto';
  b.innerHTML='<span style="flex:1">✨ <b>Nova versão disponível.</b></span>'+
    '<button onclick="location.reload()" style="background:var(--amarelo);color:#1a1a1a;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer">Atualizar</button>'+
    '<button onclick="var e=document.getElementById(\'updBanner\');if(e)e.remove()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:8px 10px;cursor:pointer">Depois</button>';
  document.body.appendChild(b);

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      try{ reg.update(); }catch(e){}
      setInterval(function(){ try{ reg.update(); }catch(e){} }, 60*60*1000);   // checa de hora em hora (sessões abertas o dia todo)
      reg.addEventListener('updatefound', function(){
        var nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller){ mostrarAtualizacao(); }  // 'installed' + já há controlador = atualização (não 1ª instalação)
        });
      });
    }).catch(function(){});
  });
}

const TG_COLECOES_PUBLICADAS=Object.keys(TG_PLANOS);
const TG_COLECOES_TODAS=['Power Up Start Smart','Power Up 1','Power Up 2','Power Up 3','Global Changer Starter','Global Changer 1','Global Changer 2','Global Changer 3','Own It 1','Own It 2','Own It 3','Own It 4','Shining Lights 5','Shining Lights 6','Shining Lights 7'];
const TG_COLECAO_MAP={
  kids:{'A1':'Power Up 2','A1+':'Power Up 3'},
  junior:{'A1':'Global Changer Starter','A1+':'Global Changer 1','A2':'Global Changer 2','A2+':'Global Changer 3'},
  teens:{'A1':'Own It 1','A2':'Own It 2','B1':'Own It 3','B1+':'Own It 4','B2':'Shining Lights 5','C1':'Shining Lights 6','C1+':'Shining Lights 7'}
};
const TG_COR={abertura:'#2E9E5B',nucleo:'#8f9aa6',buffer:'#E0A200',prova:'#D9603B',revisao:'#7E5BB5',ferias:'#b8b8b8'};
const TG_BG={abertura:'#E2EFDA',nucleo:'#ffffff',buffer:'#FFF2CC',prova:'#FCE4D6',revisao:'#F3F0FA',ferias:'#e6e6e6'};
const TG_TLABEL={abertura:'abertura',nucleo:'núcleo',buffer:'buffer',prova:'prova',revisao:'revisão',ferias:'férias'};

function _planAll(){ try{ return JSON.parse(localStorage.getItem(TG_PLAN_KEY)||'{}')||{}; }catch(e){ return {}; } }
function _planSave(all){ try{ localStorage.setItem(TG_PLAN_KEY,JSON.stringify(all)); }catch(e){} }
function planDaTurma(id){ return _planAll()[id]||null; }
function planColecaoSugerida(t){ if(!t) return null; const seg=(t.nivel||'').toLowerCase(); const m=TG_COLECAO_MAP[seg]; if(!m) return null; return m[(t.cefr||'').trim()]||null; }
function planColecaoDe(t){ const p=planDaTurma(t.id); if(p&&typeof p.colecao==='string') return p.colecao; return planColecaoSugerida(t); }
function _plLessons(col){ return (col&&TG_PLANOS[col])?TG_PLANOS[col]:null; }
function _plIdx(les,pos){ if(!les||!pos) return -1; for(let i=0;i<les.length;i++){ if(les[i].s===pos.s&&les[i].a===pos.a) return i; } return -1; }
function _short(s,n){ s=String(s||''); return s.length>n?s.slice(0,n-1)+'…':s; }

function _parseDMY(s){ const m=String(s||'').match(/(\d{1,2})\/(\d{1,2})/); if(!m) return null; return new Date(2026,(+m[2])-1,+m[1]); }
function semanaEscola(){
  const base=_plLessons('Own It 2')||_plLessons(TG_COLECOES_PUBLICADAS[0]); if(!base) return 1;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const weeks={};
  base.forEach(l=>{ if(l.a===1){ const parts=(l.dt||'').split(' a '); const ini=_parseDMY(parts[0]); const fim=_parseDMY(parts[1]||parts[0]); if(ini) weeks[l.s]={ini,fim:fim||ini}; } });
  const ns=Object.keys(weeks).map(Number).sort((a,b)=>a-b); if(!ns.length) return 1;
  for(const w of ns){ const f=new Date(weeks[w].fim); f.setDate(f.getDate()+1); if(hoje>=weeks[w].ini && hoje<f) return w; }
  if(hoje<weeks[ns[0]].ini) return ns[0];
  let last=ns[0]; for(const w of ns){ if(hoje>=weeks[w].ini) last=w; } return last;
}

function planDefinirColecao(id,col){
  const all=_planAll(); const cur=all[id]||{};
  if(col!==cur.colecao){ delete cur.pos; }
  cur.colecao=col||''; all[id]=cur; _planSave(all);
  if(typeof rota!=='undefined' && rota==='planejamento') renderPlanejamento();
}

function renderPlanejamento(){
  const v=document.getElementById('view'); if(!v) return;
  let ts=(typeof turmasVisiveis==='function'?turmasVisiveis():(S.turmas||[]));
  if(typeof turmaStatus==='function') ts=ts.filter(t=>turmaStatus(t)!=='encerrada');
  const cards=ts.map(t=>{
    const col=planColecaoDe(t); const sug=planColecaoSugerida(t);
    const les=_plLessons(col); const pub=!!les; const p=planDaTurma(t.id); const pos=p&&p.pos;
    const opts=['<option value="">— escolher coleção —</option>'].concat(TG_COLECOES_TODAS.map(c=>{
      const has=TG_COLECOES_PUBLICADAS.indexOf(c)>=0;
      return `<option value="${c}" ${c===col?'selected':''}>${c}${has?' ✔':' (em breve)'}</option>`;
    })).join('');
    let corpo='';
    if(!col){ corpo=`<p class="hint">Sem coleção definida.${sug?` Sugestão pelo nível: <b>${sug}</b>.`:''}</p>`; }
    else if(!pub){ corpo=`<p class="hint">O plano de <b>${col}</b> ainda não foi publicado no app — a turma continua funcionando normalmente; a linha do tempo aparece quando o plano ficar pronto.</p>`; }
    else {
      const posTxt=pos?`Aula atual: <b>Sem ${pos.s} · Aula ${pos.a}</b>`:'Posição ainda não definida';
      corpo=`<p class="hint" style="margin:2px 0 8px">${posTxt} · a escola está na <b>Semana ${semanaEscola()}</b></p>
        <button class="btn sm" onclick="abrirTimelineTurma('${t.id}')">📅 ${pos?'Abrir linha do tempo':'Definir posição e abrir'}</button>`;
    }
    return `<div class="card">
      <div class="section-title"><span class="feijao fj" style="background:var(--azul)"></span><h3 style="margin:0">${t.nome}</h3></div>
      <p class="sub" style="margin:2px 0 8px">${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''}</p>
      <label class="hint">Coleção do plano</label>
      <select onchange="planDefinirColecao('${t.id}',this.value)" style="margin:4px 0 6px">${opts}</select>
      ${corpo}
    </div>`;
  }).join('');
  v.innerHTML=`<div class="section-title"><span class="feijao fj" style="background:var(--amarelo)"></span><h2 class="display">Planejamento</h2></div>
    <p class="sub">Cada turma segue o plano-mestre da sua coleção. A linha do tempo mostra onde a turma está e onde a escola está. <b>Novo (b63):</b> por enquanto esta configuração fica só neste aparelho.</p>
    ${cards||'<p class="hint">Nenhuma turma visível.</p>'}`;
  window.scrollTo(0,0);
}
VIEWS.planejamento=renderPlanejamento;

function abrirTimelineTurma(id){
  const t=S.turmas.find(x=>x.id===id); if(!t) return;
  const col=planColecaoDe(t); const les=_plLessons(col);
  if(!les){ toast('O plano desta coleção ainda não foi publicado'); return; }
  const p=planDaTurma(id);
  if(!p||!p.pos){ pedirPosicao(id); return; }
  modal(_timelineModalHTML(id));
}
function pedirPosicao(id){
  const t=S.turmas.find(x=>x.id===id); if(!t) return; const col=planColecaoDe(t); const les=_plLessons(col); if(!les) return;
  const opts=les.map(l=>`<option value="${l.s}_${l.a}">Sem ${l.s} · Aula ${l.a} — ${l.u} · ${_short(l.sec,34)}</option>`).join('');
  modal(`<h3>📍 Onde vocês estão? <button class="close" onclick="fechar()">×</button></h3>
    <p class="hint" style="margin:-4px 0 10px">Turma <b>${t.nome}</b> · ${col}. Escolha a <b>próxima aula</b> que o professor vai dar. Isto é perguntado uma única vez; depois o app segue sozinho.</p>
    <select id="posSel">${opts}</select>
    <button class="btn block" style="margin-top:12px" onclick="salvarPosicao('${id}')">Confirmar posição</button>`);
}
function salvarPosicao(id){
  const sel=document.getElementById('posSel'); if(!sel) return;
  const parts=sel.value.split('_'); const s=+parts[0], a=+parts[1];
  const all=_planAll(); const cur=all[id]||{}; cur.pos={s,a}; cur.setAt=new Date().toISOString();
  const t=S.turmas.find(x=>x.id===id); if(t){ const c=planColecaoDe(t); if(c) cur.colecao=c; }
  all[id]=cur; _planSave(all); fechar(); modal(_timelineModalHTML(id));
}
function planAvancar(id,d){
  const t=S.turmas.find(x=>x.id===id); if(!t) return; const col=planColecaoDe(t); const les=_plLessons(col); if(!les) return;
  const all=_planAll(); const cur=all[id]||{}; const i=_plIdx(les,cur.pos); if(i<0) return;
  const ni=Math.max(0,Math.min(les.length-1,i+d)); cur.pos={s:les[ni].s,a:les[ni].a};
  all[id]=cur; _planSave(all);
  const m=document.getElementById('modal'); if(m) m.innerHTML=_timelineModalHTML(id);
}

function _timelineModalHTML(id){
  const t=S.turmas.find(x=>x.id===id); const col=planColecaoDe(t);
  return `<h3>📅 ${t.nome} — ${col} <button class="close" onclick="fechar()">×</button></h3>
    ${_timelineBody(id)}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="btn ghost sm" onclick="planAvancar('${id}',-1)">◀︎ voltar 1 aula</button>
      <button class="btn sm" onclick="planAvancar('${id}',1)">avançar 1 aula ▶︎</button>
      <button class="btn ghost sm" onclick="pedirPosicao('${id}')">corrigir posição</button>
    </div>
    <p class="hint" style="margin-top:8px">O marcador anda quando você avança a aula. Uma turma atrasada nunca é empurrada para a frente: ela continua mostrando a aula real que falta dar.</p>`;
}
function _timelineBody(id){
  const t=S.turmas.find(x=>x.id===id); const col=planColecaoDe(t); const les=_plLessons(col);
  const p=planDaTurma(id); const posIdx=_plIdx(les,p&&p.pos);
  const escW=semanaEscola();
  let escIdx=les.findIndex(l=>l.s===escW&&l.a===1); if(escIdx<0) escIdx=les.findIndex(l=>l.s===escW); if(escIdx<0) escIdx=les.length-1;
  const turmaW=les[posIdx]?les[posIdx].s:les[0].s;
  const atras=Math.max(0,escIdx-posIdx);
  const byWeek={}; les.forEach(l=>{ if(byWeek[l.s]===undefined||l.a===1) byWeek[l.s]=l; });
  const wks=Object.keys(byWeek).map(Number).sort((a,b)=>a-b); const totalW=wks.length||40;
  const cells=wks.map(w=>{ const l=byWeek[w]; const ring=(w===turmaW||w===escW)?'outline:2px solid #005EAF;outline-offset:-2px;position:relative;z-index:1;':''; return `<div style="flex:1;background:${TG_BG[l.t]||'#fff'};border-right:.5px solid #e7eef6;${ring}"></div>`; }).join('');
  const pct=w=>((wks.indexOf(w)+0.5)/totalW*100);
  const bandL=((Math.max(0,wks.indexOf(turmaW)))/totalW*100);
  const bandW=(Math.max(1,(wks.indexOf(escW)-wks.indexOf(turmaW)))/totalW*100);
  const from=Math.max(0,posIdx-1), to=Math.min(les.length-1,Math.max(escIdx,posIdx)+2);
  let rows='';
  for(let i=from;i<=to;i++){ const l=les[i];
    const here=(i===posIdx), target=(i===escIdx), recup=(i>=posIdx&&i<escIdx);
    const bg=here?'#eaf3ff':(recup?'#f5f9ff':'#fff');
    const out=here?'outline:2px solid #005EAF;outline-offset:-1px;':(target?'outline:1px dashed #90a4b8;outline-offset:-1px;':'');
    const flag=here?`<span style="background:#005EAF;color:#fff;font-size:.7rem;padding:2px 8px;border-radius:999px;white-space:nowrap">📍 sua turma está aqui</span>`
      :(target?`<span style="background:#eef2f6;color:#4a5a68;font-size:.7rem;padding:2px 8px;border-radius:999px;white-space:nowrap">🏫 a escola está aqui</span>`
      :(recup?`<span style="font-size:.7rem;color:#90a4b8">a recuperar</span>`:''));
    const pg=(l.pg&&l.pg!=='—')?` · pp ${l.pg}`:'';
    rows+=`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;padding:8px 10px;border:.5px solid #e7eef6;border-left:3px solid ${TG_COR[l.t]};border-radius:8px;background:${bg};${out}margin-bottom:6px">
      <span style="font-weight:600;min-width:78px;font-size:.82rem">Sem ${l.s} · A${l.a}</span>
      <span style="display:inline-flex;align-items:center;gap:5px;min-width:74px;color:#5a6b78;font-size:.8rem"><span style="width:9px;height:9px;border-radius:50%;background:${TG_COR[l.t]}"></span>${TG_TLABEL[l.t]}</span>
      <span style="flex:1;min-width:150px;font-size:.85rem"><div>${esc(l.sec||l.u)}</div><div style="color:#90a4b8;font-size:.76rem">${esc(l.u)}${pg}</div></span>
      ${flag}
    </div>`;
  }
  const fe=(les[posIdx]&&les[posIdx].fe)?`<p class="hint" style="margin:6px 0 0;color:#b26a00">⚠ ${esc(les[posIdx].fe)}</p>`:'';
  return `<p class="hint" style="margin:0 0 10px">${atras>0?`Esta turma está <b>${atras} aula(s) atrás</b> da escola.`:'Esta turma está <b>em dia</b> com a escola.'}</p>
    <div style="position:relative;margin:0 0 24px">
      <div style="position:absolute;top:0;left:${pct(escW)}%;transform:translateX(-50%);text-align:center;font-size:.68rem;color:#5a6b78;white-space:nowrap;line-height:1.2">Escola · Sem ${escW}<div style="font-size:.8rem">▾</div></div>
      <div style="display:flex;gap:1px;height:18px;margin-top:30px;border-radius:5px;overflow:hidden;border:.5px solid #e7eef6">${cells}</div>
      <div style="position:absolute;top:30px;height:18px;left:${bandL}%;width:${bandW}%;background:rgba(0,94,175,.12);outline:1px solid rgba(0,94,175,.5);border-radius:3px"></div>
      <div style="position:absolute;bottom:-4px;left:${pct(turmaW)}%;transform:translateX(-50%);text-align:center;font-size:.68rem;color:#005EAF;white-space:nowrap;line-height:1.2"><div style="font-size:.8rem">▴</div>Turma · Sem ${turmaW}</div>
    </div>
    ${rows}${fe}
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;padding-top:8px;border-top:.5px solid #e7eef6;font-size:.74rem;color:#5a6b78">
      ${['abertura','nucleo','buffer','prova','revisao'].map(k=>`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${TG_COR[k]}"></span>${TG_TLABEL[k]}</span>`).join('')}
    </div>`;
}
/* ===== fim do módulo Planejamento (b63) ===== */

</script>
</body>
